<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeQuest OS // Adi</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            zinc: { 950: '#09090b', 925: '#0d0d10', 875: '#18181f' },
          },
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
            display: ['Syne', 'sans-serif'],
          },
          keyframes: {
            fadeSlideIn: { '0%': { opacity: '0', transform: 'translateY(8px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            shimmer:     { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
            scaleIn:     { '0%': { opacity: '0', transform: 'scale(0.96)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
            pulse:       { '0%,100%': { opacity: 1 }, '50%': { opacity: 0.5 } },
          },
          animation: {
            fadeSlideIn: 'fadeSlideIn 0.28s ease-out both',
            shimmer:     'shimmer 2s linear infinite',
            scaleIn:     'scaleIn 0.22s ease-out both',
            pulse:       'pulse 2s ease-in-out infinite',
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── THEME TOKENS ── dark (default) */
    :root {
      --bg-base:       #0a0a0d;
      --bg-surface:    rgba(16,16,20,0.75);
      --bg-header:     rgba(10,10,13,0.92);
      --bg-card:       rgba(16,16,20,0.75);
      --bg-input:      rgba(10,10,13,0.85);
      --bg-day-card:   rgba(10,10,13,0.6);
      --bg-glass:      rgba(20,20,26,0.65);
      --bg-empty:      rgba(10,10,13,0.25);
      --bg-reward:     rgba(10,10,13,0.55);
      --border-base:   rgba(42,42,48,0.95);
      --border-card:   rgba(36,36,42,0.85);
      --stat-bar-bg:   #1e1e26;
      --vol-bar-bg:    #161620;
      --text-primary:  #f0f0f2;
      --text-muted:    #8a8a96;
      --accent:        #7c3aed;
      --accent-soft:   rgba(124,58,237,0.12);
      --noise-opacity: 0.35;
    }

    body.dim {
      --bg-base:       #13131a;
      --bg-surface:    rgba(22,22,30,0.88);
      --bg-header:     rgba(14,14,20,0.94);
      --bg-card:       rgba(20,20,28,0.88);
      --bg-input:      rgba(14,14,20,0.9);
      --bg-day-card:   rgba(17,17,24,0.85);
      --bg-glass:      rgba(24,24,34,0.78);
      --bg-empty:      rgba(14,14,20,0.38);
      --bg-reward:     rgba(14,14,20,0.68);
      --border-base:   rgba(58,58,72,0.9);
      --border-card:   rgba(50,50,64,0.82);
      --stat-bar-bg:   #22222e;
      --vol-bar-bg:    #1a1a26;
      --text-primary:  #d8d8e0;
      --text-muted:    #7a7a8a;
      --noise-opacity: 0.2;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-size: 15px;
      line-height: 1.6;
      transition: background 0.35s ease, color 0.35s ease;
    }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a32; border-radius: 99px; }
    ::selection { background: rgba(124,58,237,0.22); color: #e8e8f0; }

    .font-mono { font-family: 'JetBrains Mono', monospace; }
    .font-display { font-family: 'Syne', sans-serif; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: var(--noise-opacity);
      transition: opacity 0.35s ease;
    }

    /* ── GLASS + CARD ── */
    .glass { background: var(--bg-glass); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); transition: background 0.35s ease; }
    .glow-border { border: 1px solid rgba(124,58,237,0.28); box-shadow: 0 0 24px rgba(124,58,237,0.06), inset 0 1px 0 rgba(124,58,237,0.1); }

    /* ── XP / STREAK BARS ── */
    .xp-bar-fill {
      background: linear-gradient(90deg, #5b21b6, #7c3aed, #a78bfa, #7c3aed, #5b21b6);
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
    }
    .streak-bar-fill {
      background: linear-gradient(90deg, #92400e, #d97706, #fbbf24, #f59e0b, #d97706);
      background-size: 200% 100%;
      animation: shimmer 2.2s linear infinite;
    }

    /* ── QUEST CHECKBOX ── */
    .quest-check {
      appearance: none; width: 18px; height: 18px;
      border: 1.5px solid #3a3a48; border-radius: 5px;
      cursor: pointer; transition: all 0.15s ease;
      position: relative; flex-shrink: 0;
    }
    .quest-check:checked { background: #7c3aed; border-color: #7c3aed; }
    .quest-check:checked::after {
      content: ''; position: absolute; left: 5px; top: 2px;
      width: 5px; height: 10px;
      border: 2px solid white; border-left: none; border-top: none;
      transform: rotate(45deg);
    }
    .quest-check:hover:not(:checked) { border-color: #7c3aed; background: rgba(124,58,237,0.1); }

    /* ── TABS ── */
    .tab-active   { color: #e8e8f0; background: rgba(42,42,52,0.85); border: 1.5px solid rgba(64,64,80,0.7); }
    .tab-inactive { color: #4a4a58; border: 1.5px solid transparent; }
    .tab-inactive:hover { color: #8a8a96; background: rgba(30,30,38,0.4); }

    /* ── STAT BARS ── */
    .stat-bar-bg  { height: 4px; background: var(--stat-bar-bg); border-radius: 99px; overflow: hidden; transition: background 0.35s ease; }
    .stat-bar-fill { height: 100%; border-radius: 99px; transition: width 0.45s cubic-bezier(0.4,0,0.2,1); }

    /* ── CARDS ── */
    .card-lift { transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease; }
    .card-lift:hover { transform: translateY(-2px); border-color: rgba(64,64,80,0.9); box-shadow: 0 8px 32px rgba(0,0,0,0.25); }

    /* ── INPUTS ── */
    .input-field {
      background: var(--bg-input); border: 1.5px solid var(--border-base);
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.35s ease;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
    }
    .input-field::placeholder { color: #3a3a48; }
    .input-field:focus { outline: none; border-color: rgba(124,58,237,0.55); box-shadow: 0 0 0 4px rgba(124,58,237,0.08); }

    /* ── BUTTONS ── */
    .btn-primary { background: #f0f0f2; color: #0a0a0d; font-weight: 600; font-size: 13px; transition: all 0.15s ease; }
    .btn-primary:hover { background: #ffffff; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,0,0,0.4); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-ghost { background: rgba(22,22,28,0.65); border: 1.5px solid rgba(42,42,52,0.85); color: #8a8a96; transition: all 0.15s ease; font-size: 13px; }
    .btn-ghost:hover { background: rgba(42,42,52,0.85); color: #e0e0e8; border-color: rgba(64,64,80,0.85); }

    .btn-danger { background: rgba(127,29,29,0.12); border: 1.5px solid rgba(185,28,28,0.18); color: #f87171; transition: all 0.15s ease; font-size: 13px; }
    .btn-danger:hover { background: rgba(127,29,29,0.22); border-color: rgba(185,28,28,0.35); }

    /* ── SECTION ANIMATION ── */
    .tab-section { animation: fadeSlideIn 0.25s ease-out both; }

    /* ── BADGES ── */
    .gold-badge   { color: #fbbf24; }
    .level-badge  { background: linear-gradient(135deg, rgba(124,58,237,0.16), rgba(139,92,246,0.08)); border: 1.5px solid rgba(124,58,237,0.28); color: #a78bfa; }

    /* ── DIFFICULTY BADGES ── */
    .diff-easy   { color: #4ade80; background: rgba(74,222,128,0.09);  border: 1.5px solid rgba(74,222,128,0.18);  }
    .diff-medium { color: #fbbf24; background: rgba(251,191,36,0.09);  border: 1.5px solid rgba(251,191,36,0.18);  }
    .diff-hard   { color: #f87171; background: rgba(248,113,113,0.09); border: 1.5px solid rgba(248,113,113,0.18); }

    /* ── ATTRIBUTE BADGES ── */
    .attr-intel { color: #60a5fa; background: rgba(96,165,250,0.09);  border: 1.5px solid rgba(96,165,250,0.18);  }
    .attr-str   { color: #fb923c; background: rgba(249,115,22,0.09);  border: 1.5px solid rgba(249,115,22,0.18);  }
    .attr-wil   { color: #c084fc; background: rgba(192,132,252,0.09); border: 1.5px solid rgba(192,132,252,0.18); }
    .attr-sta   { color: #34d399; background: rgba(52,211,153,0.09);  border: 1.5px solid rgba(52,211,153,0.18);  }

    .badge-weekly  { color: #818cf8; background: rgba(129,140,248,0.09); border: 1.5px solid rgba(129,140,248,0.18); }
    .badge-pr      { color: #fbbf24; background: rgba(251,191,36,0.12);  border: 1.5px solid rgba(251,191,36,0.28); }
    .badge-streak  { color: #fb923c; background: rgba(251,146,60,0.09);  border: 1.5px solid rgba(251,146,60,0.22); }

    /* ── DAY CARD ── */
    .day-card { background: var(--bg-day-card); border: 1.5px solid var(--border-card); transition: all 0.2s ease; }
    .day-card:hover { background: rgba(22,22,30,0.9); border-color: rgba(124,58,237,0.38); transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,0,0,0.3), 0 0 20px rgba(124,58,237,0.06); }

    /* ── HEADER ── */
    .header-glass { background: var(--bg-header); backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px); border-bottom: 1.5px solid rgba(42,42,52,0.65); transition: background 0.35s ease; }

    /* ── REWARD CARD ── */
    .reward-card { background: var(--bg-reward); border: 1.5px solid var(--border-card); transition: all 0.18s ease; }
    .reward-card:hover { border-color: rgba(251,191,36,0.22); box-shadow: 0 0 24px rgba(251,191,36,0.05); }

    /* ── NEON DOTS ── */
    .neon-dot        { width: 7px; height: 7px; background: #7c3aed; border-radius: 50%; box-shadow: 0 0 7px rgba(124,58,237,0.8), 0 0 14px rgba(124,58,237,0.35); flex-shrink: 0; }
    .neon-dot-green  { width: 7px; height: 7px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 7px rgba(74,222,128,0.8), 0 0 14px rgba(74,222,128,0.35); flex-shrink: 0; }
    .neon-dot-orange { width: 7px; height: 7px; background: #f97316; border-radius: 50%; box-shadow: 0 0 7px rgba(249,115,22,0.8), 0 0 14px rgba(249,115,22,0.35); flex-shrink: 0; }

    /* ── DRAG ── */
    .drag-handle { cursor: grab; color: #3a3a48; transition: color 0.15s; }
    .drag-handle:hover { color: #6a6a78; }
    .drag-handle:active { cursor: grabbing; }
    .quest-dragging { opacity: 0.38; }
    .quest-drag-over { border-color: rgba(124,58,237,0.55) !important; background: rgba(124,58,237,0.05) !important; }

    /* ── NOTES EXPAND ── */
    .notes-expand { max-height: 0; overflow: hidden; transition: max-height 0.22s ease; }
    .notes-expand.open { max-height: 220px; }
    .notes-textarea { background: transparent; resize: none; outline: none; width: 100%; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #4a4a58; line-height: 1.65; }
    .notes-textarea:focus { color: #6a6a78; }
    .notes-textarea::placeholder { color: #2e2e3a; }

    /* ── MILESTONE CHIPS ── */
    .milestone-chip { background: var(--bg-day-card); border: 1.5px solid var(--border-card); transition: all 0.18s ease; }

    /* ── VOLUME BARS ── */
    .vol-bar-bg   { height: 5px; background: var(--vol-bar-bg); border-radius: 99px; overflow: hidden; flex: 1; transition: background 0.35s ease; }
    .vol-bar-fill { height: 100%; border-radius: 99px; transition: width 0.55s cubic-bezier(0.4,0,0.2,1); }

    /* ── KBD ── */
    .kbd { display: inline-flex; align-items: center; justify-content: center; padding: 2px 6px; border-radius: 5px; font-size: 10px; font-family: 'JetBrains Mono', monospace; background: rgba(42,42,52,0.65); border: 1.5px solid rgba(64,64,80,0.55); color: #52525b; }

    /* ── DIM TOGGLE ── */
    .dim-toggle {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 99px;
      font-size: 11px; font-family: 'JetBrains Mono', monospace; font-weight: 500;
      cursor: pointer; transition: all 0.2s ease;
      background: rgba(42,42,52,0.55);
      border: 1.5px solid rgba(64,64,80,0.65);
      color: #6a6a78;
      user-select: none;
    }
    .dim-toggle:hover { background: rgba(64,64,80,0.65); color: #9a9aa8; }
    .dim-toggle.active { background: rgba(28,28,42,0.85); border-color: rgba(129,140,248,0.38); color: #818cf8; box-shadow: 0 0 12px rgba(129,140,248,0.1); }

    /* ── EMPTY STATE ── */
    .empty-state { border: 1.5px dashed rgba(42,42,52,0.65); background: rgba(10,10,13,0.25); }

    /* ── CARD DEFAULTS ── */
    .lq-card { background: var(--bg-card); border: 1.5px solid var(--border-card); border-radius: 14px; transition: background 0.35s ease, border-color 0.35s ease; }

    /* ── SECTION LABEL ── */
    .section-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #4a4a5a; margin-bottom: 14px; }

    select option { background: #14141c; color: #d0d0d8; }
  </style>
</head>
<body class="min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    /* ─── MUSCLE GROUP MAP ───────────────────────────────── */
    const MUSCLE_MAP = {
      'Deadlifts':'Back','Lat Pulldowns':'Back','Hammer Curls':'Biceps',
      'Flat Bench Press':'Chest','Incline Dumbbell Press':'Chest','Tricep Pushdowns':'Triceps',
      'Barbell Back Squats':'Legs','Romanian Deadlifts':'Legs',
      'Overhead Press (OHP)':'Shoulders','Dumbbell Lateral Raises':'Shoulders','Lateral Raises (Giant Set)':'Shoulders',
      'Hanging Leg Raises':'Core','Bicep 21s':'Biceps',
    };
    const MUSCLE_COLORS = { Back:'#60a5fa',Chest:'#fb923c',Legs:'#34d399',Shoulders:'#c084fc',Arms:'#fbbf24',Biceps:'#fbbf24',Triceps:'#fb923c',Core:'#f87171' };

    /* ─── PRESETS ─────────────────────────────────────────── */
    const PRESET_WORKOUTS = {
      Tuesday:   { name:"Back & Biceps",    emoji:"🏋️", exercises:[{name:"Deadlifts",sets:[{reps:5,weight:225},{reps:5,weight:245},{reps:5,weight:265}]},{name:"Lat Pulldowns",sets:[{reps:10,weight:120},{reps:10,weight:130}]},{name:"Hammer Curls",sets:[{reps:12,weight:30},{reps:12,weight:35}]}] },
      Wednesday: { name:"Chest & Triceps",  emoji:"💪", exercises:[{name:"Flat Bench Press",sets:[{reps:8,weight:135},{reps:8,weight:185},{reps:6,weight:205}]},{name:"Incline Dumbbell Press",sets:[{reps:10,weight:60},{reps:10,weight:65}]},{name:"Tricep Pushdowns",sets:[{reps:12,weight:50}]}] },
      Thursday:  { name:"Legs Day",         emoji:"🦵", exercises:[{name:"Barbell Back Squats",sets:[{reps:8,weight:185},{reps:8,weight:225},{reps:6,weight:245}]},{name:"Romanian Deadlifts",sets:[{reps:10,weight:135},{reps:10,weight:185}]}] },
      Friday:    { name:"Shoulders & Abs",  emoji:"⚡", exercises:[{name:"Overhead Press (OHP)",sets:[{reps:8,weight:95},{reps:8,weight:115}]},{name:"Dumbbell Lateral Raises",sets:[{reps:15,weight:20},{reps:15,weight:25}]},{name:"Hanging Leg Raises",sets:[{reps:12,weight:0},{reps:12,weight:0}]}] },
      Saturday:  { name:"Grow Day",         emoji:"🌱", exercises:[{name:"Bicep 21s",sets:[{reps:21,weight:45}]},{name:"Lateral Raises (Giant Set)",sets:[{reps:20,weight:15},{reps:15,weight:20}]}] },
    };

    /* ─── HELPERS ─────────────────────────────────────────── */
    const diffClass = d => d==='easy'?'diff-easy':d==='medium'?'diff-medium':'diff-hard';
    const attrClass = a => a==='intelligence'?'attr-intel':a==='strength'?'attr-str':a==='willpower'?'attr-wil':'attr-sta';
    const attrLabel = a => a==='intelligence'?'INT':a==='strength'?'STR':a==='willpower'?'WIL':'STA';
    const statColor = s => s==='intelligence'?'#60a5fa':s==='strength'?'#fb923c':s==='willpower'?'#c084fc':'#34d399';

    const daysUntilSunday = () => { const d=new Date().getDay(); return d===0?0:7-d; };
    const todayStr = () => new Date().toISOString().split('T')[0];
    const yesterdayStr = () => new Date(Date.now()-86400000).toISOString().split('T')[0];
    const getWeekStart = () => {
      const now = new Date(); const d = new Date(now);
      d.setDate(d.getDate()-d.getDay());
      return d.toISOString().split('T')[0];
    };

    /* ─── PR ENGINE ───────────────────────────────────────── */
    const checkAndUpdatePRs = (exercises, currentPRs) => {
      const newPRNames = []; const updatedPRs = { ...currentPRs };
      for (const ex of (exercises||[])) {
        if (!ex.sets||ex.sets.length===0) continue;
        const maxWeight = Math.max(...ex.sets.map(s=>Number(s.weight)||0));
        if (maxWeight>0 && maxWeight>(updatedPRs[ex.name]||0)) { newPRNames.push(ex.name); updatedPRs[ex.name]=maxWeight; }
      }
      return { newPRNames, updatedPRs };
    };

    /* ─── MILESTONE CHECKER ───────────────────────────────── */
    const getNewMilestones = (oldStats, newStats) => {
      const today = todayStr(); const milestones = [];
      for (const stat of Object.keys(newStats)) {
        const oldF = Math.floor(oldStats[stat]||10); const newF = Math.floor(newStats[stat]||10);
        if (newF > oldF) milestones.push({ stat, milestone: newF, date: today });
      }
      return milestones;
    };

    /* ─── SOUND ───────────────────────────────────────────── */
    const playSound = (type) => {
      try {
        const Ctx = window.AudioContext||window.webkitAudioContext; if (!Ctx) return;
        const ctx = new Ctx(); const now = ctx.currentTime;
        if (type==='complete') {
          const osc=ctx.createOscillator(),gain=ctx.createGain();
          osc.type='sine'; osc.frequency.setValueAtTime(480,now); osc.frequency.exponentialRampToValueAtTime(240,now+0.12);
          gain.gain.setValueAtTime(0.02,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.12);
          osc.connect(gain); gain.connect(ctx.destination); osc.start(now); osc.stop(now+0.12);
        } else if (type==='levelup') {
          [330,440,550,660].forEach((f,i)=>{ const osc=ctx.createOscillator(),gain=ctx.createGain(); osc.type='sine'; osc.frequency.setValueAtTime(f,now+i*0.04); gain.gain.setValueAtTime(0.02,now+i*0.04); gain.gain.exponentialRampToValueAtTime(0.001,now+i*0.04+0.2); osc.connect(gain); gain.connect(ctx.destination); osc.start(now+i*0.04); osc.stop(now+i*0.04+0.2); });
        } else if (type==='pr') {
          [392,523,659,784].forEach((f,i)=>{ const osc=ctx.createOscillator(),gain=ctx.createGain(); osc.type='triangle'; osc.frequency.setValueAtTime(f,now+i*0.07); gain.gain.setValueAtTime(0.025,now+i*0.07); gain.gain.exponentialRampToValueAtTime(0.001,now+i*0.07+0.18); osc.connect(gain); gain.connect(ctx.destination); osc.start(now+i*0.07); osc.stop(now+i*0.07+0.18); });
        }
      } catch(e){}
    };

    /* ─── CONFETTI ────────────────────────────────────────── */
    function ConfettiCanvas({ active, onDone }) {
      const canvasRef = useRef(null); const frameRef = useRef(null);
      useEffect(() => {
        if (!active) return;
        const canvas = canvasRef.current; if (!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const W=canvas.width, H=canvas.height;
        const COLORS=['#7c3aed','#a78bfa','#f59e0b','#34d399','#60a5fa','#f472b6','#fb923c','#ffffff'];
        const particles = Array.from({length:130},()=>({
          x:Math.random()*W, y:-20-Math.random()*H*0.3,
          vx:(Math.random()-0.5)*6, vy:Math.random()*4+1.5,
          color:COLORS[Math.floor(Math.random()*COLORS.length)],
          w:Math.random()*9+3, h:Math.random()*5+2,
          angle:Math.random()*Math.PI*2, spin:(Math.random()-0.5)*0.25,
          gravity:0.04+Math.random()*0.04, drag:0.98,
        }));
        let elapsed=0, stopped=false;
        const animate = ()=>{
          ctx.clearRect(0,0,W,H);
          let allGone=true;
          particles.forEach(p=>{ p.vx*=p.drag; p.vy+=p.gravity; p.x+=p.vx; p.y+=p.vy; p.angle+=p.spin; if(p.y<H+30) allGone=false; const alpha=Math.max(0,1-p.y/(H*0.9)); ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle); ctx.globalAlpha=alpha; ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore(); });
          elapsed++;
          if (allGone||elapsed>240||stopped) { onDone(); } else { frameRef.current=requestAnimationFrame(animate); }
        };
        frameRef.current=requestAnimationFrame(animate);
        const t=setTimeout(()=>{stopped=true;},4000);
        return ()=>{ cancelAnimationFrame(frameRef.current); clearTimeout(t); };
      },[active]);
      if (!active) return null;
      return <canvas ref={canvasRef} style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:9999}} />;
    }

    /* ─── WEEKLY XP CHART ─────────────────────────────────── */
    function WeeklyXpChart({ history }) {
      const days=[];
      for(let i=6;i>=0;i--){
        const d=new Date(Date.now()-i*86400000);
        const s=d.toISOString().split('T')[0];
        const label=d.toLocaleDateString('en',{weekday:'short'}).slice(0,2);
        days.push({s,label,xp:history[s]?.xp||0,gold:history[s]?.gold||0});
      }
      const maxXp=Math.max(...days.map(d=>d.xp),40);
      const CH=72, BW=30, GAP=10;
      const TW=days.length*(BW+GAP)-GAP;
      const today=todayStr();
      return (
        <svg viewBox={`0 0 ${TW} ${CH+26}`} width="100%" preserveAspectRatio="none" style={{overflow:'visible'}}>
          {days.map((day,i)=>{
            const x=i*(BW+GAP);
            const barH=Math.max(4,(day.xp/maxXp)*CH);
            const isToday=day.s===today;
            const isEmpty=day.xp===0;
            return (
              <g key={day.s}>
                <rect x={x} y={CH} width={BW} height={2.5} rx={1.5} fill="#1a1a24"/>
                {!isEmpty && <rect x={x} y={CH-barH} width={BW} height={barH} rx={4} fill={isToday?'#7c3aed':'#2e2e3e'} opacity={isToday?1:0.75}/>}
                {isEmpty && <rect x={x} y={CH-4} width={BW} height={4} rx={2} fill="#181820"/>}
                {day.xp>0 && <text x={x+BW/2} y={CH-barH-5} textAnchor="middle" fontSize="9" fill={isToday?'#a78bfa':'#4a4a5a'} fontFamily="JetBrains Mono" fontWeight="600">{day.xp}</text>}
                <text x={x+BW/2} y={CH+18} textAnchor="middle" fontSize="10" fill={isToday?'#9a9aaa':'#3a3a48'} fontFamily="JetBrains Mono">{day.label}</text>
              </g>
            );
          })}
        </svg>
      );
    }

    /* ─── MAIN APP ────────────────────────────────────────── */
    function App() {

      const [gymLogs,      setGymLogs]      = useState(()=>JSON.parse(localStorage.getItem('lq_gymlogs_adi_v4'))||[]);
      const [exercisePRs,  setExercisePRs]  = useState(()=>JSON.parse(localStorage.getItem('lq_prs_adi_v4'))||{});

      const [newImprovementText, setNewImprovementText] = useState("");

      const [newQuestText,       setNewQuestText]       = useState("");

      /* ── DIM MODE body class ── */

      /* ── KEYBOARD SHORTCUTS ── */
      useEffect(()=>{

        };
        window.addEventListener('keydown',handle);
        return ()=>window.removeEventListener('keydown',handle);
      },[]);

      /* ── MIDNIGHT RESET + STREAK ── */
      useEffect(()=>{
        const today=todayStr(), yest=yesterdayStr();
        const lastReset=localStorage.getItem('lq_last_reset_date');
        if (lastReset!==today) {
          const dailyQuests=quests.filter(q=>q.type==='day');
          const allDone=dailyQuests.length>0&&dailyQuests.every(q=>q.completed);
          const consecutive=lastReset===yest;
          const newStreak=(consecutive&&allDone)?hero.streak+1:0;
          setHero(h=>({...h,streak:newStreak}));
          if (lastReset) {
            const notedQuests=quests.filter(q=>q.notes&&q.notes.trim());
            if (notedQuests.length>0) setNoteHistory(prev=>({...prev,[lastReset]:notedQuests.map(q=>({questText:q.text,note:q.notes,completed:q.completed,attribute:q.attribute}))}));
          }
          const isWeeklyReset=new Date().getDay()===0;
          const lastWeekly=localStorage.getItem('lq_last_weekly_reset');
          if (isWeeklyReset&&lastWeekly!==today) {
            setQuests(prev=>prev.map(q=>({...q,completed:false,notes:""})));
            localStorage.setItem('lq_last_weekly_reset',today);
            setTimeout(()=>triggerToast("🗓️ Weekly reset — all quests refreshed."),800);
          } else {
            setQuests(prev=>prev.map(q=>q.type==='day'?{...q,completed:false,notes:""}:q));
            setTimeout(()=>triggerToast("⚡ New day — daily quests reset."),800);
          }
          if (newStreak>0) setTimeout(()=>triggerToast(`🔥 Streak: ${newStreak} day${newStreak>1?'s':''} — keep it alive.`),1400);
          localStorage.setItem('lq_last_reset_date',today);
        }
      },[]);

      /* ── PERSIST ── */
      useEffect(()=>{
        localStorage.setItem('lq_hero_adi_v4',      JSON.stringify(hero));
        localStorage.setItem('lq_quests_adi_v4',    JSON.stringify(quests));
        localStorage.setItem('lq_gymlogs_adi_v4',   JSON.stringify(gymLogs));
        localStorage.setItem('lq_rewards_adi_v4',   JSON.stringify(rewards));
        localStorage.setItem('lq_prs_adi_v4',       JSON.stringify(exercisePRs));
        localStorage.setItem('lq_history_adi_v4',   JSON.stringify(dailyHistory));
        localStorage.setItem('lq_milestones_adi_v4',JSON.stringify(statMilestones));
        localStorage.setItem('lq_notehistory_v4',   JSON.stringify(noteHistory));
        localStorage.setItem('lq_improve_v4',       JSON.stringify(improvementLog));
      },[hero,quests,gymLogs,rewards,exercisePRs,dailyHistory,statMilestones,noteHistory,improvementLog]);

      const triggerToast = (msg)=>{ setToastMsg(msg); setTimeout(()=>setToastMsg(""),4500); };

      /* ── QUEST TOGGLE ── */
      const handleQuestToggle = (id) => {
        playSound('complete');
        setQuests(prev=>prev.map(q=>{
          if (q.id!==id) return q;
          const completing=!q.completed, xpChange=completing?q.xp:-q.xp, goldChange=completing?q.gold:-q.gold;
          if (completing) { const today=todayStr(); setDailyHistory(h=>({...h,[today]:{xp:(h[today]?.xp||0)+q.xp,gold:(h[today]?.gold||0)+q.gold}})); }
          setHero(h=>{
            let nXp=h.xp+xpChange, nGold=Math.max(0,h.gold+goldChange);
            let nLvl=h.level, tXp=h.nextLevelXp, rolledLvl=false;
            if(nXp>=tXp){nXp-=tXp;nLvl++;tXp=nLvl*300;rolledLvl=true;playSound('levelup');setLevelUpModal(true);setShowConfetti(true);}
            else if(nXp<0) nXp=0;
            const oldStats={...h.stats}, nextStats={...h.stats};
            if(completing&&q.attribute) nextStats[q.attribute]=(nextStats[q.attribute]||10)+(q.difficulty==='hard'?1.0:0.4);
            if(completing){const newMs=getNewMilestones(oldStats,nextStats);if(newMs.length>0)setStatMilestones(prev=>[...newMs,...prev].slice(0,50));}
            return {...h,xp:Math.round(nXp),gold:nGold,level:nLvl,nextLevelXp:tXp,stats:nextStats,statPoints:rolledLvl?h.statPoints+3:h.statPoints};
          });
          if(completing) triggerToast(`Quest complete — +${q.xp} XP · +${q.gold}g`);
          return {...q,completed:completing};
        }));
      };

      const updateQuestNotes = (id, notes) => setQuests(prev=>prev.map(q=>q.id===id?{...q,notes}:q));

      /* ── DRAG REORDER ── */
      const handleDragStart = (e, id) => { setDragQuestId(id); e.dataTransfer.effectAllowed='move'; };

        e.preventDefault();
        if(!dragQuestId||dragQuestId===targetId){setDragQuestId(null);setDragOverId(null);return;}
        setQuests(prev=>{
          const items=[...prev];
          const from=items.findIndex(q=>q.id===dragQuestId), to=items.findIndex(q=>q.id===targetId);
          if(from<0||to<0) return prev;
          const [moved]=items.splice(from,1); items.splice(to,0,moved); return items;
        });
        setDragQuestId(null); setDragOverId(null);
      };
      const handleDragEnd = ()=>{ setDragQuestId(null); setDragOverId(null); };

      /* ── QUEST ADD / DELETE ── */
      const handleManualQuestAdd = (e) => {

      const triggerPresetWorkoutLog = (dayName) => {
        const preset=PRESET_WORKOUTS[dayName]; if(!preset) return;
        const{newPRNames,updatedPRs}=checkAndUpdatePRs(preset.exercises,exercisePRs);
        setExercisePRs(updatedPRs);
        const newLog={id:Date.now(),date:todayStr(),workoutName:`${preset.name} (${dayName})`,exercises:preset.exercises,prExercises:newPRNames};
        setGymLogs([newLog,...gymLogs]); setHero(h=>({...h,xp:h.xp+60,gold:h.gold+20}));
        if(newPRNames.length>0){playSound('pr');triggerToast(`🏆 PR: ${newPRNames.join(', ')} — +60 XP · +20g`);}

      const deleteGymLog = (id) => { setGymLogs(prev=>prev.filter(l=>l.id!==id)); triggerToast("Session removed."); };

      const weeklyVolume = useMemo(()=>{
        const ws=getWeekStart(); const thisWeek=gymLogs.filter(l=>l.date>=ws); const byGroup={};
        thisWeek.forEach(log=>(log.exercises||[]).forEach(ex=>{
          const group=MUSCLE_MAP[ex.name]||'Other';
          const vol=(ex.sets||[]).reduce((sum,s)=>sum+((Number(s.reps)||0)*(Number(s.weight)||0)),0);
          byGroup[group]=(byGroup[group]||0)+vol;
        }));
        return byGroup;
      },[gymLogs]);

      /* ── MISC ── */

        if(!aiInputPrompt.trim()) return;

          const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,{
            method:"POST",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({contents:[{parts:[{text:`Decompose this goal into 2-4 specific JSON daily sub-quests for Adi: "${aiInputPrompt}". Schema: {"quests":[{"text":"Task","type":"day","difficulty":"medium","attribute":"intelligence","xp":30,"gold":12}]}. Raw JSON only.`}]}],generationConfig:{responseMimeType:"application/json"}})
