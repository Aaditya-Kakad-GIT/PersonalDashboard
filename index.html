<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeQuest OS // Adi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode:'class',
      theme:{extend:{
        colors:{zinc:{950:'#09090b'}},
        fontFamily:{sans:['DM Sans','sans-serif'],mono:['JetBrains Mono','monospace'],display:['Syne','sans-serif']},
        keyframes:{
          fadeSlideIn:{'0%':{opacity:'0',transform:'translateY(8px)'},'100%':{opacity:'1',transform:'translateY(0)'}},
          shimmer:{'0%':{backgroundPosition:'-200% 0'},'100%':{backgroundPosition:'200% 0'}},
          scaleIn:{'0%':{opacity:'0',transform:'scale(0.95)'},'100%':{opacity:'1',transform:'scale(1)'}},
          pulseRing:{'0%,100%':{opacity:1},'50%':{opacity:0.55}},
          timerPop:{'0%':{transform:'scale(1)'},'40%':{transform:'scale(1.06)'},'100%':{transform:'scale(1)'}},
        },
        animation:{
          fadeSlideIn:'fadeSlideIn 0.28s ease-out both',
          shimmer:'shimmer 2s linear infinite',
          scaleIn:'scaleIn 0.22s ease-out both',
          pulseRing:'pulseRing 2s ease-in-out infinite',
          timerPop:'timerPop 0.35s ease-out',
        }
      }}
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg-base:#0a0a0d;--bg-card:rgba(16,16,22,0.78);--bg-header:rgba(10,10,13,0.94);
      --bg-input:rgba(10,10,13,0.88);--bg-day:rgba(10,10,13,0.62);--bg-glass:rgba(18,18,26,0.68);
      --bg-empty:rgba(10,10,13,0.28);--bg-reward:rgba(10,10,13,0.58);
      --border-base:rgba(40,40,50,0.95);--border-card:rgba(34,34,44,0.88);
      --stat-bg:#1a1a24;--vol-bg:#14141e;--text:#f0f0f2;--muted:#7a7a8c;
      --accent:#7c3aed;--accent-s:rgba(124,58,237,0.12);--noise:0.32;
    }
    body.dim{
      --bg-base:#12121a;--bg-card:rgba(20,20,30,0.88);--bg-header:rgba(12,12,18,0.96);
      --bg-input:rgba(12,12,18,0.92);--bg-day:rgba(16,16,24,0.86);--bg-glass:rgba(22,22,34,0.78);
      --border-base:rgba(55,55,70,0.9);--border-card:rgba(46,46,60,0.85);
      --stat-bg:#1e1e2c;--vol-bg:#181828;--text:#d0d0dc;--muted:#686878;--noise:0.18;
    }
    body{font-family:'DM Sans',sans-serif;background:var(--bg-base);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.6;transition:background .35s ease,color .35s ease}
    ::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2a36;border-radius:99px}
    ::selection{background:rgba(124,58,237,.22);color:#e8e8f2}
    .font-mono{font-family:'JetBrains Mono',monospace}.font-display{font-family:'Syne',sans-serif}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:var(--noise);transition:opacity .35s ease}
    .glass{background:var(--bg-glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
    .glow-border{border:1px solid rgba(124,58,237,.28);box-shadow:0 0 24px rgba(124,58,237,.07),inset 0 1px 0 rgba(124,58,237,.1)}
    /* Bars */
    .xp-fill{background:linear-gradient(90deg,#5b21b6,#7c3aed,#a78bfa,#7c3aed,#5b21b6);background-size:200% 100%;animation:shimmer 3s linear infinite}
    .streak-fill{background:linear-gradient(90deg,#92400e,#d97706,#fbbf24,#f59e0b,#d97706);background-size:200% 100%;animation:shimmer 2.2s linear infinite}
    .bar-bg{height:5px;background:var(--stat-bg);border-radius:99px;overflow:hidden;transition:background .35s ease}
    .bar-fill{height:100%;border-radius:99px;transition:width .45s cubic-bezier(.4,0,.2,1)}
    /* Checkbox */
    .qcheck{appearance:none;width:19px;height:19px;border:1.5px solid #383848;border-radius:5px;cursor:pointer;transition:all .15s ease;position:relative;flex-shrink:0}
    .qcheck:checked{background:#7c3aed;border-color:#7c3aed}
    .qcheck:checked::after{content:'';position:absolute;left:5px;top:2px;width:6px;height:10px;border:2px solid white;border-left:none;border-top:none;transform:rotate(45deg)}
    .qcheck:hover:not(:checked){border-color:#7c3aed;background:rgba(124,58,237,.1)}
    /* Tabs */
    .tab-on{color:#e8e8f0;background:rgba(40,40,52,.88);border:1.5px solid rgba(62,62,80,.72)}
    .tab-off{color:#464658;border:1.5px solid transparent}
    .tab-off:hover{color:#8a8a9a;background:rgba(28,28,38,.42)}
    /* Inputs */
    .inp{background:var(--bg-input);border:1.5px solid var(--border-base);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;transition:border-color .15s,box-shadow .15s,background .35s ease}
    .inp::placeholder{color:#383848}.inp:focus{outline:none;border-color:rgba(124,58,237,.55);box-shadow:0 0 0 4px rgba(124,58,237,.08)}
    select.inp{color:var(--muted)}select option{background:#14141e;color:#d0d0d8}
    /* Buttons */
    .btn-p{background:#f0f0f2;color:#0a0a0d;font-weight:600;font-size:13px;transition:all .15s ease}
    .btn-p:hover{background:#fff;transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,0,0,.4)}
    .btn-p:active{transform:translateY(0)}.btn-p:disabled{opacity:.38;cursor:not-allowed;transform:none}
    .btn-g{background:rgba(20,20,28,.68);border:1.5px solid rgba(40,40,52,.88);color:var(--muted);transition:all .15s;font-size:13px}
    .btn-g:hover{background:rgba(40,40,52,.88);color:#e0e0e8;border-color:rgba(62,62,80,.88)}
    .btn-d{background:rgba(127,29,29,.12);border:1.5px solid rgba(185,28,28,.18);color:#f87171;font-size:13px;transition:all .15s}
    .btn-d:hover{background:rgba(127,29,29,.22);border-color:rgba(185,28,28,.35)}
    /* Cards */
    .lq-card{background:var(--bg-card);border:1.5px solid var(--border-card);border-radius:16px;transition:background .35s ease,border-color .35s ease}
    .tab-section{animation:fadeSlideIn .25s ease-out both}
    /* Badges */
    .gold{color:#fbbf24}
    .lvl-badge{background:linear-gradient(135deg,rgba(124,58,237,.17),rgba(139,92,246,.09));border:1.5px solid rgba(124,58,237,.3);color:#a78bfa}
    .empty-state{border:1.5px dashed rgba(42,42,54,.65);background:rgba(10,10,13,.22)}
    .diff-e{color:#4ade80;background:rgba(74,222,128,.09);border:1.5px solid rgba(74,222,128,.18)}
    .diff-m{color:#fbbf24;background:rgba(251,191,36,.09);border:1.5px solid rgba(251,191,36,.18)}
    .diff-h{color:#f87171;background:rgba(248,113,113,.09);border:1.5px solid rgba(248,113,113,.18)}
    .atr-i{color:#60a5fa;background:rgba(96,165,250,.09);border:1.5px solid rgba(96,165,250,.18)}
    .atr-s{color:#fb923c;background:rgba(249,115,22,.09);border:1.5px solid rgba(249,115,22,.18)}
    .atr-w{color:#c084fc;background:rgba(192,132,252,.09);border:1.5px solid rgba(192,132,252,.18)}
    .atr-t{color:#34d399;background:rgba(52,211,153,.09);border:1.5px solid rgba(52,211,153,.18)}
    .b-wk{color:#818cf8;background:rgba(129,140,248,.09);border:1.5px solid rgba(129,140,248,.18)}
    .b-pr{color:#fbbf24;background:rgba(251,191,36,.12);border:1.5px solid rgba(251,191,36,.28)}
    /* Day card */
    .day-card{background:var(--bg-day);border:1.5px solid var(--border-card);transition:all .2s ease}
    .day-card:hover{border-color:rgba(124,58,237,.4);transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.3),0 0 22px rgba(124,58,237,.07)}
    /* Header */
    .hdr{background:var(--bg-header);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-bottom:1.5px solid rgba(40,40,52,.65);transition:background .35s ease}
    /* Reward */
    .rcard{background:var(--bg-reward);border:1.5px solid var(--border-card);transition:all .18s ease}
    .rcard:hover{border-color:rgba(251,191,36,.24);box-shadow:0 0 24px rgba(251,191,36,.06)}
    /* Dots */
    .dot-v{width:7px;height:7px;background:#7c3aed;border-radius:50%;box-shadow:0 0 7px rgba(124,58,237,.85),0 0 14px rgba(124,58,237,.38);flex-shrink:0}
    .dot-g{width:7px;height:7px;background:#4ade80;border-radius:50%;box-shadow:0 0 7px rgba(74,222,128,.85),0 0 14px rgba(74,222,128,.38);flex-shrink:0}
    /* Drag */
    .drag-h{cursor:grab;color:#3a3a4a;transition:color .15s}.drag-h:hover{color:#6a6a7a}.drag-h:active{cursor:grabbing}
    .q-drag{opacity:.36}.q-over{border-color:rgba(124,58,237,.55)!important;background:rgba(124,58,237,.05)!important}
    /* Notes */
    .notes-x{max-height:0;overflow:hidden;transition:max-height .22s ease}.notes-x.open{max-height:220px}
    .notes-ta{background:transparent;resize:none;outline:none;width:100%;font-family:'JetBrains Mono',monospace;font-size:12px;color:#4a4a5a;line-height:1.65}
    .notes-ta:focus{color:#6a6a7a}.notes-ta::placeholder{color:#2e2e3a}
    /* Section label */
    .slabel{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:#4a4a5a;margin-bottom:14px}
    /* Milestone */
    .mchip{background:var(--bg-day);border:1.5px solid var(--border-card);transition:all .18s ease}
    /* Vol bars */
    .vbar-bg{height:5px;background:var(--vol-bg);border-radius:99px;overflow:hidden;flex:1;transition:background .35s ease}
    .vbar-fill{height:100%;border-radius:99px;transition:width .55s cubic-bezier(.4,0,.2,1)}
    /* kbd */
    .kbd{display:inline-flex;align-items:center;justify-content:center;padding:2px 6px;border-radius:5px;font-size:10px;font-family:'JetBrains Mono',monospace;background:rgba(40,40,52,.65);border:1.5px solid rgba(62,62,80,.55);color:#52525b}
    /* Dim toggle */
    .dim-tog{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:99px;font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:500;cursor:pointer;transition:all .2s ease;background:rgba(40,40,52,.55);border:1.5px solid rgba(62,62,80,.65);color:#6a6a7a;user-select:none}
    .dim-tog:hover{background:rgba(62,62,80,.65);color:#9a9ab2}
    .dim-tog.on{background:rgba(26,26,42,.85);border-color:rgba(129,140,248,.4);color:#818cf8;box-shadow:0 0 12px rgba(129,140,248,.12)}

    /* ── FOCUS TIMER ── */
    .timer-ring-track{fill:none;stroke:#1a1a26;stroke-width:7}
    .timer-ring-prog{fill:none;stroke-width:7;stroke-linecap:round;transform:rotate(-90deg);transform-origin:60px 60px;transition:stroke-dashoffset .8s ease,stroke .4s ease}
    .timer-mode-btn{padding:5px 14px;border-radius:99px;font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:500;cursor:pointer;transition:all .18s ease;border:1.5px solid rgba(42,42,54,.8);color:#5a5a6a;background:transparent}
    .timer-mode-btn:hover{color:#9a9ab0;border-color:rgba(70,70,88,.9)}
    .timer-mode-btn.active{background:rgba(124,58,237,.18);border-color:rgba(124,58,237,.45);color:#a78bfa}
    .timer-mode-btn.active-g{background:rgba(52,211,153,.14);border-color:rgba(52,211,153,.4);color:#6ee7b7}
    .timer-mode-btn.active-b{background:rgba(96,165,250,.14);border-color:rgba(96,165,250,.4);color:#93c5fd}
    .timer-btn{width:42px;height:42px;border-radius:50%;border:1.5px solid rgba(42,42,54,.8);background:rgba(20,20,30,.7);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s ease}
    .timer-btn:hover{background:rgba(42,42,56,.9);color:#e0e0ee}
    .timer-btn.run{border-color:rgba(124,58,237,.5);background:rgba(124,58,237,.2);color:#c4b5fd}
    .timer-btn.run:hover{background:rgba(124,58,237,.3)}
    /* focus progress bar */
    .focus-prog-bar{height:4px;background:#1a1a26;border-radius:99px;overflow:hidden}
    .focus-prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#5b21b6,#7c3aed,#a78bfa);background-size:200% 100%;animation:shimmer 3s linear infinite;transition:width .6s ease}

    /* ── SLEEP ── */
    .sleep-debt-chip{padding:6px 14px;border-radius:99px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
    .sleep-good{background:rgba(52,211,153,.1);border:1.5px solid rgba(52,211,153,.28);color:#6ee7b7}
    .sleep-warn{background:rgba(251,191,36,.1);border:1.5px solid rgba(251,191,36,.28);color:#fcd34d}
    .sleep-bad{background:rgba(248,113,113,.1);border:1.5px solid rgba(248,113,113,.28);color:#fca5a5}
    .sleep-night-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

    /* ── HEATMAP ── */
    .hmap-dot{width:10px;height:10px;border-radius:3px;transition:transform .15s ease}
    .hmap-dot:hover{transform:scale(1.35)}

    /* ── FAILURE TAG ── */
    .ftag-btn{padding:5px 12px;border-radius:99px;font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:500;cursor:pointer;transition:all .15s ease;border:1.5px solid rgba(42,42,54,.8);color:#6a6a7a;background:rgba(20,20,30,.6)}
    .ftag-btn:hover{border-color:rgba(124,58,237,.5);color:#a78bfa;background:rgba(124,58,237,.1)}
    .ftag-btn.sel{border-color:rgba(124,58,237,.6);color:#c4b5fd;background:rgba(124,58,237,.2)}

    /* ── PROGRESSION ── */
    .prog-trend-up{color:#4ade80}.prog-trend-dn{color:#f87171}.prog-trend-eq{color:#71717a}

    /* ── REFLECTION ── */
    .refl-ta{background:transparent;resize:none;outline:none;width:100%;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--muted);line-height:1.7}
    .refl-ta:focus{color:var(--text)}.refl-ta::placeholder{color:#323242}
  </style>
</head>
<body class="min-h-screen">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ── CONSTANTS ── */
const MUSCLE_MAP = {'Deadlifts':'Back','Lat Pulldowns':'Back','Hammer Curls':'Biceps','Flat Bench Press':'Chest','Incline Dumbbell Press':'Chest','Tricep Pushdowns':'Triceps','Barbell Back Squats':'Legs','Romanian Deadlifts':'Legs','Overhead Press (OHP)':'Shoulders','Dumbbell Lateral Raises':'Shoulders','Lateral Raises (Giant Set)':'Shoulders','Hanging Leg Raises':'Core','Bicep 21s':'Biceps'};
const MUSCLE_COLORS = {Back:'#60a5fa',Chest:'#fb923c',Legs:'#34d399',Shoulders:'#c084fc',Biceps:'#fbbf24',Triceps:'#fb923c',Core:'#f87171'};
const PRESET_WORKOUTS = {
  Tuesday:{name:"Back & Biceps",emoji:"🏋️",exercises:[{name:"Deadlifts",sets:[{reps:5,weight:225},{reps:5,weight:245},{reps:5,weight:265}]},{name:"Lat Pulldowns",sets:[{reps:10,weight:120},{reps:10,weight:130}]},{name:"Hammer Curls",sets:[{reps:12,weight:30},{reps:12,weight:35}]}]},
  Wednesday:{name:"Chest & Triceps",emoji:"💪",exercises:[{name:"Flat Bench Press",sets:[{reps:8,weight:135},{reps:8,weight:185},{reps:6,weight:205}]},{name:"Incline Dumbbell Press",sets:[{reps:10,weight:60},{reps:10,weight:65}]},{name:"Tricep Pushdowns",sets:[{reps:12,weight:50}]}]},
  Thursday:{name:"Legs Day",emoji:"🦵",exercises:[{name:"Barbell Back Squats",sets:[{reps:8,weight:185},{reps:8,weight:225},{reps:6,weight:245}]},{name:"Romanian Deadlifts",sets:[{reps:10,weight:135},{reps:10,weight:185}]}]},
  Friday:{name:"Shoulders & Abs",emoji:"⚡",exercises:[{name:"Overhead Press (OHP)",sets:[{reps:8,weight:95},{reps:8,weight:115}]},{name:"Dumbbell Lateral Raises",sets:[{reps:15,weight:20},{reps:15,weight:25}]},{name:"Hanging Leg Raises",sets:[{reps:12,weight:0},{reps:12,weight:0}]}]},
  Saturday:{name:"Grow Day",emoji:"🌱",exercises:[{name:"Bicep 21s",sets:[{reps:21,weight:45}]},{name:"Lateral Raises (Giant Set)",sets:[{reps:20,weight:15},{reps:15,weight:20}]}]},
};
const TIMER_DURATIONS = {work:25*60,short:5*60,long:15*60};
const FAILURE_REASONS = ['Tired','Distracted','Forgot','Too Hard','No Time','Other'];

/* ── HELPERS ── */
const dc = d => d==='easy'?'diff-e':d==='medium'?'diff-m':'diff-h';
const ac = a => a==='intelligence'?'atr-i':a==='strength'?'atr-s':a==='willpower'?'atr-w':'atr-t';
const al = a => a==='intelligence'?'INT':a==='strength'?'STR':a==='willpower'?'WIL':'STA';
const sc = s => s==='intelligence'?'#60a5fa':s==='strength'?'#fb923c':s==='willpower'?'#c084fc':'#34d399';
const today = () => new Date().toISOString().split('T')[0];
const yesterday = () => new Date(Date.now()-86400000).toISOString().split('T')[0];
const daysUntilSun = () => { const d=new Date().getDay(); return d===0?0:7-d; };
const weekStart = () => { const n=new Date(),d=new Date(n); d.setDate(d.getDate()-d.getDay()); return d.toISOString().split('T')[0]; };
const fmtMins = m => { const h=Math.floor(m/60),mn=m%60; return h>0?`${h}h ${mn}m`:`${mn}m`; };

/* ── PR ENGINE ── */
const checkPRs = (exercises, prs) => {
  const newNames=[]; const updated={...prs};
  for(const ex of (exercises||[])){
    if(!ex.sets?.length) continue;
    const max=Math.max(...ex.sets.map(s=>Number(s.weight)||0));
    if(max>0&&max>(updated[ex.name]||0)){newNames.push(ex.name);updated[ex.name]=max;}
  }
  return {newNames,updated};
};

/* ── MILESTONE ── */
const getMilestones = (old,nxt) => {
  const t=today(),ms=[];
  for(const k of Object.keys(nxt)){const of=Math.floor(old[k]||10),nf=Math.floor(nxt[k]||10);if(nf>of)ms.push({stat:k,milestone:nf,date:t});}
  return ms;
};

/* ── SOUND ── */
const snd = (type) => {
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext; if(!Ctx)return;
    const ctx=new Ctx(),now=ctx.currentTime;
    if(type==='complete'){const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(480,now);o.frequency.exponentialRampToValueAtTime(240,now+.12);g.gain.setValueAtTime(.02,now);g.gain.exponentialRampToValueAtTime(.001,now+.12);o.connect(g);g.connect(ctx.destination);o.start(now);o.stop(now+.12);}
    else if(type==='levelup'){[330,440,550,660].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(f,now+i*.04);g.gain.setValueAtTime(.02,now+i*.04);g.gain.exponentialRampToValueAtTime(.001,now+i*.04+.2);o.connect(g);g.connect(ctx.destination);o.start(now+i*.04);o.stop(now+i*.04+.2);});}
    else if(type==='pr'){[392,523,659,784].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='triangle';o.frequency.setValueAtTime(f,now+i*.07);g.gain.setValueAtTime(.025,now+i*.07);g.gain.exponentialRampToValueAtTime(.001,now+i*.07+.18);o.connect(g);g.connect(ctx.destination);o.start(now+i*.07);o.stop(now+i*.07+.18);});}
    else if(type==='timer'){[528,660,792].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(f,now+i*.1);g.gain.setValueAtTime(.018,now+i*.1);g.gain.exponentialRampToValueAtTime(.001,now+i*.1+.25);o.connect(g);g.connect(ctx.destination);o.start(now+i*.1);o.stop(now+i*.1+.25);});}
  }catch(e){}
};

/* ── CONFETTI ── */
function Confetti({active,onDone}){
  const ref=useRef(),fr=useRef();
  useEffect(()=>{
    if(!active)return;
    const c=ref.current; if(!c)return;
    const ctx=c.getContext('2d'); c.width=window.innerWidth; c.height=window.innerHeight;
    const W=c.width,H=c.height,COLS=['#7c3aed','#a78bfa','#f59e0b','#34d399','#60a5fa','#f472b6','#fb923c','#fff'];
    const pts=Array.from({length:130},()=>({x:Math.random()*W,y:-20-Math.random()*H*.3,vx:(Math.random()-.5)*6,vy:Math.random()*4+1.5,col:COLS[Math.floor(Math.random()*COLS.length)],w:Math.random()*9+3,h:Math.random()*5+2,a:Math.random()*Math.PI*2,sp:(Math.random()-.5)*.25,gr:.04+Math.random()*.04,dr:.98}));
    let el=0,stop=false;
    const anim=()=>{ctx.clearRect(0,0,W,H);let gone=true;pts.forEach(p=>{p.vx*=p.dr;p.vy+=p.gr;p.x+=p.vx;p.y+=p.vy;p.a+=p.sp;if(p.y<H+30)gone=false;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.a);ctx.globalAlpha=Math.max(0,1-p.y/(H*.9));ctx.fillStyle=p.col;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});el++;if(gone||el>240||stop){onDone();}else{fr.current=requestAnimationFrame(anim);}};
    fr.current=requestAnimationFrame(anim);
    const t=setTimeout(()=>{stop=true;},4000);
    return()=>{cancelAnimationFrame(fr.current);clearTimeout(t);};
  },[active]);
  if(!active)return null;
  return <canvas ref={ref} style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:9999}}/>;
}

/* ── TIMER RING ── */
function TimerRing({seconds,total,mode}){
  const R=52,CIRC=2*Math.PI*R;
  const pct=seconds/total;
  const off=CIRC*(1-pct);
  const modeColor={work:'#7c3aed',short:'#34d399',long:'#60a5fa'};
  const mins=Math.floor(seconds/60),secs=seconds%60;
  return(
    <div className="relative inline-flex items-center justify-center">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle className="timer-ring-track" cx="60" cy="60" r={R}/>
        <circle className="timer-ring-prog" cx="60" cy="60" r={R}
          stroke={modeColor[mode]}
          strokeDasharray={CIRC}
          strokeDashoffset={off}
          style={{opacity:pct>0?1:.25}}
        />
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <span className="font-display text-2xl font-bold text-zinc-100 tabular-nums">{String(mins).padStart(2,'0')}:{String(secs).padStart(2,'0')}</span>
        <span className="font-mono text-[10px] text-zinc-600 uppercase tracking-widest mt-0.5">{mode==='work'?'focus':mode==='short'?'break':'long break'}</span>
      </div>
    </div>
  );
}

/* ── FOCUS TIMER WIDGET (ISOLATED) ── */
function FocusTimerWidget({ focusToday, setFocusToday, setHistory, showToast, focusPct, codeQ, toggleQuest }) {
  const [timerMode, setTimerMode] = useState('work');
  const [timerSecs, setTimerSecs] = useState(TIMER_DURATIONS.work);
  const [timerOn, setTimerOn] = useState(false);
  
  useEffect(() => {
    if (!timerOn) return;
    const id = setInterval(() => {
      setTimerSecs(s => {
        if (s <= 1) {
          setTimerOn(false);
          // Complete Logic
          if(timerMode === 'work') {
            snd('timer');
            const newMin = focusToday.minutes + 25;
            const newSess = focusToday.sessions + 1;
            const upd = { date: today(), minutes: newMin, sessions: newSess };
            setFocusToday(upd);
            localStorage.setItem('lq_focus_v4', JSON.stringify(upd));
            setHistory(h => ({ ...h, [today()]: { ...(h[today()] || {}), focusMin: newMin } }));
            if (newMin >= 480) { showToast("🎯 8h focus reached — coding quest ready to complete!"); } 
            else { showToast(`✅ Session ${newSess} done — ${fmtMins(newMin)} / 8h today. Take a break.`); }
            setTimerMode('short');
            return TIMER_DURATIONS.short;
          } else {
            snd('complete');
            showToast("☕ Break over — back to it!");
            setTimerMode('work');
            return TIMER_DURATIONS.work;
          }
        }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(id);
  }, [timerOn, timerMode, focusToday, setFocusToday, setHistory, showToast]);

  return (
    <Card className="p-5" glow>
      <div className="flex justify-between items-center mb-4">
        <SL>Focus Timer</SL>
        <span className="font-mono text-xs text-zinc-600">{fmtMins(focusToday.minutes)} / 8h today</span>
      </div>
      <div className="flex gap-2 mb-5">
        {[['work','Work 25m'],['short','Break 5m'],['long','Long 15m']].map(([m,l])=>(
          <button key={m} onClick={()=>{if(timerOn)return;setTimerMode(m);setTimerSecs(TIMER_DURATIONS[m]);}}
            className={`timer-mode-btn flex-1 ${timerMode===m?(m==='work'?'active':m==='short'?'active-g':'active-b'):''}`}>{l}</button>
        ))}
      </div>
      <div className="flex flex-col items-center gap-5">
        <TimerRing seconds={timerSecs} total={TIMER_DURATIONS[timerMode]} mode={timerMode}/>
        <div className="flex items-center gap-3">
          <button onClick={()=>{setTimerSecs(TIMER_DURATIONS[timerMode]);setTimerOn(false);}} className="timer-btn" title="Reset">
            <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.8}><path strokeLinecap="round" strokeLinejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
          </button>
          <button onClick={()=>setTimerOn(o=>!o)} className={`timer-btn ${timerOn?'run':''}`} style={{width:'54px',height:'54px'}} title={timerOn?'Pause':'Start'}>
            {timerOn
              ?<svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/></svg>
              :<svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            }
          </button>
          <button onClick={()=>{setTimerMode(timerMode==='work'?'short':'work');setTimerSecs(timerMode==='work'?TIMER_DURATIONS.short:TIMER_DURATIONS.work);setTimerOn(false);}} className="timer-btn" title="Switch mode">
            <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.8}><path strokeLinecap="round" strokeLinejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg>
          </button>
        </div>
      </div>
      <div className="mt-5 space-y-1.5">
        <div className="flex justify-between">
          <span className="font-mono text-[10px] text-zinc-600">Coding quest progress</span>
          <span className={`font-mono text-[10px] font-semibold ${focusPct>=100?'text-green-400':'text-zinc-500'}`}>{Math.round(focusPct)}%</span>
        </div>
        <div className="focus-prog-bar"><div className="focus-prog-fill" style={{width:`${focusPct}%`}}/></div>
        {focusPct>=100&&!codeQ.completed&&(
          <button onClick={()=>toggleQuest(codeQ.id)} className="w-full mt-2 btn-p rounded-xl py-2 font-mono text-xs">✓ Complete Coding Quest Now</button>
        )}
      </div>
    </Card>
  );
}

/* ── XP CHART ── */
function XpChart({history}){
  const days=[];
  for(let i=6;i>=0;i--){const d=new Date(Date.now()-i*86400000);const s=d.toISOString().split('T')[0];const lbl=d.toLocaleDateString('en',{weekday:'short'}).slice(0,2);days.push({s,lbl,xp:history[s]?.xp||0});}
  const maxXp=Math.max(...days.map(d=>d.xp),40);
  const CH=72,BW=30,GAP=10,TW=days.length*(BW+GAP)-GAP,t=today();
  return(
    <svg viewBox={`0 0 ${TW} ${CH+26}`} width="100%" preserveAspectRatio="none" style={{overflow:'visible'}}>
      {days.map((day,i)=>{
        const x=i*(BW+GAP),bh=Math.max(4,(day.xp/maxXp)*CH),iT=day.s===t;
        return(<g key={day.s}>
          <rect x={x} y={CH} width={BW} height={2.5} rx={1.5} fill="#1a1a24"/>
          {day.xp>0?<rect x={x} y={CH-bh} width={BW} height={bh} rx={4} fill={iT?'#7c3aed':'#2a2a3e'} opacity={iT?1:.75}/>:<rect x={x} y={CH-4} width={BW} height={4} rx={2} fill="#181820"/>}
          {day.xp>0&&<text x={x+BW/2} y={CH-bh-5} textAnchor="middle" fontSize="9" fill={iT?'#a78bfa':'#4a4a5a'} fontFamily="JetBrains Mono" fontWeight="600">{day.xp}</text>}
          <text x={x+BW/2} y={CH+18} textAnchor="middle" fontSize="10" fill={iT?'#9a9aaa':'#3a3a48'} fontFamily="JetBrains Mono">{day.lbl}</text>
        </g>);
      })}
    </svg>
  );
}

/* ── WEEK HEATMAP ── */
function WeekHeatmap({history}){
  const days=[];
  for(let i=6;i>=0;i--){const d=new Date(Date.now()-i*86400000);const s=d.toISOString().split('T')[0];const xp=history[s]?.xp||0;const lbl=d.toLocaleDateString('en',{weekday:'short'}).slice(0,1);days.push({s,xp,lbl,isToday:s===today()});}
  const getColor=(xp)=>{if(xp>=120)return'#22c55e';if(xp>=60)return'#4ade80';if(xp>=20)return'#fbbf24';if(xp>0)return'#f97316';return'#1e1e28';};
  return(
    <div className="flex items-end gap-2">
      {days.map(d=>(
        <div key={d.s} className="flex flex-col items-center gap-1.5" title={`${d.s}: ${d.xp} XP`}>
          <div className="hmap-dot" style={{background:getColor(d.xp),boxShadow:d.xp>0?`0 0 6px ${getColor(d.xp)}55`:undefined,outline:d.isToday?'2px solid rgba(124,58,237,.5)':undefined,outlineOffset:'2px'}}/>
          <span className="font-mono text-[8px] text-zinc-700">{d.lbl}</span>
        </div>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════════════════ */
function App(){

      {id:4,text:"Secure 8 Hours of deep sleep",type:"day",completed:false,difficulty:"easy",attribute:"stamina",xp:20,gold:10,notes:""},
      {id:5,text:"Ship one meaningful side-project feature this week",type:"week",completed:false,difficulty:"hard",attribute:"intelligence",xp:120,gold:60,notes:""},
      {id:6,text:"Hit 4 gym sessions this week",type:"week",completed:false,difficulty:"medium",attribute:"strength",xp:80,gold:40,notes:""},
    ];
  });

  const [prs,         setPrs]         = useState(()=>JSON.parse(localStorage.getItem('lq_prs_adi_v4'))||{});
  const [rewards,     setRewards]     = useState(()=>JSON.parse(localStorage.getItem('lq_rewards_adi_v4'))||[

    {id:2,text:"Indulge in a clean cheat meal",cost:60},
    {id:3,text:"Unlock personal luxury hobby item",cost:140},
  ]);
  const [history,     setHistory]     = useState(()=>JSON.parse(localStorage.getItem('lq_history_adi_v4'))||{});
  const [milestones,  setMilestones]  = useState(()=>JSON.parse(localStorage.getItem('lq_milestones_adi_v4'))||[]);
  const [noteHistory, setNoteHistory] = useState(()=>JSON.parse(localStorage.getItem('lq_notehistory_v4'))||{});
  const [improveLog,  setImproveLog]  = useState(()=>JSON.parse(localStorage.getItem('lq_improve_v4'))||{});

  /* ── FOCUS STATE ── */
  const [focusToday, setFocusToday] = useState(()=>{
    try{const s=JSON.parse(localStorage.getItem('lq_focus_v4'));return(s&&s.date===today())?s:{date:today(),minutes:0,sessions:0};}
    catch{return{date:today(),minutes:0,sessions:0};}
  });

  /* ── SLEEP STATE ── */
  const [sleepLog,  setSleepLog]  = useState(()=>JSON.parse(localStorage.getItem('lq_sleep_v4'))||{});
  const [sleepInp,  setSleepInp]  = useState('7.5');

  const [aiInsightLoad, setAiInsightLoad] = useState(false);
  const [aiInsight,     setAiInsight]     = useState('');

  /* ── QUEST FORM STATE ── */
  const [aiPrompt,    setAiPrompt]    = useState('');
  const [aiGen,       setAiGen]       = useState(false);

  /* ── DIM MODE ── */

  useEffect(()=>{
    const ids=['dashboard','quests','gym','shop','hero','journal'];
    const fn=(e)=>{
      if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;
      if(e.key>='1'&&e.key<='6')setActiveTab(ids[+e.key-1]);
      if(e.key==='Escape'){setLvlModal(false);setConfetti(false);}
      if(e.key==='d'||e.key==='D')setDimMode(m=>!m);
    };
    window.addEventListener('keydown',fn);
    return()=>window.removeEventListener('keydown',fn);
  },[]);

  /* ── MIDNIGHT RESET + STREAK ── */
  useEffect(()=>{
    const td=today(),yd=yesterday();
    const last=localStorage.getItem('lq_last_reset');
    if(last!==td){
      const dqs=quests.filter(q=>q.type==='day');
      const allDone=dqs.length>0&&dqs.every(q=>q.completed);
      const consec=last===yd;
      setHero(h=>({...h,streak:(consec&&allDone)?h.streak+1:0}));
      // Archive notes
      if(last){
        const noted=quests.filter(q=>q.notes?.trim());
        if(noted.length>0)setNoteHistory(p=>({...p,[last]:noted.map(q=>({questText:q.text,note:q.notes,completed:q.completed,attribute:q.attribute}))}));
        // Queue incomplete quests for failure tagging
        const skipped=dqs.filter(q=>!q.completed);
        if(skipped.length>0)setPendingFails(skipped.map(q=>({questText:q.text,attribute:q.attribute})));
      }
      const isSun=new Date().getDay()===0;
      const lastWk=localStorage.getItem('lq_last_weekly_reset');
