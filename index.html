      const handleHevyUpload = async (e) => {
        const file=e.target.files?.[0]; if(!file) return;
        const apiKey=loadApiKey(); if(!apiKey) return;
        setIsVisionParsing(true); triggerToast("Parsing workout via Vision AI...");
        const reader=new FileReader();
        reader.onloadend=async()=>{
          try{
            const b64=reader.result.split(',')[1];
            const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,{
              method:"POST",headers:{"Content-Type":"application/json"},
              body:JSON.stringify({contents:[{role:"user",parts:[{text:`Parse this Hevy workout screenshot. Return ONLY JSON: {"workoutName":"name","date":"2026-05-26","exercises":[{"name":"Exercise","sets":[{"reps":10,"weight":135}]}]}`},{inlineData:{mimeType:file.type,data:b64}}]}],generationConfig:{responseMimeType:"application/json"}})
            });
            if(!res.ok){const d=await res.json();triggerToast(`Vision Error: ${d.error?.message}`);setIsVisionParsing(false);return;}
            const result=await res.json();
            const parsed=JSON.parse(result.candidates[0].content.parts[0].text);
            const freshPRs=JSON.parse(localStorage.getItem('lq_prs_adi_v4')||'{}');
            const{newPRNames,updatedPRs}=checkAndUpdatePRs(parsed.exercises||[],freshPRs);
            setExercisePRs(updatedPRs);
            const newLog={id:Date.now(),date:parsed.date||todayStr(),workoutName:`${parsed.workoutName} (Hevy Sync)`,exercises:parsed.exercises||[],prExercises:newPRNames};
            setGymLogs(prev=>[newLog,...prev]); setHero(h=>({...h,xp:h.xp+85,gold:h.gold+35}));
            if(newPRNames.length>0){playSound('pr');triggerToast(`Hevy parsed — +85 XP · +35g · 🏆 PR: ${newPRNames.join(', ')}`);}
            else triggerToast("Hevy parsed — +85 XP · +35g");
          }catch(err){triggerToast(`Vision failed: ${err.message}`);}
          finally{setIsVisionParsing(false);}
        };
        reader.readAsDataURL(file);
      };

      const triggerReset = () => { if(confirm("Nuke all data? Resets everything.")) { localStorage.clear(); window.location.reload(); } };

      /* ── IMPROVEMENT LOG ── */
      const addImprovementEntry = () => {
        if(!newImprovementText.trim()) return;
        const today=todayStr();
        setImprovementLog(prev=>({...prev,[today]:[...(prev[today]||[]),newImprovementText.trim()]}));
        setNewImprovementText(""); triggerToast("Improvement logged.");
      };
      const deleteImprovementEntry = (date,idx) => {
        setImprovementLog(prev=>{
          const updated=[...(prev[date]||[])]; updated.splice(idx,1);
          if(updated.length===0){const n={...prev};delete n[date];return n;}
          return {...prev,[date]:updated};
        });
      };

      const getTopThemes = () => {
        const stopWords=new Set(['a','an','the','to','i','my','and','or','for','in','on','at','is','it','be','of','with','that','this','want','need','more','better','less']);
        const freq={};
        Object.values(improvementLog).flat().forEach(entry=>{
          entry.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/).forEach(w=>{if(w.length>2&&!stopWords.has(w))freq[w]=(freq[w]||0)+1;});
        });
        return Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,12);
      };

      const generateAiInsight = async () => {
        const apiKey=loadApiKey(); if(!apiKey) return;
        const allEntries=Object.entries(improvementLog).map(([d,items])=>`${d}: ${items.join('; ')}`).join('\n');
        if(!allEntries.trim()){triggerToast("No improvement entries yet.");return;}
        setAiInsightLoading(true); setAiInsight("");
        try{
          const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,{
            method:"POST",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({contents:[{parts:[{text:`These are Adi's daily improvement log entries:\n${allEntries}\n\nAnalyze patterns and give 3 concise, actionable insights (each under 25 words). Be direct and personal. Format as a JSON array: {"insights":["...","...","..."]}`}]}],generationConfig:{responseMimeType:"application/json"}})
          });
          const result=await res.json();
          const data=JSON.parse(result.candidates[0].content.parts[0].text);
          if(data.insights) setAiInsight(data.insights);
        }catch(e){triggerToast(`Insight failed: ${e.message}`);}
        finally{setAiInsightLoading(false);}
      };

      /* ── DERIVED ── */
      const codingQuest = quests.find(q=>q.text.includes("8 Hours"))||{};
      const readQuest   = quests.find(q=>q.text.includes("Read book"))||{};
      const completedCount = quests.filter(q=>q.completed).length;
      const xpPct = Math.min(100,Math.round((hero.xp/hero.nextLevelXp)*100));
      const dailyQuests  = quests.filter(q=>q.type==='day');
      const weeklyQuests = quests.filter(q=>q.type==='week');
      const daysLeft = daysUntilSunday();
      const maxVolume = Math.max(...Object.values(weeklyVolume),1);

      const tabs=[
        {id:'dashboard',label:'Overview'},
        {id:'quests',   label:'Quests'},
        {id:'gym',      label:'Temple'},
        {id:'shop',     label:'Store'},
        {id:'hero',     label:'Matrix'},
        {id:'journal',  label:'Journal'},
      ];

      /* ── QUEST ROW ── */
      const QuestRow = ({q, showDragHandle=false}) => (
        <div
          className={`rounded-2xl border transition-all duration-200 ${q.completed?'border-zinc-900/30 opacity-40':'border-zinc-800/60'} ${dragQuestId===q.id?'quest-dragging':''} ${dragOverId===q.id&&dragQuestId!==q.id?'quest-drag-over':''}`}
          style={{background:q.completed?'var(--bg-empty)':'var(--bg-card)',transition:'background 0.35s ease'}}
          draggable={showDragHandle}
          onDragStart={showDragHandle?e=>handleDragStart(e,q.id):undefined}
          onDragOver={showDragHandle?e=>handleDragOver(e,q.id):undefined}
          onDrop={showDragHandle?e=>handleDrop(e,q.id):undefined}
          onDragEnd={handleDragEnd}>
          <div className="px-5 py-4 flex items-center gap-3.5">
            {showDragHandle && <DragHandle/>}
            <input type="checkbox" className="quest-check" checked={q.completed} onChange={()=>handleQuestToggle(q.id)}/>
            <span className={`text-sm flex-1 leading-relaxed ${q.completed?'line-through text-zinc-600':'text-zinc-200'}`}>{q.text}</span>
            <div className="flex items-center gap-2 flex-shrink-0">
              {q.type==='week' && <span className="text-[10px] font-mono font-semibold px-2 py-1 rounded-lg badge-weekly">WK</span>}
              <span className={`text-[10px] font-mono font-semibold px-2 py-1 rounded-lg ${attrClass(q.attribute)}`}>{attrLabel(q.attribute)}</span>
              <span className={`text-[10px] font-mono font-semibold px-2 py-1 rounded-lg ${diffClass(q.difficulty)}`}>{q.difficulty.charAt(0).toUpperCase()}</span>
              <span className="text-xs font-mono text-zinc-500">+{q.xp}</span>
              <button onClick={()=>setExpandedQuestId(expandedQuestId===q.id?null:q.id)}
                className="p-1.5 rounded-lg hover:bg-zinc-900 transition-colors text-zinc-600 hover:text-zinc-400">
                <ChevronIcon open={expandedQuestId===q.id}/>
              </button>
              <button onClick={()=>deleteQuest(q.id)} className="p-1.5 rounded-lg hover:bg-zinc-900 transition-colors"><TrashIcon/></button>
            </div>
          </div>
          <div className={`notes-expand ${expandedQuestId===q.id?'open':''}`}>
            <div className="px-5 pb-4 pt-0 border-t border-zinc-900/50">
              <textarea className="notes-textarea mt-3" value={q.notes||""} onChange={e=>updateQuestNotes(q.id,e.target.value)} placeholder="Notes, subtasks, context… (auto-saved)" rows={3}/>
            </div>
          </div>
        </div>
      );

      /* ── RENDER ── */
      return (
        <div className="min-h-screen flex flex-col relative" style={{zIndex:1}}>
          <ConfettiCanvas active={showConfetti} onDone={()=>setShowConfetti(false)}/>

          {/* HEADER */}
          <header className="header-glass sticky top-0 z-40">
            <div className="max-w-4xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between mb-4">
                <div className="flex items-center gap-3">
                  <div className="neon-dot"/>
                  <span className="font-mono text-xs font-semibold tracking-[0.22em] text-zinc-200">ADI // LIFEQUEST OS</span>
                </div>
                <div className="flex items-center gap-4">
                  <span className="level-badge px-3 py-1 rounded-lg font-mono text-xs font-semibold">LVL {hero.level}</span>
                  <div className="h-4 w-px bg-zinc-800"/>
                  <span className="gold-badge font-mono text-sm font-semibold">{hero.gold}<span className="text-zinc-600 font-normal text-xs ml-0.5">g</span></span>
                  <div className="h-4 w-px bg-zinc-800"/>
                  <span className={`flex items-center gap-1.5 font-mono text-sm font-semibold ${hero.streak>0?'text-orange-400':'text-zinc-600'}`}>
                    {hero.streak>0?'🔥':'○'} {hero.streak}<span className="text-zinc-700 font-normal text-xs">d</span>
                  </span>
                  {hero.statPoints>0 && (
                    <span className="flex items-center gap-1 text-violet-400 font-semibold font-mono text-xs animate-pulse ml-1">
                      <BoltIcon/>{hero.statPoints}
                    </span>
                  )}
                  <button onClick={()=>setDimMode(m=>!m)} title="Toggle dim mode (D)" className={`dim-toggle ${dimMode?'active':''}`}>
                    <svg className="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.8}>
                      {dimMode
                        ?<path strokeLinecap="round" strokeLinejoin="round" d="M12 3v1m0 16v1m8-9h1M3 12H2m14.95 4.95l.707.707M6.343 6.343l-.707-.707M17.657 6.343l.707-.707M6.343 17.657l-.707.707M12 7a5 5 0 110 10A5 5 0 0112 7z"/>
                        :<path strokeLinecap="round" strokeLinejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9 9 0 008.354-5.646z"/>
                      }
                    </svg>
                    {dimMode ? 'Dim' : 'Dark'}
                  </button>
                </div>
              </div>

              {/* XP Bar */}
              <div className="flex items-center gap-4 mb-4">
                <div className="flex-1"><XpBar xp={hero.xp} max={hero.nextLevelXp}/></div>
                <span className="font-mono text-xs text-zinc-500 whitespace-nowrap">{hero.xp} / {hero.nextLevelXp} XP</span>
              </div>

              {/* Tabs */}
              <div className="flex gap-1.5">
                {tabs.map((t,i)=>(
                  <button key={t.id} onClick={()=>setActiveTab(t.id)}
                    className={`px-4 py-2 rounded-xl text-xs font-mono font-medium transition-all duration-150 ${activeTab===t.id?'tab-active':'tab-inactive'}`}
                    title={`Press ${i+1}`}>
                    {t.label}
                    {t.id==='hero'&&hero.statPoints>0&&<span className="ml-1 text-violet-400">·</span>}
                  </button>
                ))}
              </div>
            </div>
          </header>

          {/* TOAST */}
          {toastMsg && (
            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 max-w-sm w-full px-4" style={{animation:'fadeSlideIn 0.22s ease-out both'}}>
              <div className="glass rounded-2xl border border-zinc-800/80 px-5 py-3.5 flex items-center gap-3 shadow-2xl">
                <div className="neon-dot-green"/>
                <span className="font-mono text-xs text-zinc-300">{toastMsg}</span>
              </div>
            </div>
          )}

          <main className="max-w-4xl mx-auto px-6 py-8 w-full flex-grow">

            {/* ══ OVERVIEW ══ */}
            {activeTab==='dashboard' && (
              <div className="tab-section space-y-6">

                {/* Hero + Stats */}
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                  <Card className="sm:col-span-1 p-6 flex flex-col justify-between gap-5" glow>
                    <div>
                      <p className="section-label mb-1" style={{marginBottom:'4px'}}>Active Hero</p>
                      <h2 className="font-display text-2xl font-700 text-zinc-100 tracking-tight mt-1">{hero.name}</h2>
                      <p className="font-mono text-xs text-zinc-500 mt-0.5">{hero.class}</p>
                    </div>
                    <div className="space-y-2">
                      <div className="flex justify-between items-center">
                        <span className="font-mono text-xs text-zinc-600">Streak</span>
                        <span className={`font-mono text-xs font-semibold ${hero.streak>0?'text-orange-400':'text-zinc-600'}`}>
                          {hero.streak>0?`🔥 ${hero.streak}d`:'0d'}
                        </span>
                      </div>
                      <StreakBar streak={hero.streak} cap={30}/>
                    </div>
                    <div className="space-y-2">
                      <div className="flex justify-between items-center">
                        <span className="font-mono text-xs text-zinc-600">XP Progress</span>
                        <span className="font-mono text-xs text-zinc-500">{xpPct}%</span>
                      </div>
                      <XpBar xp={hero.xp} max={hero.nextLevelXp}/>
                    </div>
                  </Card>

                  <div className="sm:col-span-2 grid grid-cols-2 gap-4">
                    {Object.entries(hero.stats).map(([k,v])=>(
                      <Card key={k} className="p-5 flex flex-col gap-3">
                        <div className="flex justify-between items-start">
                          <span className="font-mono text-[10px] uppercase tracking-widest text-zinc-600">{k}</span>
                          <span className="text-xl font-bold font-mono" style={{color:statColor(k)}}>{Math.floor(v)}</span>
                        </div>
                        <StatBar value={v} color={statColor(k)}/>
                      </Card>
                    ))}
                  </div>
                </div>

                {/* Weekly XP Chart */}
                <Card className="p-6">
                  <div className="flex justify-between items-center mb-5">
                    <SectionLabel>7-Day XP Trend</SectionLabel>
                    <span className="font-mono text-xs text-zinc-600">
                      {Object.values(dailyHistory).reduce((a,d)=>a+d.xp,0)} XP total
                    </span>
                  </div>
                  <WeeklyXpChart history={dailyHistory}/>
                  <div className="flex justify-between mt-3">
                    <span className="font-mono text-[10px] text-zinc-700">XP earned per day · today highlighted</span>
                    <span className="font-mono text-xs text-zinc-600">{dailyHistory[todayStr()]?.xp||0} XP today</span>
                  </div>
                </Card>

                {/* AI Decomposer */}
                <Card className="p-6">
                  <SectionLabel>AI Goal Decomposer</SectionLabel>
                  <div className="flex gap-3">
                    <input type="text" value={aiInputPrompt} onChange={e=>setAiInputPrompt(e.target.value)}
                      onKeyDown={e=>e.key==='Enter'&&callAiAgent()}
                      placeholder="Enter a goal — e.g. 'Build a REST API', 'DSA tree problems'…"
                      className="input-field flex-grow rounded-xl px-4 py-3 placeholder-zinc-700"/>
                    <button onClick={callAiAgent} disabled={isAiGenerating} className="btn-primary rounded-xl px-6 whitespace-nowrap font-mono">
                      {isAiGenerating
                        ?<span className="flex items-center gap-2"><svg className="animate-spin w-3.5 h-3.5" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>Parsing…</span>
                        :'Split Goal'}
                    </button>
                  </div>
                  <p className="font-mono text-[10px] text-zinc-700 mt-2.5">Powered by Gemini · Requires API key on first use</p>
                </Card>

                {/* Quick Status */}
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <Card className="p-5 flex items-center justify-between">
                    <div className="flex items-center gap-3.5">
                      <span className="text-xl">💻</span>
                      <span className="text-sm text-zinc-300">8 Hours Intent Coding</span>
                    </div>
                    <span className={`font-mono text-xs font-semibold px-3 py-1.5 rounded-xl ${codingQuest.completed?'text-green-400 bg-green-400/8 border border-green-400/18':'text-zinc-600 bg-zinc-900 border border-zinc-800/60'}`}>
                      {codingQuest.completed?'✓ Done':'Pending'}
                    </span>
                  </Card>
                  <Card className="p-5 flex items-center justify-between">
                    <div className="flex items-center gap-3.5">
                      <span className="text-xl">📚</span>
                      <span className="text-sm text-zinc-300">Books over Scrolling</span>
                    </div>
                    <span className={`font-mono text-xs font-semibold px-3 py-1.5 rounded-xl ${readQuest.completed?'text-green-400 bg-green-400/8 border border-green-400/18':'text-zinc-600 bg-zinc-900 border border-zinc-800/60'}`}>
                      {readQuest.completed?'✓ Done':'Pending'}
                    </span>
                  </Card>
                </div>

                {/* Daily Ledger */}
                <div>
                  <div className="flex justify-between items-center mb-4">
                    <SectionLabel>Daily Ledger — {completedCount}/{quests.length} complete</SectionLabel>
                    <button onClick={archiveCompletedDailies} className="font-mono text-xs text-zinc-600 hover:text-zinc-400 transition-colors underline underline-offset-2">Archive done</button>
                  </div>
                  {quests.length===0
                    ?<EmptyState icon="📋" title="No active quests" sub="Add some from the Quests tab."/>
                    :<div className="space-y-2.5">{quests.map(q=><QuestRow key={q.id} q={q}/>)}</div>
                  }
                </div>

                {/* Shortcuts */}
                <div className="flex items-center gap-2.5 pt-1 flex-wrap">
                  <span className="font-mono text-[10px] text-zinc-700">Shortcuts:</span>
                  {tabs.slice(0,5).map((t,i)=>(
                    <span key={t.id} className="flex items-center gap-1.5">
                      <kbd className="kbd">{i+1}</kbd>
                      <span className="font-mono text-[10px] text-zinc-700">{t.label}</span>
                    </span>
                  ))}
                  <kbd className="kbd ml-1">D</kbd><span className="font-mono text-[10px] text-zinc-700">dim</span>
                  <kbd className="kbd">Esc</kbd><span className="font-mono text-[10px] text-zinc-700">close</span>
                </div>
              </div>
            )}

            {/* ══ QUESTS TAB ══ */}
            {activeTab==='quests' && (
              <div className="tab-section space-y-6">
                <Card className="p-6" glow>
                  <SectionLabel>Forge Custom Quest</SectionLabel>
                  <form onSubmit={handleManualQuestAdd} className="space-y-4">
                    <input type="text" value={newQuestText} onChange={e=>setNewQuestText(e.target.value)}
                      placeholder="Describe the quest objective…"
                      className="input-field w-full rounded-xl px-4 py-3 placeholder-zinc-700"/>
                    <div className="grid grid-cols-3 gap-3">
                      {[
                        {val:newQuestType,      set:setNewQuestType,      opts:[['day','Daily'],['week','Weekly']]},
                        {val:newQuestDifficulty,set:setNewQuestDifficulty,opts:[['easy','Easy'],['medium','Medium'],['hard','Hard']]},
                        {val:newQuestAttr,      set:setNewQuestAttr,      opts:[['intelligence','Intellect'],['strength','Strength'],['willpower','Willpower'],['stamina','Stamina']]},
                      ].map((sel,i)=>(
                        <select key={i} value={sel.val} onChange={e=>sel.set(e.target.value)}
                          className="input-field rounded-xl px-3.5 py-3 font-mono cursor-pointer">
                          {sel.opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}
                        </select>
                      ))}
                    </div>
                    <p className="font-mono text-xs text-zinc-600">
                      {newQuestType==='week'?`Weekly · ${daysLeft===0?'resets tonight':`${daysLeft}d until reset`}`:'Daily · resets at midnight'}
                    </p>
                    <button type="submit" className="btn-primary w-full rounded-xl py-3 font-mono">Add to Board</button>
                  </form>
                </Card>

                <p className="font-mono text-[11px] text-zinc-700 -mt-2">↕ Drag the grip icon to reorder · Click ∨ to add notes</p>

                {weeklyQuests.length>0 && (
                  <div>
                    <div className="flex items-center justify-between mb-4">
                      <SectionLabel>Weekly Quests — {weeklyQuests.filter(q=>q.completed).length}/{weeklyQuests.length}</SectionLabel>
                      <span className="font-mono text-xs badge-weekly px-2.5 py-1 rounded-lg">{daysLeft===0?'resets tonight':`${daysLeft}d left`}</span>
                    </div>
                    <div className="space-y-2.5">{weeklyQuests.map(q=><QuestRow key={q.id} q={q} showDragHandle/>)}</div>
                  </div>
                )}

                <div>
                  <SectionLabel>Daily Quests — {dailyQuests.filter(q=>q.completed).length}/{dailyQuests.length}</SectionLabel>
                  {dailyQuests.length===0
                    ?<EmptyState icon="⚔️" title="No daily quests" sub="Forge a quest above or use the AI decomposer."/>
                    :<div className="space-y-2.5">{dailyQuests.map(q=><QuestRow key={q.id} q={q} showDragHandle/>)}</div>
                  }
                </div>
              </div>
            )}

            {/* ══ GYM TAB ══ */}
            {activeTab==='gym' && (
              <div className="tab-section space-y-8">
                <div>
                  <SectionLabel>Weekly Split — Tap to Log</SectionLabel>
                  <div className="grid grid-cols-2 sm:grid-cols-5 gap-3">
                    {Object.entries(PRESET_WORKOUTS).map(([day,data])=>(
                      <button key={day} onClick={()=>triggerPresetWorkoutLog(day)}
                        className="day-card rounded-2xl p-5 text-left space-y-2.5 group">
                        <div className="flex justify-between items-center">
                          <span className="font-mono text-[9px] text-zinc-700 uppercase tracking-widest">{day}</span>
                          <span className="text-lg opacity-55 group-hover:opacity-100 transition-opacity">{data.emoji}</span>
                        </div>
                        <p className="text-sm font-semibold text-zinc-200 leading-snug">{data.name}</p>
                        <p className="font-mono text-[11px] text-zinc-600">{data.exercises.length} exercises</p>
                      </button>
                    ))}
                  </div>
                </div>

                {Object.keys(exercisePRs).length>0 && (
                  <div>
                    <SectionLabel>Personal Records 🏆</SectionLabel>
                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-2.5">
                      {Object.entries(exercisePRs).sort((a,b)=>b[1]-a[1]).map(([name,weight])=>(
                        <div key={name} className="rounded-2xl px-4 py-3.5 flex items-center justify-between gap-2"
                          style={{background:'var(--bg-day-card)',border:'1.5px solid rgba(251,191,36,0.14)',transition:'background 0.35s ease'}}>
                          <span className="font-mono text-xs text-zinc-400 leading-snug truncate">{name}</span>
                          <span className="text-sm font-bold font-mono text-yellow-400 flex-shrink-0">{weight}<span className="text-zinc-600 font-normal text-[10px]">lb</span></span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {Object.keys(weeklyVolume).length>0 && (
                  <Card className="p-6">
                    <div className="flex justify-between items-center mb-5">
                      <SectionLabel>Weekly Volume</SectionLabel>
                      <span className="font-mono text-xs text-zinc-600">{Object.values(weeklyVolume).reduce((a,b)=>a+b,0).toLocaleString()} lbs total</span>
                    </div>
                    <div className="space-y-3.5">
                      {Object.entries(weeklyVolume).sort((a,b)=>b[1]-a[1]).map(([group,vol])=>(
                        <div key={group} className="flex items-center gap-4">
                          <span className="font-mono text-xs w-20 flex-shrink-0" style={{color:MUSCLE_COLORS[group]||'#6a6a78'}}>{group}</span>
                          <div className="vol-bar-bg"><div className="vol-bar-fill" style={{width:`${(vol/maxVolume)*100}%`,background:MUSCLE_COLORS[group]||'#4a4a58'}}/></div>
                          <span className="font-mono text-xs text-zinc-600 w-16 text-right flex-shrink-0">{vol.toLocaleString()} lbs</span>
                        </div>
                      ))}
                    </div>
                  </Card>
                )}

                <Card className="p-7 text-center space-y-5">
                  <div className="space-y-1.5">
                    <p className="text-base font-semibold text-zinc-200">Hevy Screenshot Parser</p>
                    <p className="font-mono text-xs text-zinc-600">Vision AI reads your Hevy workout summary and auto-catalogs it</p>
                  </div>
                  <button onClick={()=>fileInputRef.current.click()} disabled={isVisionParsing}
                    className="btn-ghost rounded-xl px-6 py-3 font-mono inline-flex items-center gap-2.5">
                    {isVisionParsing
                      ?<><svg className="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>Scanning…</>
                      :<><svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.5}><path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>Upload Screenshot</>
                    }
                  </button>
                  <input type="file" accept="image/*" ref={fileInputRef} onChange={handleHevyUpload} className="hidden"/>
                  <p className="font-mono text-[11px] text-zinc-700">+85 XP · +35g per parse · PR flags auto-detected · volume auto-tracked</p>
                </Card>

                <div>
                  <SectionLabel>Workout Log — {gymLogs.length} sessions</SectionLabel>
                  {gymLogs.length===0
                    ?<EmptyState icon="🏛️" title="No sessions logged yet" sub="Tap a split above or upload a Hevy screenshot."/>
                    :<div className="space-y-3">
                      {gymLogs.map(log=>(
                        <Card key={log.id} className="p-5 space-y-4">
                          <div className="flex justify-between items-start border-b border-zinc-900/60 pb-3">
                            <div className="flex items-center gap-2.5">
                              <span className="text-sm font-semibold text-zinc-200">{log.workoutName}</span>
                              {log.prExercises&&log.prExercises.length>0&&<span className="font-mono text-[9px] font-bold px-2 py-0.5 rounded-lg badge-pr">🏆 PR</span>}
                            </div>
                            <div className="flex items-center gap-2.5">
                              <span className="font-mono text-xs text-zinc-600">{log.date}</span>
                              <button onClick={()=>deleteGymLog(log.id)} className="p-1.5 rounded-lg hover:bg-zinc-900 transition-colors"><TrashIcon/></button>
                            </div>
                          </div>
                          <div className="space-y-2">
                            {log.exercises.map((ex,i)=>(
                              <div key={i} className="flex justify-between items-center">
                                <span className="font-mono text-xs text-zinc-500 flex items-center gap-2">
                                  {ex.name}
                                  {log.prExercises?.includes(ex.name)&&<span className="font-mono text-[8px] font-bold px-1.5 py-0.5 rounded badge-pr">PR</span>}
                                </span>
                                <span className="font-mono text-xs text-zinc-600">{ex.sets.map(s=>`${s.reps}×${s.weight}lbs`).join('  ')}</span>
                              </div>
                            ))}
                          </div>
                        </Card>
                      ))}
                    </div>
                  }
                </div>
              </div>
            )}

            {/* ══ STORE TAB ══ */}
            {activeTab==='shop' && (
              <div className="tab-section space-y-6">
                <Card className="p-6 flex items-center justify-between" glow>
                  <div>
                    <p className="section-label mb-1" style={{marginBottom:'4px'}}>Gold Balance</p>
                    <p className="font-display text-3xl font-bold gold-badge mt-1">{hero.gold}<span className="text-base font-normal text-zinc-600 ml-1.5">g</span></p>
                  </div>
                  <div className="text-right">
                    <p className="section-label mb-1" style={{marginBottom:'4px'}}>Earned Today</p>
                    <p className="font-mono text-sm text-zinc-500 mt-1">{dailyHistory[todayStr()]?.gold||0}g from quests</p>
                  </div>
                </Card>

                <Card className="p-6">
                  <SectionLabel>Stock New Reward</SectionLabel>
                  <form onSubmit={handleAddReward} className="flex gap-3">
                    <input type="text" value={customRewardName} onChange={e=>setCustomRewardName(e.target.value)}
                      placeholder="Reward description…"
                      className="input-field flex-grow rounded-xl px-4 py-3 placeholder-zinc-700"/>
                    <input type="number" value={customRewardCost} onChange={e=>setCustomRewardCost(e.target.value)}
                      className="input-field w-20 rounded-xl px-3 font-mono text-center"/>
                    <button type="submit" className="btn-primary rounded-xl px-5 font-mono whitespace-nowrap">Add</button>
                  </form>
                </Card>

                <div>
                  <SectionLabel>Merchant Inventory</SectionLabel>
                  {rewards.length===0
                    ?<EmptyState icon="🏪" title="Store is empty" sub="Stock some rewards above."/>
                    :<div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                      {rewards.map(r=>(
                        <div key={r.id} className="reward-card rounded-2xl p-5 flex items-center justify-between gap-4">
                          <span className="text-sm text-zinc-200 leading-relaxed">{r.text}</span>
                          <button onClick={()=>purchaseReward(r.id,r.cost,r.text)}
                            className={`flex-shrink-0 rounded-xl px-4 py-2 font-mono text-xs font-semibold transition-all ${hero.gold>=r.cost?'gold-badge bg-yellow-400/8 border border-yellow-400/22 hover:bg-yellow-400/16 cursor-pointer':'text-zinc-700 bg-zinc-900 border border-zinc-800 cursor-not-allowed opacity-50'}`}>
                            {r.cost}g
                          </button>
                        </div>
                      ))}
                    </div>
                  }
                </div>
              </div>
            )}

            {/* ══ HERO / MATRIX TAB ══ */}
            {activeTab==='hero' && (
              <div className="tab-section space-y-6">
                <Card className="p-6" glow>
                  <div className="flex justify-between items-start">
                    <div>
                      <p className="section-label mb-1" style={{marginBottom:'4px'}}>Character Matrix</p>
                      <h2 className="font-display text-2xl font-bold text-zinc-100 mt-1">Adi <span className="text-zinc-500 text-lg font-normal">— {hero.class}</span></h2>
                    </div>
                    <div className="level-badge px-4 py-2.5 rounded-xl text-right">
                      <p className="font-mono text-[10px] text-violet-500 uppercase tracking-widest">Level</p>
                      <p className="font-display text-2xl font-bold text-violet-300 leading-tight">{hero.level}</p>
                    </div>
                  </div>
                  <div className="mt-5 space-y-2">
                    <div className="flex justify-between items-center">
                      <span className="font-mono text-xs text-zinc-600">Current streak</span>
                      <span className={`font-mono text-sm font-bold ${hero.streak>0?'text-orange-400':'text-zinc-600'}`}>
                        {hero.streak>0?`🔥 ${hero.streak} day${hero.streak>1?'s':''}`:'No active streak'}
                      </span>
                    </div>
                    <StreakBar streak={hero.streak} cap={30}/>
                    <p className="font-mono text-[11px] text-zinc-700 pt-1">Complete all daily quests before midnight to extend your streak</p>
                  </div>
                  {hero.statPoints>0 && (
                    <div className="mt-5 flex items-center gap-2.5 p-4 rounded-xl" style={{background:'rgba(124,58,237,0.09)',border:'1.5px solid rgba(124,58,237,0.22)'}}>
                      <BoltIcon/>
                      <span className="font-mono text-sm text-violet-300 font-semibold">{hero.statPoints} unallocated matrix shard{hero.statPoints>1?'s':''} available</span>
                    </div>
                  )}
                </Card>

                <div>
                  <SectionLabel>Attribute Matrix</SectionLabel>
                  <div className="space-y-3">
                    {Object.entries(hero.stats).map(([stat,val])=>(
                      <Card key={stat} className="px-6 py-5 flex items-center gap-5">
                        <div className="w-24 flex-shrink-0">
                          <span className="text-sm font-semibold capitalize" style={{color:statColor(stat)}}>{stat}</span>
                        </div>
                        <StatBar value={val} color={statColor(stat)}/>
                        <div className="flex items-center gap-3 flex-shrink-0">
                          <span className="text-xl font-bold font-mono w-10 text-right" style={{color:statColor(stat)}}>{Math.floor(val)}</span>
                          {hero.statPoints>0 && (
                            <button onClick={()=>handleStatBoost(stat)}
                              className="font-mono text-xs font-semibold px-3 py-1.5 rounded-xl transition-all"
                              style={{background:'rgba(124,58,237,0.1)',border:'1.5px solid rgba(124,58,237,0.28)',color:'#a78bfa'}}
                              onMouseEnter={e=>e.currentTarget.style.background='rgba(124,58,237,0.2)'}
                              onMouseLeave={e=>e.currentTarget.style.background='rgba(124,58,237,0.1)'}>
                              +1
                            </button>
                          )}
                        </div>
                      </Card>
                    ))}
                  </div>
                </div>

                {statMilestones.length>0 && (
                  <div>
                    <SectionLabel>Stat Milestone Log</SectionLabel>
                    <div className="space-y-2">
                      {statMilestones.slice(0,12).map((m,i)=>(
                        <div key={i} className="milestone-chip rounded-xl px-4 py-3 flex items-center justify-between">
                          <div className="flex items-center gap-3">
                            <span className={`font-mono text-[10px] font-bold px-2 py-0.5 rounded-lg ${attrClass(m.stat)}`}>{attrLabel(m.stat)}</span>
                            <span className="text-sm">
                              <span style={{color:statColor(m.stat)}} className="font-semibold">{m.stat}</span>
                              {' '}reached <span className="font-bold text-zinc-200">{m.milestone}</span>
                            </span>
                          </div>
                          <span className="font-mono text-xs text-zinc-600">{m.date}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                {statMilestones.length===0 && <EmptyState icon="📈" title="No milestones yet" sub="Complete quests to raise your stats and unlock milestone records."/>}

                <Card className="p-6 space-y-6">
                  <div>
                    <SectionLabel>API Configuration</SectionLabel>
                    <button onClick={()=>{localStorage.removeItem("adi_gemini_key");triggerToast("API key purged.");}} className="btn-ghost rounded-xl px-5 py-2.5 font-mono">Purge Cached API Key</button>
                  </div>
                  <div className="border-t border-zinc-900/60 pt-5">
                    <p className="font-mono text-[10px] text-red-500/60 uppercase tracking-widest mb-3">Danger Zone</p>
                    <button onClick={triggerReset} className="btn-danger rounded-xl px-5 py-2.5 font-mono">Hard Reset All Data</button>
                    <p className="font-mono text-[11px] text-zinc-700 mt-2.5">Wipes all quests, logs, PRs, rewards, history, and hero data.</p>
                  </div>
                </Card>
              </div>
            )}

            {/* ══ JOURNAL TAB ══ */}
            {activeTab==='journal' && (
              <div className="tab-section space-y-7">
                <Card className="p-6" glow>
                  <div className="flex items-center justify-between mb-1">
                    <SectionLabel>Today's Improvement Log</SectionLabel>
                    <span className="font-mono text-xs text-zinc-600">{todayStr()}</span>
                  </div>
                  <p className="text-sm text-zinc-500 mb-5 leading-relaxed">What do you want to get better at today? Log it and track the patterns over time.</p>
                  <div className="flex gap-3">
                    <input type="text" value={newImprovementText} onChange={e=>setNewImprovementText(e.target.value)}
                      onKeyDown={e=>e.key==='Enter'&&addImprovementEntry()}
                      placeholder="e.g. Stay off phone during deep work, finish tasks before starting new ones…"
                      className="input-field flex-grow rounded-xl px-4 py-3 placeholder-zinc-700"/>
                    <button onClick={addImprovementEntry} className="btn-primary rounded-xl px-5 font-mono whitespace-nowrap">Log</button>
                  </div>
                  {(improvementLog[todayStr()]||[]).length>0 && (
                    <div className="mt-5 space-y-2.5">
                      {(improvementLog[todayStr()]||[]).map((entry,i)=>(
                        <div key={i} className="flex items-start gap-3.5 rounded-xl px-4 py-3.5"
                          style={{background:'var(--bg-input)',border:'1.5px solid var(--border-base)'}}>
                          <span className="text-violet-500 mt-0.5 flex-shrink-0 font-mono font-bold text-[11px]">{String(i+1).padStart(2,'0')}</span>
                          <span className="text-sm text-zinc-200 flex-1 leading-relaxed">{entry}</span>
                          <button onClick={()=>deleteImprovementEntry(todayStr(),i)} className="flex-shrink-0 p-1 rounded-lg hover:bg-zinc-900 transition-colors mt-0.5"><TrashIcon/></button>
                        </div>
                      ))}
                    </div>
                  )}
                  {(improvementLog[todayStr()]||[]).length===0 && (
                    <p className="mt-4 font-mono text-xs text-zinc-700 text-center py-2">Nothing logged yet today — set your first intention above.</p>
                  )}
                </Card>

                {Object.keys(improvementLog).length>0 && (
                  <Card className="p-6">
                    <div className="flex items-center justify-between mb-5">
                      <SectionLabel>Recurring Themes</SectionLabel>
                      <button onClick={generateAiInsight} disabled={aiInsightLoading}
                        className="btn-ghost rounded-xl px-4 py-2 font-mono text-xs inline-flex items-center gap-2">
                        {aiInsightLoading
                          ?<><svg className="animate-spin w-3 h-3" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>Analyzing…</>
                          :'✦ AI Insights'
                        }
                      </button>
                    </div>
                    <div className="flex flex-wrap gap-2 mb-5">
                      {getTopThemes().map(([word,count])=>(
                        <span key={word} className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-xl font-mono text-[11px]"
                          style={{
                            background:`rgba(124,58,237,${Math.min(0.18,0.05+count*0.04)})`,
                            border:`1.5px solid rgba(124,58,237,${Math.min(0.35,0.1+count*0.07)})`,
                            color:`rgba(167,139,250,${Math.min(1,0.6+count*0.1)})`,
                          }}>
                          {word}<span className="text-violet-700 text-[9px]">×{count}</span>
                        </span>
                      ))}
                    </div>
                    {Array.isArray(aiInsight)&&aiInsight.length>0&&(
                      <div className="space-y-2.5 border-t border-zinc-900/60 pt-5">
                        <p className="font-mono text-xs text-violet-500 uppercase tracking-widest mb-4">AI Analysis</p>
                        {aiInsight.map((insight,i)=>(
                          <div key={i} className="flex gap-3.5 rounded-xl px-4 py-3.5"
                            style={{background:'rgba(124,58,237,0.07)',border:'1.5px solid rgba(124,58,237,0.14)'}}>
                            <span className="text-violet-600 font-bold font-mono text-xs flex-shrink-0 mt-0.5">{i+1}.</span>
                            <span className="text-sm text-zinc-200 leading-relaxed">{insight}</span>
                          </div>
                        ))}
                      </div>
                    )}
                    <p className="font-mono text-[11px] text-zinc-700 mt-4">
                      {Object.values(improvementLog).flat().length} entries across {Object.keys(improvementLog).length} day{Object.keys(improvementLog).length!==1?'s':''} · AI insights require Gemini API key
                    </p>
                  </Card>
                )}

                <div>
                  <div className="flex items-center justify-between mb-4">
                    <SectionLabel>Quest Note Archive</SectionLabel>
                    <span className="font-mono text-xs text-zinc-600">{Object.keys(noteHistory).length} day{Object.keys(noteHistory).length!==1?'s':''} archived</span>
                  </div>
                  {Object.keys(noteHistory).length===0
                    ?<EmptyState icon="📓" title="No archived notes yet" sub="Add notes to quests via the ∨ chevron — they'll be saved here automatically at midnight reset."/>
                    :<div className="space-y-3">
                      {Object.entries(noteHistory).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,14).map(([date,entries])=>(
                        <Card key={date} className="overflow-hidden">
                          <button onClick={()=>setJournalViewDate(journalViewDate===date?null:date)}
                            className="w-full px-5 py-4 flex items-center justify-between hover:bg-zinc-900/30 transition-colors">
                            <div className="flex items-center gap-3.5">
                              <span className="font-mono text-sm font-semibold text-zinc-300">{date}</span>
                              <span className="font-mono text-xs text-zinc-600">{entries.length} note{entries.length!==1?'s':''} · {entries.filter(e=>e.completed).length} completed</span>
                            </div>
                            <ChevronIcon open={journalViewDate===date}/>
                          </button>
                          {journalViewDate===date&&(
                            <div className="border-t border-zinc-900/60 px-5 pb-5 space-y-4 pt-4">
                              {entries.map((e,i)=>(
                                <div key={i} className="space-y-1.5">
                                  <div className="flex items-center gap-2.5">
                                    <span className={`font-mono text-[10px] font-bold px-2 py-0.5 rounded-lg ${attrClass(e.attribute)}`}>{attrLabel(e.attribute)}</span>
                                    <span className={`text-sm ${e.completed?'text-green-400':'text-zinc-500'}`}>{e.completed?'✓ ':''}{e.questText}</span>
                                  </div>
                                  <p className="font-mono text-xs text-zinc-500 leading-relaxed pl-14 italic">"{e.note}"</p>
                                </div>
                              ))}
                            </div>
                          )}
                        </Card>
                      ))}
                    </div>
                  }
                </div>

                {Object.keys(improvementLog).filter(d=>d!==todayStr()).length>0&&(
                  <div>
                    <SectionLabel>Past Improvement Entries</SectionLabel>
                    <div className="space-y-2.5">
                      {Object.entries(improvementLog).filter(([d])=>d!==todayStr()).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,10).map(([date,entries])=>(
                        <div key={date} className="rounded-2xl px-5 py-4 space-y-2"
                          style={{background:'var(--bg-card)',border:'1.5px solid var(--border-card)'}}>
                          <p className="font-mono text-[10px] text-zinc-600 uppercase tracking-widest">{date}</p>
                          {entries.map((entry,i)=>(
                            <p key={i} className="text-sm text-zinc-400 leading-relaxed flex gap-2.5">
                              <span className="text-violet-700 flex-shrink-0">—</span>{entry}
                            </p>
                          ))}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

          </main>

          {/* LEVEL UP MODAL */}
          {levelUpModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
              style={{background:'rgba(10,10,13,0.92)',backdropFilter:'blur(18px)'}}>
              <div className="max-w-sm w-full rounded-3xl p-8 text-center space-y-6 glow-border"
                style={{background:'var(--bg-card)',animation:'scaleIn 0.25s ease-out both'}}>
                <div className="mx-auto w-18 h-18 rounded-full flex items-center justify-center mb-2"
                  style={{width:'72px',height:'72px',background:'radial-gradient(circle, rgba(124,58,237,0.2) 0%, transparent 70%)',border:'1.5px solid rgba(124,58,237,0.3)'}}>
                  <span className="text-3xl">⚡</span>
                </div>
                <div>
                  <p className="font-mono text-xs text-violet-500 uppercase tracking-widest mb-2">Matrix Upgrade</p>
                  <h3 className="font-display text-2xl font-bold text-zinc-100">Level {hero.level} Reached</h3>
                  <p className="text-sm text-zinc-500 mt-3 leading-relaxed">3 attribute shards earned. Allocate them in the Matrix tab to sharpen your stats.</p>
                </div>
                <div className="flex gap-3">
                  <button onClick={()=>setLevelUpModal(false)} className="btn-ghost flex-1 rounded-2xl py-3.5 font-mono">Dismiss</button>
                  <button onClick={()=>{setLevelUpModal(false);setActiveTab('hero');}} className="btn-primary flex-1 rounded-2xl py-3.5 font-mono">Open Matrix</button>
                </div>
                <p className="font-mono text-xs text-zinc-700">Press <kbd className="kbd">Esc</kbd> to close</p>
              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
