  useEffect(() => { localStorage.setItem('lq_sleep_v4', JSON.stringify(sleepLog)); }, [sleepLog]);
  useEffect(() => { localStorage.setItem('lq_reflections_v4', JSON.stringify(reflections)); }, [reflections]);
  useEffect(() => { localStorage.setItem('lq_failures_v4', JSON.stringify(failureLog)); }, [failureLog]);
  useEffect(() => { localStorage.setItem('lq_focus_v4', JSON.stringify(focusToday)); }, [focusToday]);

  const showToast=(m)=>{setToast(m);setTimeout(()=>setToast(''),4500);};

  /* ── QUEST TOGGLE ── */
  const toggleQuest=(id)=>{
    snd('complete');
    setQuests(prev=>prev.map(q=>{
      if(q.id!==id)return q;
      const completing=!q.completed;
      if(completing){const td=today();setHistory(h=>({...h,[td]:{xp:(h[td]?.xp||0)+q.xp,gold:(h[td]?.gold||0)+q.gold}}));}
      setHero(h=>{
        const xpD=completing?q.xp:-q.xp,gD=completing?q.gold:-q.gold;
        let nx=h.xp+xpD,ng=Math.max(0,h.gold+gD),nl=h.level,tx=h.nextLevelXp,rl=false;
        if(nx>=tx){nx-=tx;nl++;tx=nl*300;rl=true;snd('levelup');setLvlModal(true);setConfetti(true);}
        else if(nx<0)nx=0;
        const os={...h.stats},ns={...h.stats};
        if(completing&&q.attribute)ns[q.attribute]=(ns[q.attribute]||10)+(q.difficulty==='hard'?1:.4);
        if(completing){const ms=getMilestones(os,ns);if(ms.length>0)setMilestones(p=>[...ms,...p].slice(0,50));}
        return{...h,xp:Math.round(nx),gold:ng,level:nl,nextLevelXp:tx,stats:ns,statPoints:rl?h.statPoints+3:h.statPoints};
      });
      if(completing)showToast(`Quest complete — +${q.xp} XP · +${q.gold}g`);
      return{...q,completed:completing};
    }));
  };

  /* ── DRAG ── */
  const onDragStart=(e,id)=>{setDragId(id);e.dataTransfer.effectAllowed='move';};
  const onDragOver=(e,id)=>{e.preventDefault();setOverId(id);};
  const onDrop=(e,tid)=>{
    e.preventDefault();
    if(!dragId||dragId===tid){setDragId(null);setOverId(null);return;}
    setQuests(p=>{const a=[...p],fi=a.findIndex(q=>q.id===dragId),ti=a.findIndex(q=>q.id===tid);if(fi<0||ti<0)return p;const[m]=a.splice(fi,1);a.splice(ti,0,m);return a;});
    setDragId(null);setOverId(null);
  };

  /* ── SLEEP ── */
  const logSleep=()=>{
    const h=parseFloat(sleepInp);if(isNaN(h)||h<0||h>24)return;
    setSleepLog(p=>({...p,[today()]:h}));
    showToast(`Sleep logged: ${h}h — ${h>=7.5?'good recovery':'monitoring debt...'}`);
  };
  const sleepDebt=useMemo(()=>{
    let d=0;for(let i=1;i<=7;i++){const dt=new Date(Date.now()-i*86400000).toISOString().split('T')[0];const h=sleepLog[dt];if(h!==undefined)d+=Math.max(0,8-h);}return Math.round(d*10)/10;
  },[sleepLog]);
  const last7Sleep=useMemo(()=>{
    const days=[];for(let i=6;i>=0;i--){const dt=new Date(Date.now()-i*86400000).toISOString().split('T')[0];days.push({date:dt,hours:sleepLog[dt]??null});}return days;
  },[sleepLog]);

  /* ── GYM ── */
  const logPreset=(day)=>{
    const p=PRESET_WORKOUTS[day];if(!p)return;
    const{newNames,updated}=checkPRs(p.exercises,prs);
    setPrs(updated);
    setGymLogs(l=>[{id:Date.now(),date:today(),workoutName:`${p.name} (${day})`,exercises:p.exercises,prExercises:newNames},...l]);
    setHero(h=>({...h,xp:h.xp+60,gold:h.gold+20}));
    if(newNames.length>0){snd('pr');showToast(`🏆 PR: ${newNames.join(', ')} — +60 XP · +20g`);}
    else showToast(`Split logged: ${p.name} — +60 XP · +20g`);
  };
  const deleteLog=(id)=>{setGymLogs(p=>p.filter(l=>l.id!==id));showToast("Session removed.");};

  /* ── EXERCISE PROGRESSION ── */
  const exProgression=useMemo(()=>{
    const byEx={};
    gymLogs.forEach(log=>{
      (log.exercises||[]).forEach(ex=>{
        if(!byEx[ex.name])byEx[ex.name]=[];
        const max=Math.max(...ex.sets.map(s=>Number(s.weight)||0));
        byEx[ex.name].push({date:log.date,max,volume:ex.sets.reduce((s,t)=>s+(Number(t.reps)||0)*(Number(t.weight)||0),0)});
      });
    });
    Object.keys(byEx).forEach(n=>{byEx[n]=byEx[n].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,4);});
    return byEx;
  },[gymLogs]);

  const weeklyVol=useMemo(()=>{
    const ws=weekStart(),tw=gymLogs.filter(l=>l.date>=ws),bg={};
    tw.forEach(log=>(log.exercises||[]).forEach(ex=>{const g=MUSCLE_MAP[ex.name]||'Other';const v=(ex.sets||[]).reduce((s,t)=>s+(Number(t.reps)||0)*(Number(t.weight)||0),0);bg[g]=(bg[g]||0)+v;}));
    return bg;
  },[gymLogs]);

  /* ── HEVY UPLOAD ── */
  const hevyUpload=async(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    const key=loadKey();if(!key)return;
    setVisionParse(true);showToast("Parsing workout via Vision AI...");
    const rd=new FileReader();
    rd.onloadend=async()=>{
      try{
        const b64=rd.result.split(',')[1];
        const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{role:"user",parts:[{text:`Parse this Hevy workout screenshot. Return ONLY JSON: {"workoutName":"name","date":"${today()}","exercises":[{"name":"Exercise","sets":[{"reps":10,"weight":135}]}]}`},{inlineData:{mimeType:file.type,data:b64}}]}],generationConfig:{responseMimeType:"application/json"}})});
        const r=await res.json();const parsed=JSON.parse(r.candidates[0].content.parts[0].text);
        const fp=JSON.parse(localStorage.getItem('lq_prs_adi_v4')||'{}');
        const{newNames,updated}=checkPRs(parsed.exercises||[],fp);setPrs(updated);
        setGymLogs(p=>[{id:Date.now(),date:parsed.date||today(),workoutName:`${parsed.workoutName} (Hevy Sync)`,exercises:parsed.exercises||[],prExercises:newNames},...p]);
        setHero(h=>({...h,xp:h.xp+85,gold:h.gold+35}));
        if(newNames.length>0){snd('pr');showToast(`Hevy parsed — +85 XP · +35g · 🏆 PR: ${newNames.join(', ')}`);}
        else showToast("Hevy parsed — +85 XP · +35g");
      }catch(err){showToast(`Vision failed: ${err.message}`);}
      finally{setVisionParse(false);}
    };
    rd.readAsDataURL(file);
  };

  /* ── FAILURE TAGGING ── */
  const submitFailureTags=()=>{
    if(Object.keys(failTags).length===0){setPendingFails([]);return;}
    const yd=yesterday();
    setFailureLog(p=>({...p,[yd]:[...Object.entries(failTags).map(([qt,reason])=>({questText:qt,reason}))]}));
    setPendingFails([]);setFailTags({});
    showToast("Failure reasons saved — feeding into pattern analysis.");
  };

  /* ── REFLECTION ── */
  const saveReflection=()=>{
    if(!reflDraft.trim())return;
    setReflections(p=>({...p,[today()]:{text:reflDraft,timestamp:Date.now()}}));
    setReflDraft('');showToast("Reflection saved.");
  };

  /* ── IMPROVEMENT LOG ── */
  const addImprove=()=>{
    if(!newImprove.trim())return;
    const td=today();setImproveLog(p=>({...p,[td]:[...(p[td]||[]),newImprove.trim()]}));
    setNewImprove('');showToast("Improvement logged.");
  };
  const delImprove=(date,idx)=>{
    setImproveLog(p=>{const u=[...(p[date]||[])];u.splice(idx,1);if(!u.length){const n={...p};delete n[date];return n;}return{...p,[date]:u};});
  };
  
  /* MEMOIZED TOP THEMES */
  const topThemesList = useMemo(()=>{
    const stop=new Set(['a','an','the','to','i','my','and','or','for','in','on','at','is','it','be','of','with','that','this','want','need','more','better','less']);
    const freq={};
    Object.values(improveLog).flat().forEach(e=>e.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/).forEach(w=>{if(w.length>2&&!stop.has(w))freq[w]=(freq[w]||0)+1;}));
    return Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,12);
  }, [improveLog]);

  /* ── AI ── */
  const loadKey=()=>{let k=localStorage.getItem("adi_gemini_key");if(!k){k=prompt("Enter your Gemini API key:");if(k)localStorage.setItem("adi_gemini_key",k.trim());}return k?k.trim():null;};
  const aiDecompose=async()=>{
    if(!aiPrompt.trim())return;const key=loadKey();if(!key)return;setAiGen(true);
    try{
      const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:`Decompose this goal into 2-4 specific JSON daily sub-quests for Adi: "${aiPrompt}". Schema: {"quests":[{"text":"Task","type":"day","difficulty":"medium","attribute":"intelligence","xp":30,"gold":12}]}. Raw JSON only.`}]}],generationConfig:{responseMimeType:"application/json"}})});
      const res=await r.json();const data=JSON.parse(res.candidates[0].content.parts[0].text);
      if(data.quests){setQuests(p=>[...data.quests.map((q,i)=>({...q,id:Date.now()+i,completed:false,notes:''})),...p]);setAiPrompt('');showToast(`AI decomposed into ${data.quests.length} micro-quests.`);}
    }catch(e){showToast(`Error: ${e.message}`);}finally{setAiGen(false);}
  };

  const generateJournalInsight=async()=>{
    const key=loadKey();if(!key)return;
    const improveEntries=Object.entries(improveLog).map(([d,its])=>`${d}: ${its.join('; ')}`).join('\n');
    const refl=Object.entries(reflections).map(([d,r])=>`${d}: ${r.text}`).join('\n');
    const fail=Object.entries(failureLog).map(([d,fs])=>`${d} failures: ${fs.map(f=>`${f.questText} (${f.reason})`).join(', ')}`).join('\n');
    const sleep=Object.entries(sleepLog).slice(-7).map(([d,h])=>`${d}: ${h}h`).join(', ');
    const focusSummary=`Today focus: ${focusToday.minutes} min / 480 min target`;
    if(!improveEntries&&!refl&&!fail){showToast("No journal data yet — add reflections and improvement entries first.");return;}
    setAiInsightLoad(true);setAiInsight('');
    try{
      const prompt=`You are Adi's personal coach analyzing his LifeQuest OS data. Here's his data:
IMPROVEMENT LOG:\n${improveEntries||'None'}
DAILY REFLECTIONS:\n${refl||'None'}
QUEST FAILURES (with reasons):\n${fail||'None'}
SLEEP LOG (last 7 days):\n${sleep||'None'}
FOCUS TIME: ${focusSummary}

Give exactly 3 sharp, personal insights about patterns you see. Each under 30 words. Be specific, not generic.
Also suggest 1 concrete quest adjustment for tomorrow.
Format as JSON: {"insights":["...","...","..."],"questAdjustment":"..."}`;
      const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{responseMimeType:"application/json"}})});
      const res=await r.json();const data=JSON.parse(res.candidates[0].content.parts[0].text);
      setAiInsight(data);
    }catch(e){showToast(`Insight failed: ${e.message}`);}finally{setAiInsightLoad(false);}
  };

  /* ── MISC ── */
  const boostStat=(s)=>{if(hero.statPoints<=0)return;setHero(h=>({...h,statPoints:h.statPoints-1,stats:{...h.stats,[s]:h.stats[s]+1}}));};
  const buyReward=(id,cost,title)=>{if(hero.gold<cost){showToast("Insufficient gold.");return;}setHero(h=>({...h,gold:h.gold-cost}));showToast(`Redeemed: ${title}`);};
  const addReward=(e)=>{e.preventDefault();if(!rewName.trim())return;setRewards(p=>[{id:Date.now(),text:rewName,cost:+rewCost},...p]);setRewName('');showToast("Reward stocked.");};
  const addQuest=(e)=>{
    e.preventDefault();if(!nqText.trim())return;
    const bx=nqDiff==='easy'?20:nqDiff==='medium'?40:80;const fx=nqType==='week'?bx*2:bx;
    setQuests(p=>[{id:Date.now(),text:nqText,type:nqType,completed:false,difficulty:nqDiff,attribute:nqAttr,xp:fx,gold:Math.round(fx*.4),notes:''},...p]);
    setNqText('');showToast(`Quest forged — ${nqType==='week'?'weekly':'daily'} added.`);
  };
  const delQuest=(id)=>setQuests(p=>p.filter(q=>q.id!==id));
  const archive=()=>{setQuests(quests.filter(q=>!q.completed));showToast("Completed quests archived.");};
  const hardReset=()=>{if(confirm("Nuke all data?")){{localStorage.clear();window.location.reload();}}};

  /* ── DERIVED ── */
  const codeQ=quests.find(q=>q.text.includes("8 Hours"))||{};
  const readQ=quests.find(q=>q.text.includes("Read book"))||{};
  const doneCount=quests.filter(q=>q.completed).length;
  const xpPct=Math.min(100,Math.round((hero.xp/hero.nextLevelXp)*100));
  const dailyQs=quests.filter(q=>q.type==='day');
  const weeklyQs=quests.filter(q=>q.type==='week');
  const daysLeft=daysUntilSun();
  const maxVol=Math.max(...Object.values(weeklyVol),1);
  const focusPct=Math.min(100,(focusToday.minutes/480)*100);
  const stampHit=sleepDebt>=5; // Show debt warning on stamina

  const tabs=[
    {id:'dashboard',label:'Overview'},
    {id:'quests',   label:'Quests'},
    {id:'gym',      label:'Temple'},
    {id:'shop',     label:'Store'},
    {id:'hero',     label:'Matrix'},
    {id:'journal',  label:'Journal'},
  ];

  /* ── QUEST ROW ── */
  const QRow=({q,drag=false})=>(
    <div className={`rounded-2xl border transition-all duration-200 ${q.completed?'border-zinc-900/30 opacity-40':'border-zinc-800/60'} ${dragId===q.id?'q-drag':''} ${overId===q.id&&dragId!==q.id?'q-over':''}`}
      style={{background:q.completed?'var(--bg-empty)':'var(--bg-card)',transition:'background .35s ease'}}
      draggable={drag} onDragStart={drag?e=>onDragStart(e,q.id):undefined} onDragOver={drag?e=>onDragOver(e,q.id):undefined} onDrop={drag?e=>onDrop(e,q.id):undefined} onDragEnd={()=>{setDragId(null);setOverId(null);}}>
      <div className="px-5 py-4 flex items-center gap-3.5">
        {drag&&<Grip/>}
        <input type="checkbox" className="qcheck" checked={q.completed} onChange={()=>toggleQuest(q.id)}/>
        <span className={`text-sm flex-1 leading-relaxed ${q.completed?'line-through text-zinc-600':'text-zinc-200'}`}>{q.text}</span>
        <div className="flex items-center gap-2 flex-shrink-0">
          {q.type==='week'&&<span className="font-mono text-[10px] font-semibold px-2 py-1 rounded-lg b-wk">WK</span>}
          <span className={`font-mono text-[10px] font-semibold px-2 py-1 rounded-lg ${ac(q.attribute)}`}>{al(q.attribute)}</span>
          <span className={`font-mono text-[10px] font-semibold px-2 py-1 rounded-lg ${dc(q.difficulty)}`}>{q.difficulty[0].toUpperCase()}</span>
          <span className="font-mono text-xs text-zinc-500">+{q.xp}</span>
          <button onClick={()=>setExpId(expId===q.id?null:q.id)} className="p-1.5 rounded-lg hover:bg-zinc-900 transition-colors text-zinc-600 hover:text-zinc-400"><Chev open={expId===q.id}/></button>
          <button onClick={()=>delQuest(q.id)} className="p-1.5 rounded-lg hover:bg-zinc-900 transition-colors"><Trash/></button>
        </div>
      </div>
      <div className={`notes-x ${expId===q.id?'open':''}`}>
        <div className="px-5 pb-4 pt-0 border-t border-zinc-900/50">
          <textarea className="notes-ta mt-3" value={q.notes||''} onChange={e=>setQuests(p=>p.map(x=>x.id===q.id?{...x,notes:e.target.value}:x))} placeholder="Notes, subtasks, context… (auto-saved)" rows={3}/>
        </div>
      </div>
    </div>
  );

  /* ════════════════════════════════════════════════════════
     RENDER
  ════════════════════════════════════════════════════════ */
  return(
    <div className="min-h-screen flex flex-col relative" style={{zIndex:1}}>
      <Confetti active={confetti} onDone={()=>setConfetti(false)}/>

      {/* HEADER */}
      <header className="hdr sticky top-0 z-40">
        <div className="max-w-4xl mx-auto px-6 py-4">
          <div className="flex items-center justify-between mb-4">
            <div className="flex items-center gap-3">
              <div className="dot-v"/>
              <span className="font-mono text-xs font-bold tracking-[.22em] text-zinc-200 uppercase">Adi // LifeQuest OS</span>
            </div>
            <div className="flex items-center gap-3.5">
              <span className="lvl-badge px-3 py-1 rounded-lg font-mono text-xs font-semibold">LVL {hero.level}</span>
              <div className="h-4 w-px bg-zinc-800"/>
              <span className="gold font-mono text-sm font-bold">{hero.gold}<span className="text-zinc-600 font-normal text-xs ml-0.5">g</span></span>
              <div className="h-4 w-px bg-zinc-800"/>
              <span className={`flex items-center gap-1.5 font-mono text-sm font-bold ${hero.streak>0?'text-orange-400':'text-zinc-600'}`}>{hero.streak>0?'🔥':'○'} {hero.streak}<span className="text-zinc-700 font-normal text-xs">d</span></span>
              {hero.statPoints>0&&<span className="flex items-center gap-1 text-violet-400 font-bold font-mono text-xs animate-pulse ml-1"><Bolt/>{hero.statPoints}</span>}
              <button onClick={()=>setDimMode(m=>!m)} className={`dim-tog ml-1 ${dimMode?'on':''}`}>
                <svg className="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.8}>
                  {dimMode?<path strokeLinecap="round" strokeLinejoin="round" d="M12 3v1m0 16v1m8-9h1M3 12H2m14.95 4.95l.707.707M6.343 6.343l-.707-.707M17.657 6.343l.707-.707M6.343 17.657l-.707.707M12 7a5 5 0 110 10A5 5 0 0112 7z"/>:<path strokeLinecap="round" strokeLinejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9 9 0 008.354-5.646z"/>}
                </svg>
                {dimMode?'Dim':'Dark'}
              </button>
            </div>
          </div>
          <div className="flex items-center gap-4 mb-4">
            <div className="flex-1"><XpBar xp={hero.xp} max={hero.nextLevelXp}/></div>
            <span className="font-mono text-xs text-zinc-500 whitespace-nowrap">{hero.xp} / {hero.nextLevelXp} XP</span>
          </div>
          <div className="flex gap-1.5">
            {tabs.map((t,i)=>(
              <button key={t.id} onClick={()=>setActiveTab(t.id)}
                className={`px-4 py-2 rounded-xl text-xs font-mono font-medium transition-all duration-150 ${activeTab===t.id?'tab-on':'tab-off'}`} title={`Press ${i+1}`}>
                {t.label}{t.id==='hero'&&hero.statPoints>0&&<span className="ml-1 text-violet-400">·</span>}
              </button>
            ))}
          </div>
        </div>
      </header>

      {/* TOAST */}
      {toast&&(
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 max-w-sm w-full px-4" style={{animation:'fadeSlideIn .22s ease-out both'}}>
          <div className="glass rounded-2xl border border-zinc-800/80 px-5 py-3.5 flex items-center gap-3 shadow-2xl">
            <div className="dot-g"/><span className="font-mono text-xs text-zinc-200">{toast}</span>
          </div>
        </div>
      )}

      <main className="max-w-4xl mx-auto px-6 py-8 w-full flex-grow">

        {/* ══ OVERVIEW ══ */}
        {activeTab==='dashboard'&&(
          <div className="tab-section space-y-6">

            {/* Hero + Stats */}
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
              <Card className="sm:col-span-1 p-6 flex flex-col justify-between gap-5" glow>
                <div>
                  <p className="slabel" style={{marginBottom:'4px'}}>Active Hero</p>
                  <h2 className="font-display text-2xl font-bold text-zinc-100 mt-1">{hero.name}</h2>
                  <p className="font-mono text-xs text-zinc-500 mt-0.5">{hero.class}</p>
                </div>
                <div className="space-y-2">
                  <div className="flex justify-between items-center">
                    <span className="font-mono text-xs text-zinc-600">Streak</span>
                    <span className={`font-mono text-xs font-semibold ${hero.streak>0?'text-orange-400':'text-zinc-600'}`}>{hero.streak>0?`🔥 ${hero.streak}d`:'0d'}</span>
                  </div>
                  <StreakBar streak={hero.streak} cap={30}/>
                </div>
                <div className="space-y-2">
                  <div className="flex justify-between"><span className="font-mono text-xs text-zinc-600">XP Progress</span><span className="font-mono text-xs text-zinc-500">{xpPct}%</span></div>
                  <XpBar xp={hero.xp} max={hero.nextLevelXp}/>
                </div>
                {/* Week heatmap */}
                <div className="space-y-2">
                  <span className="font-mono text-[9px] text-zinc-700 uppercase tracking-widest">This week</span>
                  <WeekHeatmap history={history}/>
                </div>
              </Card>
              <div className="sm:col-span-2 grid grid-cols-2 gap-4">
                {Object.entries(hero.stats).map(([k,v])=>(
                  <Card key={k} className="p-5 flex flex-col gap-3">
                    <div className="flex justify-between items-start">
                      <span className="font-mono text-[10px] uppercase tracking-widest text-zinc-600">{k}</span>
                      <div className="flex flex-col items-end">
                        <span className="text-xl font-bold font-mono" style={{color:sc(k)}}>{Math.floor(v)}</span>
                        {k==='stamina'&&stampHit&&<span className="font-mono text-[9px] text-red-400 mt-0.5">-{sleepDebt}h debt</span>}
                      </div>
                    </div>
                    <StatBar value={v} color={sc(k)} debt={k==='stamina'&&stampHit}/>
                    {k==='stamina'&&stampHit&&<p className="font-mono text-[9px] text-red-400/70">Sleep debt affecting recovery</p>}
                  </Card>
                ))}
              </div>
            </div>

            {/* Focus Timer + Sleep Logger */}
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">

              {/* ISOLATED TIMER COMPONENT MOUNT */}
              <FocusTimerWidget 
                focusToday={focusToday} 
                setFocusToday={setFocusToday} 
                setHistory={setHistory} 
                showToast={showToast} 
                focusPct={focusPct} 
                codeQ={codeQ} 
                toggleQuest={toggleQuest} 
              />

              {/* Sleep Tracker */}
              <Card className="p-5">
                <div className="flex justify-between items-center mb-4">
                  <SL>Sleep Tracker</SL>
                  <div className={`sleep-debt-chip ${sleepDebt===0?'sleep-good':sleepDebt<4?'sleep-warn':'sleep-bad'}`}>
                    {sleepDebt===0?'✓ No debt':`${sleepDebt}h in debt`}
                  </div>
                </div>
                {/* 7-day dots */}
                <div className="flex items-center gap-2 mb-5">
                  {last7Sleep.map((d,i)=>{
                    const h=d.hours;const c=h===null?'#1e1e28':h>=8?'#22c55e':h>=7?'#4ade80':h>=6?'#fbbf24':'#f87171';
                    return(
                      <div key={i} className="flex flex-col items-center gap-1.5 flex-1" title={h!==null?`${d.date}: ${h}h sleep`:d.date}>
                        <div className="sleep-night-dot mx-auto" style={{background:c,boxShadow:h&&h>0?`0 0 6px ${c}55`:undefined}}/>
                        <span className="font-mono text-[8px] text-zinc-700 text-center">{h!==null?`${h}h`:'—'}</span>
                      </div>
                    );
                  })}
                </div>
                {/* Log today's sleep */}
                <div className="space-y-2.5">
                  <p className="font-mono text-xs text-zinc-600">Log last night</p>
                  <div className="flex gap-2.5">
                    <input type="number" min="0" max="24" step="0.5" value={sleepInp} onChange={e=>setSleepInp(e.target.value)}
                      className="inp flex-1 rounded-xl px-4 py-2.5 font-mono"/>
                    <span className="flex items-center font-mono text-sm text-zinc-500">hours</span>
                    <button onClick={logSleep} className="btn-p rounded-xl px-4 font-mono">Log</button>
                  </div>
                  {sleepDebt>0&&<p className="font-mono text-[10px] text-red-400/70">Tip: {sleepDebt}h debt affects recovery. Aim to sleep {Math.min(10,8+Math.round(sleepDebt/3))}h tonight.</p>}
                </div>
              </Card>
            </div>

            {/* XP Chart */}
            <Card className="p-6">
              <div className="flex justify-between items-center mb-5">
                <SL>7-Day XP Trend</SL>
                <span className="font-mono text-xs text-zinc-600">{Object.values(history).reduce((a,d)=>a+(d.xp||0),0)} XP total</span>
              </div>
              <XpChart history={history}/>
              <div className="flex justify-between mt-3">
                <span className="font-mono text-[10px] text-zinc-700">XP earned per day · today highlighted</span>
                <span className="font-mono text-xs text-zinc-600">{history[today()]?.xp||0} XP today</span>
              </div>
            </Card>

            {/* AI Decomposer */}
            <Card className="p-6">
              <SL>AI Goal Decomposer</SL>
              <div className="flex gap-3">
                <input value={aiPrompt} onChange={e=>setAiPrompt(e.target.value)} onKeyDown={e=>e.key==='Enter'&&aiDecompose()}
                  placeholder="Enter a goal — e.g. 'Build a REST API', 'DSA tree problems'…" className="inp flex-grow rounded-xl px-4 py-3"/>
                <button onClick={aiDecompose} disabled={aiGen} className="btn-p rounded-xl px-6 font-mono whitespace-nowrap">
                  {aiGen?<span className="flex items-center gap-2"><Spin/>Parsing…</span>:'Split Goal'}
                </button>
              </div>
              <p className="font-mono text-[10px] text-zinc-700 mt-2.5">Powered by Gemini · Requires API key on first use</p>
            </Card>

            {/* Quick Status */}
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <Card className="p-5 flex items-center justify-between">
                <div className="flex items-center gap-3.5"><span className="text-xl">💻</span><span className="text-sm text-zinc-300">8h Intent Coding</span></div>
                <span className={`font-mono text-xs font-semibold px-3 py-1.5 rounded-xl ${codeQ.completed?'text-green-400 bg-green-400/8 border border-green-400/18':'text-zinc-600 bg-zinc-900 border border-zinc-800/60'}`}>{codeQ.completed?'✓ Done':`${Math.round(focusPct)}%`}</span>
              </Card>
              <Card className="p-5 flex items-center justify-between">
                <div className="flex items-center gap-3.5"><span className="text-xl">📚</span><span className="text-sm text-zinc-300">Books over Scrolling</span></div>
                <span className={`font-mono text-xs font-semibold px-3 py-1.5 rounded-xl ${readQ.completed?'text-green-400 bg-green-400/8 border border-green-400/18':'text-zinc-600 bg-zinc-900 border border-zinc-800/60'}`}>{readQ.completed?'✓ Done':'Pending'}</span>
              </Card>
            </div>

            {/* Ledger */}
            <div>
              <div className="flex justify-between items-center mb-4">
                <SL>Daily Ledger — {doneCount}/{quests.length} complete</SL>
                <button onClick={archive} className="font-mono text-xs text-zinc-600 hover:text-zinc-400 transition-colors underline underline-offset-2">Archive done</button>
              </div>
              {quests.length===0?<Empty icon="📋" title="No active quests" sub="Add from Quests tab."/>
                :<div className="space-y-2.5">{quests.map(q=><QRow key={q.id} q={q}/>)}</div>}
            </div>

            {/* Shortcuts */}
            <div className="flex items-center gap-2.5 pt-1 flex-wrap">
              <span className="font-mono text-[10px] text-zinc-700">Shortcuts:</span>
              {tabs.map((t,i)=><span key={t.id} className="flex items-center gap-1.5"><kbd className="kbd">{i+1}</kbd><span className="font-mono text-[10px] text-zinc-700">{t.label}</span></span>)}
              <kbd className="kbd ml-1">D</kbd><span className="font-mono text-[10px] text-zinc-700">dim</span>
            </div>
          </div>
        )}

        {/* ══ QUESTS ══ */}
        {activeTab==='quests'&&(
          <div className="tab-section space-y-6">
            <Card className="p-6" glow>
              <SL>Forge Custom Quest</SL>
              <form onSubmit={addQuest} className="space-y-4">
                <input value={nqText} onChange={e=>setNqText(e.target.value)} placeholder="Describe the quest objective…" className="inp w-full rounded-xl px-4 py-3"/>
                <div className="grid grid-cols-3 gap-3">
                  {[[nqType,setNqType,[['day','Daily'],['week','Weekly']]],[nqDiff,setNqDiff,[['easy','Easy'],['medium','Medium'],['hard','Hard']]],[nqAttr,setNqAttr,[['intelligence','Intellect'],['strength','Strength'],['willpower','Willpower'],['stamina','Stamina']]]].map(([val,set,opts],i)=>(
                    <select key={i} value={val} onChange={e=>set(e.target.value)} className="inp rounded-xl px-3.5 py-3 font-mono cursor-pointer">
                      {opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}
                    </select>
                  ))}
                </div>
                <p className="font-mono text-xs text-zinc-600">{nqType==='week'?`Weekly · ${daysLeft===0?'resets tonight':`${daysLeft}d until reset`}`:'Daily · resets at midnight'}</p>
                <button type="submit" className="btn-p w-full rounded-xl py-3 font-mono">Add to Board</button>
              </form>
            </Card>
            <p className="font-mono text-[11px] text-zinc-700 -mt-2">↕ Drag grip to reorder · ∨ to expand notes</p>
            {weeklyQs.length>0&&(
              <div>
                <div className="flex items-center justify-between mb-4">
                  <SL>Weekly Quests — {weeklyQs.filter(q=>q.completed).length}/{weeklyQs.length}</SL>
                  <span className="font-mono text-xs b-wk px-2.5 py-1 rounded-lg">{daysLeft===0?'resets tonight':`${daysLeft}d left`}</span>
                </div>
                <div className="space-y-2.5">{weeklyQs.map(q=><QRow key={q.id} q={q} drag/>)}</div>
              </div>
            )}
            <div>
              <SL>Daily Quests — {dailyQs.filter(q=>q.completed).length}/{dailyQs.length}</SL>
              {dailyQs.length===0?<Empty icon="⚔️" title="No daily quests" sub="Forge above or use AI decomposer."/>
                :<div className="space-y-2.5">{dailyQs.map(q=><QRow key={q.id} q={q} drag/>)}</div>}
            </div>
          </div>
        )}

        {/* ══ GYM ══ */}
        {activeTab==='gym'&&(
          <div className="tab-section space-y-8">
            <div>
              <SL>Weekly Split — Tap to Log</SL>
              <div className="grid grid-cols-2 sm:grid-cols-5 gap-3">
                {Object.entries(PRESET_WORKOUTS).map(([day,d])=>(
                  <button key={day} onClick={()=>logPreset(day)} className="day-card rounded-2xl p-5 text-left space-y-2.5 group">
                    <div className="flex justify-between items-center">
                      <span className="font-mono text-[9px] text-zinc-700 uppercase tracking-widest">{day}</span>
                      <span className="text-lg opacity-55 group-hover:opacity-100 transition-opacity">{d.emoji}</span>
                    </div>
                    <p className="text-sm font-semibold text-zinc-200 leading-snug">{d.name}</p>
                    <p className="font-mono text-[11px] text-zinc-600">{d.exercises.length} exercises</p>
                  </button>
                ))}
              </div>
            </div>

            {/* PRs */}
            {Object.keys(prs).length>0&&(
              <div>
                <SL>Personal Records 🏆</SL>
                <div className="grid grid-cols-2 sm:grid-cols-3 gap-2.5">
                  {Object.entries(prs).sort((a,b)=>b[1]-a[1]).map(([name,w])=>(
                    <div key={name} className="rounded-2xl px-4 py-3.5 flex items-center justify-between gap-2"
                      style={{background:'var(--bg-day)',border:'1.5px solid rgba(251,191,36,.14)',transition:'background .35s ease'}}>
                      <span className="font-mono text-xs text-zinc-400 truncate">{name}</span>
                      <span className="text-sm font-bold font-mono text-yellow-400 flex-shrink-0">{w}<span className="text-zinc-600 font-normal text-[10px]">lb</span></span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Exercise Progression */}
            {Object.keys(exProgression).length>0&&(
              <Card className="p-6">
                <SL>Exercise Progression — Last 3 Sessions</SL>
                <div className="space-y-4">
                  {Object.entries(exProgression).filter(([,d])=>d.length>=2).sort((a,b)=>b[1][0].max-a[1][0].max).slice(0,8).map(([name,sessions])=>{
                    const latest=sessions[0].max,prev=sessions[sessions.length-1].max;
                    const diff=latest-prev;
                    const trendCls=diff>0?'prog-trend-up':diff<0?'prog-trend-dn':'prog-trend-eq';
                    const trendStr=diff>0?`+${diff}`:diff<0?`${diff}`:'—';
                    return(
                      <div key={name} className="flex items-center gap-4">
                        <div className="w-36 flex-shrink-0">
                          <p className="text-xs text-zinc-300 font-medium leading-tight">{name}</p>
                          <p className={`font-mono text-[10px] font-semibold mt-0.5 ${trendCls}`}>{trendStr} lbs trend</p>
                        </div>
                        <div className="flex items-end gap-2 flex-1">
                          {[...sessions].reverse().map((s,i)=>{
                            const maxAll=Math.max(...sessions.map(x=>x.max),1);
                            const h=Math.max(16,(s.max/maxAll)*52);
                            const isLatest=i===sessions.length-1;
                            return(
                              <div key={i} className="flex flex-col items-center gap-1" style={{flex:1}}>
                                <span className="font-mono text-[9px] text-zinc-600">{s.max}lb</span>
                                <div className="w-full rounded-t-md transition-all" style={{height:`${h}px`,background:isLatest?'#7c3aed':'#2a2a3e',opacity:isLatest?1:.7}}/>
                                <span className="font-mono text-[8px] text-zinc-700">{s.date.slice(5)}</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
                <p className="font-mono text-[10px] text-zinc-700 mt-4">Showing exercises with 2+ logged sessions · bars show relative weight</p>
              </Card>
            )}

            {/* Weekly Vol */}
            {Object.keys(weeklyVol).length>0&&(
              <Card className="p-6">
                <div className="flex justify-between items-center mb-5">
                  <SL>Weekly Volume</SL>
                  <span className="font-mono text-xs text-zinc-600">{Object.values(weeklyVol).reduce((a,b)=>a+b,0).toLocaleString()} lbs total</span>
                </div>
                <div className="space-y-3.5">
                  {Object.entries(weeklyVol).sort((a,b)=>b[1]-a[1]).map(([g,v])=>(
                    <div key={g} className="flex items-center gap-4">
                      <span className="font-mono text-xs w-20 flex-shrink-0" style={{color:MUSCLE_COLORS[g]||'#6a6a78'}}>{g}</span>
                      <div className="vbar-bg"><div className="vbar-fill" style={{width:`${(v/maxVol)*100}%`,background:MUSCLE_COLORS[g]||'#4a4a58'}}/></div>
                      <span className="font-mono text-xs text-zinc-600 w-16 text-right flex-shrink-0">{v.toLocaleString()} lbs</span>
                    </div>
                  ))}
                </div>
              </Card>
            )}

            {/* Hevy */}
            <Card className="p-7 text-center space-y-5">
              <div><p className="text-base font-semibold text-zinc-200">Hevy Screenshot Parser</p><p className="font-mono text-xs text-zinc-600 mt-1">Vision AI reads your Hevy workout and auto-catalogs it</p></div>
              <button onClick={()=>fileRef.current.click()} disabled={visionParse} className="btn-g rounded-xl px-6 py-3 font-mono inline-flex items-center gap-2.5">
                {visionParse?<><Spin/>Scanning…</>:<><svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.5}><path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>Upload Screenshot</>}
              </button>
              <input type="file" accept="image/*" ref={fileRef} onChange={hevyUpload} className="hidden"/>
              <p className="font-mono text-[11px] text-zinc-700">+85 XP · +35g · PR detection · progression tracking · volume analysis</p>
            </Card>

            {/* Logs */}
            <div>
              <SL>Workout Log — {gymLogs.length} sessions</SL>
              {gymLogs.length===0?<Empty icon="🏛️" title="No sessions yet" sub="Tap a split or upload a Hevy screenshot."/>
                :<div className="space-y-3">{gymLogs.map(log=>(
                  <Card key={log.id} className="p-5 space-y-4">
                    <div className="flex justify-between items-start border-b border-zinc-900/60 pb-3">
                      <div className="flex items-center gap-2.5">
                        <span className="text-sm font-semibold text-zinc-200">{log.workoutName}</span>
                        {log.prExercises?.length>0&&<span className="font-mono text-[9px] font-bold px-2 py-0.5 rounded-lg b-pr">🏆 PR</span>}
                      </div>
                      <div className="flex items-center gap-2.5">
                        <span className="font-mono text-xs text-zinc-600">{log.date}</span>
                        <button onClick={()=>deleteLog(log.id)} className="p-1.5 rounded-lg hover:bg-zinc-900 transition-colors"><Trash/></button>
                      </div>
                    </div>
                    <div className="space-y-2">
                      {log.exercises.map((ex,i)=>(
                        <div key={i} className="flex justify-between items-center">
                          <span className="font-mono text-xs text-zinc-500 flex items-center gap-2">{ex.name}{log.prExercises?.includes(ex.name)&&<span className="font-mono text-[8px] font-bold px-1.5 py-0.5 rounded b-pr">PR</span>}</span>
                          <span className="font-mono text-xs text-zinc-600">{ex.sets.map(s=>`${s.reps}×${s.weight}lbs`).join('  ')}</span>
                        </div>
                      ))}
                    </div>
                  </Card>
                ))}</div>}
            </div>
          </div>
        )}

        {/* ══ STORE ══ */}
        {activeTab==='shop'&&(
          <div className="tab-section space-y-6">
            <Card className="p-6 flex items-center justify-between" glow>
              <div><p className="slabel" style={{marginBottom:'4px'}}>Gold Balance</p><p className="font-display text-3xl font-bold gold mt-1">{hero.gold}<span className="text-base font-normal text-zinc-600 ml-1.5">g</span></p></div>
              <div className="text-right"><p className="slabel" style={{marginBottom:'4px'}}>Earned Today</p><p className="font-mono text-sm text-zinc-500 mt-1">{history[today()]?.gold||0}g from quests</p></div>
            </Card>
            <Card className="p-6">
              <SL>Stock New Reward</SL>
              <form onSubmit={addReward} className="flex gap-3">
                <input value={rewName} onChange={e=>setRewName(e.target.value)} placeholder="Reward description…" className="inp flex-grow rounded-xl px-4 py-3"/>
                <input type="number" value={rewCost} onChange={e=>setRewCost(e.target.value)} className="inp w-20 rounded-xl px-3 font-mono text-center"/>
                <button type="submit" className="btn-p rounded-xl px-5 font-mono whitespace-nowrap">Add</button>
              </form>
            </Card>
            <div>
              <SL>Merchant Inventory</SL>
              {rewards.length===0?<Empty icon="🏪" title="Store is empty" sub="Stock some rewards above."/>
                :<div className="grid grid-cols-1 sm:grid-cols-2 gap-3">{rewards.map(r=>(
                  <div key={r.id} className="rcard rounded-2xl p-5 flex items-center justify-between gap-4">
                    <span className="text-sm text-zinc-200 leading-relaxed">{r.text}</span>
                    <button onClick={()=>buyReward(r.id,r.cost,r.text)}
                      className={`flex-shrink-0 rounded-xl px-4 py-2 font-mono text-xs font-semibold transition-all ${hero.gold>=r.cost?'gold bg-yellow-400/8 border border-yellow-400/22 hover:bg-yellow-400/16 cursor-pointer':'text-zinc-700 bg-zinc-900 border border-zinc-800 cursor-not-allowed opacity-50'}`}>
                      {r.cost}g
                    </button>
                  </div>
                ))}</div>}
            </div>
          </div>
        )}

        {/* ══ MATRIX ══ */}
        {activeTab==='hero'&&(
          <div className="tab-section space-y-6">
            <Card className="p-6" glow>
              <div className="flex justify-between items-start">
                <div><p className="slabel" style={{marginBottom:'4px'}}>Character Matrix</p><h2 className="font-display text-2xl font-bold text-zinc-100 mt-1">Adi <span className="text-zinc-500 text-lg font-normal">— {hero.class}</span></h2></div>
                <div className="lvl-badge px-4 py-2.5 rounded-xl text-right"><p className="font-mono text-[10px] text-violet-500 uppercase tracking-widest">Level</p><p className="font-display text-2xl font-bold text-violet-300 leading-tight">{hero.level}</p></div>
              </div>
              <div className="mt-5 space-y-2">
                <div className="flex justify-between items-center"><span className="font-mono text-xs text-zinc-600">Current streak</span><span className={`font-mono text-sm font-bold ${hero.streak>0?'text-orange-400':'text-zinc-600'}`}>{hero.streak>0?`🔥 ${hero.streak} day${hero.streak>1?'s':''}`:'No active streak'}</span></div>
                <StreakBar streak={hero.streak} cap={30}/>
              </div>
              {hero.statPoints>0&&(
                <div className="mt-5 flex items-center gap-2.5 p-4 rounded-xl" style={{background:'rgba(124,58,237,.09)',border:'1.5px solid rgba(124,58,237,.22)'}}>
                  <Bolt/><span className="font-mono text-sm text-violet-300 font-semibold">{hero.statPoints} matrix shard{hero.statPoints>1?'s':''} to allocate</span>
                </div>
              )}
            </Card>
            <div>
              <SL>Attribute Matrix</SL>
              <div className="space-y-3">
                {Object.entries(hero.stats).map(([stat,val])=>(
                  <Card key={stat} className="px-6 py-5 flex items-center gap-5">
                    <div className="w-24 flex-shrink-0 space-y-0.5">
                      <span className="text-sm font-semibold capitalize" style={{color:sc(stat)}}>{stat}</span>
                      {stat==='stamina'&&stampHit&&<p className="font-mono text-[9px] text-red-400">sleep debt</p>}
                    </div>
                    <StatBar value={val} color={sc(stat)} debt={stat==='stamina'&&stampHit}/>
                    <div className="flex items-center gap-3 flex-shrink-0">
                      <span className="text-xl font-bold font-mono w-10 text-right" style={{color:sc(stat)}}>{Math.floor(val)}</span>
                      {hero.statPoints>0&&<button onClick={()=>boostStat(stat)} className="font-mono text-xs font-semibold px-3 py-1.5 rounded-xl transition-all" style={{background:'rgba(124,58,237,.1)',border:'1.5px solid rgba(124,58,237,.28)',color:'#a78bfa'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(124,58,237,.2)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(124,58,237,.1)'}>+1</button>}
                    </div>
                  </Card>
                ))}
              </div>
            </div>
            {milestones.length>0&&(
              <div>
                <SL>Stat Milestones</SL>
                <div className="space-y-2">
                  {milestones.slice(0,12).map((m,i)=>(
                    <div key={i} className="mchip rounded-xl px-4 py-3 flex items-center justify-between">
                      <div className="flex items-center gap-3">
                        <span className={`font-mono text-[10px] font-bold px-2 py-0.5 rounded-lg ${ac(m.stat)}`}>{al(m.stat)}</span>
                        <span className="text-sm"><span style={{color:sc(m.stat)}} className="font-semibold">{m.stat}</span> reached <span className="font-bold text-zinc-200">{m.milestone}</span></span>
                      </div>
                      <span className="font-mono text-xs text-zinc-600">{m.date}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {milestones.length===0&&<Empty icon="📈" title="No milestones yet" sub="Complete quests to raise your stats."/>}
            <Card className="p-6 space-y-6">
              <div><SL>API Configuration</SL><button onClick={()=>{localStorage.removeItem("adi_gemini_key");showToast("API key purged.");}} className="btn-g rounded-xl px-5 py-2.5 font-mono">Purge Cached API Key</button></div>
              <div className="border-t border-zinc-900/60 pt-5">
                <p className="font-mono text-[10px] text-red-500/60 uppercase tracking-widest mb-3">Danger Zone</p>
                <button onClick={hardReset} className="btn-d rounded-xl px-5 py-2.5 font-mono">Hard Reset All Data</button>
              </div>
            </Card>
          </div>
        )}

        {/* ══ JOURNAL ══ */}
        {activeTab==='journal'&&(
          <div className="tab-section space-y-7">

            {/* Failure Tagging — if yesterday had skipped quests */}
            {pendingFails.length>0&&(
              <Card className="p-6" style={{border:'1.5px solid rgba(248,113,113,.2)'}}>
                <div className="flex items-center justify-between mb-4">
                  <SL>Tag Yesterday's Skipped Quests</SL>
                  <span className="font-mono text-xs text-zinc-600">{yesterday()}</span>
                </div>
                <p className="text-sm text-zinc-400 mb-5 leading-relaxed">Quick reflection — what caused the skip? This feeds into pattern detection.</p>
                <div className="space-y-4">
                  {pendingFails.map((f,i)=>(
                    <div key={i} className="space-y-2.5">
                      <div className="flex items-center gap-2.5">
                        <span className={`font-mono text-[10px] font-bold px-2 py-0.5 rounded-lg ${ac(f.attribute)}`}>{al(f.attribute)}</span>
                        <span className="text-sm text-zinc-300">{f.questText}</span>
                      </div>
                      <div className="flex flex-wrap gap-2">
                        {FAILURE_REASONS.map(r=>(
                          <button key={r} onClick={()=>setFailTags(p=>({...p,[f.questText]:r}))}
                            className={`ftag-btn ${failTags[f.questText]===r?'sel':''}`}>{r}</button>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
                <div className="flex gap-3 mt-5">
                  <button onClick={submitFailureTags} className="btn-p rounded-xl px-5 py-2.5 font-mono flex-1">Save Tags</button>
                  <button onClick={()=>{setPendingFails([]);setFailTags({});}} className="btn-g rounded-xl px-5 py-2.5 font-mono">Skip</button>
                </div>
              </Card>
            )}

            {/* Today's Reflection */}
            <Card className="p-6" glow>
              <div className="flex items-center justify-between mb-1">
                <SL>Daily Reflection</SL>
                <span className="font-mono text-xs text-zinc-600">{today()}</span>
              </div>
              <p className="text-sm text-zinc-500 mb-4 leading-relaxed">What went well, what didn't, and why? Raw thoughts — Claude will analyze patterns across entries.</p>
              {reflections[today()]?(
                <div className="rounded-xl p-4 space-y-3" style={{background:'var(--bg-input)',border:'1.5px solid var(--border-base)'}}>
                  <p className="text-sm text-zinc-300 leading-relaxed">{reflections[today()].text}</p>
                  <button onClick={()=>{setReflDraft(reflections[today()].text);setReflections(p=>{const n={...p};delete n[today()];return n;});}} className="font-mono text-xs text-zinc-600 hover:text-zinc-400 underline underline-offset-2">Edit reflection</button>
                </div>
              ):(
                <div className="space-y-3">
                  <textarea value={reflDraft} onChange={e=>setReflDraft(e.target.value)} placeholder="What happened today? What did you skip and why? Any insights or frustrations?" className="refl-ta rounded-xl p-4 w-full" style={{background:'var(--bg-input)',border:'1.5px solid var(--border-base)',borderRadius:'12px',minHeight:'100px'}} rows={4}/>
                  <button onClick={saveReflection} className="btn-p rounded-xl px-5 py-2.5 font-mono w-full">Save Reflection</button>
                </div>
              )}
            </Card>

            {/* Improvement Log */}
            <Card className="p-6">
              <div className="flex items-center justify-between mb-4">
                <SL>Today's Improvement Log</SL>
                <span className="font-mono text-xs text-zinc-600">{today()}</span>
              </div>
              <div className="flex gap-3">
                <input value={newImprove} onChange={e=>setNewImprove(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addImprove()}
                  placeholder="What do you want to get better at today?" className="inp flex-grow rounded-xl px-4 py-3"/>
                <button onClick={addImprove} className="btn-p rounded-xl px-5 font-mono whitespace-nowrap">Log</button>
              </div>
              {(improveLog[today()]||[]).length>0&&(
                <div className="mt-4 space-y-2.5">
                  {(improveLog[today()]||[]).map((entry,i)=>(
                    <div key={i} className="flex items-start gap-3.5 rounded-xl px-4 py-3.5" style={{background:'var(--bg-input)',border:'1.5px solid var(--border-base)'}}>
                      <span className="text-violet-500 mt-0.5 flex-shrink-0 font-mono font-bold text-[11px]">{String(i+1).padStart(2,'0')}</span>
                      <span className="text-sm text-zinc-200 flex-1 leading-relaxed">{entry}</span>
                      <button onClick={()=>delImprove(today(),i)} className="flex-shrink-0 p-1 rounded-lg hover:bg-zinc-900 transition-colors mt-0.5"><Trash/></button>
                    </div>
                  ))}
                </div>
              )}
            </Card>

            {/* AI Pattern Analysis */}
            <Card className="p-6">
              <div className="flex items-center justify-between mb-5">
                <SL>Pattern Analysis</SL>
                <button onClick={generateJournalInsight} disabled={aiInsightLoad}
                  className="btn-g rounded-xl px-4 py-2 font-mono text-xs inline-flex items-center gap-2">
                  {aiInsightLoad?<><Spin/>Analyzing…</>:'✦ Run AI Analysis'}
                </button>
              </div>

              {/* Word themes (NOW MEMOIZED) */}
              {topThemesList.length>0&&(
                <div className="flex flex-wrap gap-2 mb-5">
                  {topThemesList.map(([word,count])=>(
                    <span key={word} className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-xl font-mono text-[11px]"
                      style={{background:`rgba(124,58,237,${Math.min(.18,.05+count*.04)})`,border:`1.5px solid rgba(124,58,237,${Math.min(.35,.1+count*.07)})`,color:`rgba(167,139,250,${Math.min(1,.6+count*.1)})`}}>
                      {word}<span className="text-violet-700 text-[9px]">×{count}</span>
                    </span>
                  ))}
                </div>
              )}

              {/* AI insights */}
              {typeof aiInsight==='object'&&aiInsight?.insights&&(
                <div className="space-y-3 border-t border-zinc-900/60 pt-5">
                  <p className="font-mono text-xs text-violet-500 uppercase tracking-widest mb-4">AI Pattern Insights</p>
                  {aiInsight.insights.map((ins,i)=>(
                    <div key={i} className="flex gap-3.5 rounded-xl px-4 py-3.5" style={{background:'rgba(124,58,237,.07)',border:'1.5px solid rgba(124,58,237,.14)'}}>
                      <span className="text-violet-600 font-bold font-mono text-xs flex-shrink-0 mt-0.5">{i+1}.</span>
                      <span className="text-sm text-zinc-200 leading-relaxed">{ins}</span>
                    </div>
                  ))}
                  {aiInsight.questAdjustment&&(
                    <div className="flex gap-3.5 rounded-xl px-4 py-3.5 mt-2" style={{background:'rgba(52,211,153,.07)',border:'1.5px solid rgba(52,211,153,.18)'}}>
                      <span className="text-emerald-500 font-bold font-mono text-xs flex-shrink-0 mt-0.5">→</span>
                      <div>
                        <p className="font-mono text-[10px] text-emerald-500 uppercase tracking-widest mb-1">Quest Adjustment for Tomorrow</p>
                        <span className="text-sm text-zinc-200 leading-relaxed">{aiInsight.questAdjustment}</span>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* Failure reason breakdown */}
              {Object.keys(failureLog).length>0&&(
                <div className="border-t border-zinc-900/60 pt-5 mt-5">
                  <p className="font-mono text-[10px] text-zinc-600 uppercase tracking-widest mb-3">Failure Reason History</p>
                  <div className="flex flex-wrap gap-2">
                    {(()=>{const freq={};Object.values(failureLog).flat().forEach(f=>freq[f.reason]=(freq[f.reason]||0)+1);return Object.entries(freq).sort((a,b)=>b[1]-a[1]);})().map(([reason,count])=>(
                      <span key={reason} className="font-mono text-xs px-3 py-1.5 rounded-xl" style={{background:'rgba(248,113,113,.08)',border:'1.5px solid rgba(248,113,113,.18)',color:'#fca5a5'}}>
                        {reason} <span className="text-red-700">×{count}</span>
                      </span>
                    ))}
                  </div>
                </div>
              )}

              <p className="font-mono text-[11px] text-zinc-700 mt-4">Analysis uses reflections + improvement log + failure tags + sleep data · Gemini API key required</p>
            </Card>

            {/* Quest Note Archive */}
            <div>
              <div className="flex items-center justify-between mb-4">
                <SL>Quest Note Archive</SL>
                <span className="font-mono text-xs text-zinc-600">{Object.keys(noteHistory).length} days archived</span>
              </div>
              {Object.keys(noteHistory).length===0
                ?<Empty icon="📓" title="No archived notes yet" sub="Add notes to quests via ∨ — they save here at midnight reset."/>
                :<div className="space-y-3">
                  {Object.entries(noteHistory).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,14).map(([date,entries])=>(
                    <Card key={date} className="overflow-hidden">
                      <button onClick={()=>setJournalDate(journalDate===date?null:date)} className="w-full px-5 py-4 flex items-center justify-between hover:bg-zinc-900/30 transition-colors">
                        <div className="flex items-center gap-3.5"><span className="font-mono text-sm font-semibold text-zinc-300">{date}</span><span className="font-mono text-xs text-zinc-600">{entries.length} note{entries.length!==1?'s':''}</span></div>
                        <Chev open={journalDate===date}/>
                      </button>
                      {journalDate===date&&(
                        <div className="border-t border-zinc-900/60 px-5 pb-5 space-y-4 pt-4">
                          {entries.map((e,i)=>(
                            <div key={i} className="space-y-1.5">
                              <div className="flex items-center gap-2.5"><span className={`font-mono text-[10px] font-bold px-2 py-0.5 rounded-lg ${ac(e.attribute)}`}>{al(e.attribute)}</span><span className={`text-sm ${e.completed?'text-green-400':'text-zinc-500'}`}>{e.completed?'✓ ':''}{e.questText}</span></div>
                              <p className="font-mono text-xs text-zinc-500 leading-relaxed pl-14 italic">"{e.note}"</p>
                            </div>
                          ))}
                        </div>
                      )}
                    </Card>
                  ))}
                </div>
              }
            </div>

            {/* Past reflections */}
            {Object.entries(reflections).filter(([d])=>d!==today()).length>0&&(
              <div>
                <SL>Past Reflections</SL>
                <div className="space-y-2.5">
                  {Object.entries(reflections).filter(([d])=>d!==today()).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,7).map(([date,r])=>(
                    <div key={date} className="rounded-2xl px-5 py-4 space-y-2" style={{background:'var(--bg-card)',border:'1.5px solid var(--border-card)'}}>
                      <p className="font-mono text-[10px] text-zinc-600 uppercase tracking-widest">{date}</p>
                      <p className="text-sm text-zinc-400 leading-relaxed">{r.text}</p>
                    </div>
                  ))}
                </div>
              </div>
            )}

          </div>
        )}

      </main>

      {/* LEVEL UP MODAL */}
      {lvlModal&&(
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:'rgba(10,10,13,.92)',backdropFilter:'blur(18px)'}}>
          <div className="max-w-sm w-full rounded-3xl p-8 text-center space-y-6 glow-border" style={{background:'var(--bg-card)',animation:'scaleIn .25s ease-out both'}}>
            <div className="mx-auto flex items-center justify-center mb-2" style={{width:'72px',height:'72px',background:'radial-gradient(circle, rgba(124,58,237,.2) 0%, transparent 70%)',border:'1.5px solid rgba(124,58,237,.3)',borderRadius:'50%'}}>
              <span className="text-3xl">⚡</span>
            </div>
            <div>
              <p className="font-mono text-xs text-violet-500 uppercase tracking-widest mb-2">Matrix Upgrade</p>
              <h3 className="font-display text-2xl font-bold text-zinc-100">Level {hero.level} Reached</h3>
              <p className="text-sm text-zinc-500 mt-3 leading-relaxed">3 attribute shards earned. Allocate them in the Matrix tab.</p>
            </div>
            <div className="flex gap-3">
              <button onClick={()=>setLvlModal(false)} className="btn-g flex-1 rounded-2xl py-3.5 font-mono">Dismiss</button>
              <button onClick={()=>{setLvlModal(false);setActiveTab('hero');}} className="btn-p flex-1 rounded-2xl py-3.5 font-mono">Open Matrix</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
