<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeQuest OS // Adi</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            zinc: { 950: '#09090b' }
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;700&family=Geist:wght@300;400;600;800&display=swap');
    body { font-family: 'Geist', sans-serif; }
    .font-mono { font-family: 'Geist Mono', monospace; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Minimalist SVG Icons ---
    const TrashIcon = () => (
      <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.5}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
      </svg>
    );

    const PRESET_WORKOUTS = {
      Tuesday: { name: "Back & Biceps", exercises: [{ name: "Deadlifts", sets: [{ reps: 5, weight: 225 }, { reps: 5, weight: 245 }] }, { name: "Hammer Curls", sets: [{ reps: 12, weight: 30 }] }] },
      Wednesday: { name: "Chest & Triceps", exercises: [{ name: "Flat Bench Press", sets: [{ reps: 8, weight: 135 }, { reps: 6, weight: 185 }] }] },
      Thursday: { name: "Legs Day", exercises: [{ name: "Barbell Back Squats", sets: [{ reps: 8, weight: 185 }] }] },
      Friday: { name: "Shoulders & Abs", exercises: [{ name: "Overhead Press", sets: [{ reps: 8, weight: 95 }] }] },
      Saturday: { name: "Grow Day", exercises: [{ name: "Bicep 21s", sets: [{ reps: 21, weight: 45 }] }] }
    };

    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [hero, setHero] = useState(() => {
        const saved = localStorage.getItem('lq_hero_adi_v3');
        return saved ? JSON.parse(saved) : { name: "Adi", class: "Tech Lead", level: 1, xp: 45, nextLevelXp: 300, gold: 120, streak: 8, statPoints: 0, stats: { strength: 15, intelligence: 18, willpower: 14, stamina: 15 } };
      });

      const [quests, setQuests] = useState(() => {
        const saved = localStorage.getItem('lq_quests_adi_v3');
        return saved ? JSON.parse(saved) : [
          { id: 1, text: "Perform 8 Hours of meaningful coding", type: "day", completed: false, difficulty: "hard", attribute: "intelligence", xp: 80, gold: 40 },
          { id: 2, text: "Read book for 30 minutes (Instead of scrolling)", type: "day", completed: false, difficulty: "medium", attribute: "willpower", xp: 40, gold: 20 },
          { id: 3, text: "Hit today's custom Gym Split", type: "day", completed: false, difficulty: "medium", attribute: "strength", xp: 40, gold: 20 },
          { id: 4, text: "Secure 8 Hours of deep sleep", type: "day", completed: true, difficulty: "easy", attribute: "stamina", xp: 20, gold: 10 }
        ];
      });

      const [gymLogs, setGymLogs] = useState(() => JSON.parse(localStorage.getItem('lq_gymlogs_adi_v3')) || []);
      const [rewards, setRewards] = useState(() => JSON.parse(localStorage.getItem('lq_rewards_adi_v3')) || [{ id: 1, text: "Watch 1 episode of anime/show guilt-free", cost: 30 }]);
      
      const [aiInputPrompt, setAiInputPrompt] = useState("");
      const [isAiGenerating, setIsAiGenerating] = useState(false);
      const [isVisionParsing, setIsVisionParsing] = useState(false);
      const fileInputRef = useRef(null);
      const [toastMsg, setToastMsg] = useState("");

      useEffect(() => {
        localStorage.setItem('lq_hero_adi_v3', JSON.stringify(hero));
        localStorage.setItem('lq_quests_adi_v3', JSON.stringify(quests));
        localStorage.setItem('lq_gymlogs_adi_v3', JSON.stringify(gymLogs));
        localStorage.setItem('lq_rewards_adi_v3', JSON.stringify(rewards));
      }, [hero, quests, gymLogs, rewards]);

      const triggerToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(""), 3500); };

      const handleQuestToggle = (id) => {
        setQuests(prev => prev.map(q => {
          if (q.id === id) {
            const completing = !q.completed;
            setHero(h => {
              let nXp = h.xp + (completing ? q.xp : -q.xp);
              let nGold = Math.max(0, h.gold + (completing ? q.gold : -q.gold));
              return { ...h, xp: Math.max(0, nXp), gold: nGold };
            });
            return { ...q, completed: completing };
          }
          return q;
        }));
      };

      const triggerPresetWorkoutLog = (dayName) => {
        const preset = PRESET_WORKOUTS[dayName];
        setGymLogs([{ id: Date.now(), date: new Date().toISOString().split('T')[0], workoutName: `${preset.name} (${dayName})`, exercises: preset.exercises }, ...gymLogs]);
        setHero(h => ({ ...h, xp: h.xp + 60, gold: h.gold + 20 }));
        triggerToast(`Logged workout: ${preset.name}`);
      };

      const callAiAgentQuestGenerator = async () => {
        if (!aiInputPrompt.trim()) return;
        let apiKey = localStorage.getItem("adi_gemini_key");
        if (!apiKey) {
          apiKey = prompt("Please enter your free Gemini API key to activate AI behaviors:");
          if (apiKey) localStorage.setItem("adi_gemini_key", apiKey);
          else return;
        }
        setIsAiGenerating(true);
        try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: [{ parts: [{ text: `Decompose this goal cleanly into 2-3 specific JSON daily sub-quests for Adi: "${aiInputPrompt}". Schema: {"quests": [{"text": "Task details", "type": "day", "difficulty": "medium", "attribute": "intelligence", "xp": 30, "gold": 10}]}. Output raw JSON only.` }] ], generationConfig: { responseMimeType: "application/json" } })
          });
          const result = await res.json();
          const data = JSON.parse(result.candidates[0].content.parts[0].text);
          if (data.quests) {
            setQuests([...data.quests.map((q, i) => ({ ...q, id: Date.now() + i, completed: false })), ...quests]);
            setAiInputPrompt("");
            triggerToast("AI split your goals successfully!");
          }
        } catch (e) { triggerToast("AI service error. Check key or network."); }
        finally { setIsAiGenerating(false); }
      };

      const codingQuest = quests.find(q => q.text.includes("8 Hours")) || {};
      const readQuest = quests.find(q => q.text.includes("Read book")) || {};

      return (
        <div className="min-h-screen bg-zinc-950 text-zinc-100 flex flex-col font-sans">
          <header className="border-b border-zinc-900 bg-zinc-950 px-6 py-4 sticky top-0 z-40">
            <div className="max-w-5xl mx-auto flex justify-between items-center">
              <span className="text-xs font-mono font-bold tracking-widest text-zinc-400">ADI // LIFEQUEST OS</span>
              <div className="flex gap-4 text-xs font-mono text-zinc-400">
                <span>LVL {hero.level}</span>
                <span>{hero.gold}g</span>
                <span>{hero.streak}d streak</span>
              </div>
            </div>
            <div className="max-w-5xl mx-auto border-t border-zinc-900/50 mt-3 pt-3 flex gap-2 overflow-x-auto text-[11px] font-mono">
              <button onClick={() => setActiveTab('dashboard')} className={`px-3 py-1 rounded ${activeTab === 'dashboard' ? 'bg-zinc-900 text-zinc-100' : 'text-zinc-500'}`}>Overview</button>
              <button onClick={() => setActiveTab('gym')} className={`px-3 py-1 rounded ${activeTab === 'gym' ? 'bg-zinc-900 text-zinc-100' : 'text-zinc-500'}`}>Iron Temple</button>
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-6 py-6 w-full flex-grow">
            {toastMsg && <div className="bg-zinc-900 border border-zinc-800 text-xs text-zinc-300 p-3 rounded mb-4 font-mono">{toastMsg}</div>}

            {activeTab === 'dashboard' && (
              <div className="space-y-6">
                <div className="border-b border-zinc-900 pb-4">
                  <h2 className="text-base font-bold">Welcome back, Aditya</h2>
                  <p className="text-xs text-zinc-500 font-mono mt-1">INT: {hero.stats.intelligence} | STR: {hero.stats.strength} | WIL: {hero.stats.willpower}</p>
                </div>

                <div className="space-y-2">
                  <label className="text-[10px] font-mono uppercase text-zinc-500">AI Goal Decomposer Console</label>
                  <div className="flex gap-2">
                    <input type="text" value={aiInputPrompt} onChange={(e) => setAiInputPrompt(e.target.value)} placeholder="e.g. 'DSA stacks chains', 'ML array weights'" className="flex-grow bg-zinc-900 border border-zinc-800 rounded px-3 py-2 text-xs font-mono text-zinc-100 placeholder-zinc-600 focus:outline-none" />
                    <button onClick={callAiAgentQuestGenerator} disabled={isAiGenerating} className="bg-zinc-100 text-zinc-950 px-4 text-xs font-mono rounded font-bold">{isAiGenerating ? 'Processing...' : 'Split'}</button>
                  </div>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-2">
                  <div className="bg-zinc-900/40 border border-zinc-900 p-4 rounded-xl flex justify-between items-center">
                    <span className="text-xs text-zinc-400">💻 8 Hours Coding</span>
                    <span className="text-xs font-mono font-bold text-zinc-500">{codingQuest.completed ? 'Done' : 'Pending'}</span>
                  </div>
                  <div className="bg-zinc-900/40 border border-zinc-900 p-4 rounded-xl flex justify-between items-center">
                    <span className="text-xs text-zinc-400">📚 Books over Scrolling</span>
                    <span className="text-xs font-mono font-bold text-zinc-500">{readQuest.completed ? 'Done' : 'Pending'}</span>
                  </div>
                </div>

                <div className="space-y-2 pt-4">
                  <div className="flex justify-between items-center border-b border-zinc-900 pb-1"><span className="text-[10px] font-mono uppercase text-zinc-500">Active Quest Ledger</span><button onClick={archiveCompletedDailies} className="text-[10px] text-zinc-400 underline font-mono">Archive Clean</button></div>
                  {quests.map(q => (
                    <div key={q.id} onClick={() => handleQuestToggle(q.id)} className={`p-3 rounded-lg border flex justify-between items-center cursor-pointer transition ${q.completed ? 'border-zinc-900 bg-zinc-950 opacity-40' : 'border-zinc-900 bg-zinc-900/50 hover:border-zinc-800'}`}>
                      <span className={`text-xs font-mono ${q.completed ? 'line-through text-zinc-600' : 'text-zinc-200'}`}>{q.text}</span>
                      <span className="text-xs font-mono text-zinc-500">+{q.xp}xp</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {activeTab === 'gym' && (
              <div className="space-y-6">
                <div>
                  <p className="text-[10px] font-mono uppercase text-zinc-500 mb-2">Adi's Custom Routine Splits</p>
                  <div className="grid grid-cols-2 sm:grid-cols-5 gap-2 font-mono text-xs">
                    {Object.keys(PRESET_WORKOUTS).map(day => (
                      <button key={day} onClick={() => triggerPresetWorkoutLog(day)} className="bg-zinc-900 border border-zinc-800 p-3 rounded-lg text-left hover:border-zinc-700">
                        <div className="text-[9px] text-zinc-600">{day}</div>
                        <div className="font-bold text-zinc-300 mt-1">{PRESET_WORKOUTS[day].name}</div>
                      </button>
                    ))}
                  </div>
                </div>

                <div className="space-y-2 pt-4">
                  <p className="text-[10px] font-mono uppercase text-zinc-500">Workout History Records</p>
                  {gymLogs.map(log => (
                    <div key={log.id} className="bg-zinc-900/50 border border-zinc-900 p-4 rounded-xl font-mono text-xs space-y-1">
                      <div className="flex justify-between text-zinc-400 font-bold"><span>{log.workoutName}</span><span>{log.date}</span></div>
                      {log.exercises.map((ex, i) => <div key={i} className="text-[11px] text-zinc-500">{ex.name} — {ex.sets.map(s => `${s.reps}x${s.weight}lbs`).join(', ')}</div>)}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
