<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeQuest OS // Adi</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            zinc: {
              950: '#09090b',
            }
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;700&family=Geist:wght@300;400;600;800&display=swap');
    body { font-family: 'Geist', sans-serif; }
    .font-mono { font-family: 'Geist Mono', monospace; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen selection:bg-zinc-800">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Minimalist SVG System Icons ---
    const TrashIcon = () => (
      <svg className="w-3.5 h-3.5 text-zinc-500 hover:text-red-400 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.5}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
      </svg>
    );

    // --- Soft Sound Generator via Web Audio API ---
    const playSound = (type) => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const now = ctx.currentTime;
        
        if (type === 'complete') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(480, now);
          osc.frequency.exponentialRampToValueAtTime(240, now + 0.12);
          gain.gain.setValueAtTime(0.02, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now);
          osc.stop(now + 0.12);
        } else if (type === 'levelup') {
          [330, 440, 550, 660].forEach((freq, idx) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now + idx * 0.04);
            gain.gain.setValueAtTime(0.02, now + idx * 0.04);
            gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.04 + 0.2);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now + idx * 0.04);
            osc.stop(now + idx * 0.04 + 0.2);
          });
        }
      } catch (e) {}
    };

    // --- Adi's Explicit Weekly Split Presets ---
    const PRESET_WORKOUTS = {
      Tuesday: {
        name: "Back & Biceps",
        exercises: [
          { name: "Deadlifts", sets: [{ reps: 5, weight: 225 }, { reps: 5, weight: 245 }, { reps: 5, weight: 265 }] },
          { name: "Lat Pulldowns", sets: [{ reps: 10, weight: 120 }, { reps: 10, weight: 130 }] },
          { name: "Hammer Curls", sets: [{ reps: 12, weight: 30 }, { reps: 12, weight: 35 }] }
        ]
      },
      Wednesday: {
        name: "Chest & Triceps",
        exercises: [
          { name: "Flat Bench Press", sets: [{ reps: 8, weight: 135 }, { reps: 8, weight: 185 }, { reps: 6, weight: 205 }] },
          { name: "Incline Dumbbell Press", sets: [{ reps: 10, weight: 60 }, { reps: 10, weight: 65 }] },
          { name: "Tricep Pushdowns", sets: [{ reps: 12, weight: 50 }] }
        ]
      },
      Thursday: {
        name: "Legs Day",
        exercises: [
          { name: "Barbell Back Squats", sets: [{ reps: 8, weight: 185 }, { reps: 8, weight: 225 }, { reps: 6, weight: 245 }] },
          { name: "Romanian Deadlifts", sets: [{ reps: 10, weight: 135 }, { reps: 10, weight: 185 }] }
        ]
      },
      Friday: {
        name: "Shoulders & Abs",
        exercises: [
          { name: "Overhead Press (OHP)", sets: [{ reps: 8, weight: 95 }, { reps: 8, weight: 115 }] },
          { name: "Dumbbell Lateral Raises", sets: [{ reps: 15, weight: 20 }, { reps: 15, weight: 25 }] },
          { name: "Hanging Leg Raises", sets: [{ reps: 12, weight: 0 }, { reps: 12, weight: 0 }] }
        ]
      },
      Saturday: {
        name: "Grow Day",
        exercises: [
          { name: "Bicep 21s", sets: [{ reps: 21, weight: 45 }] },
          { name: "Lateral Raises (Giant Set)", sets: [{ reps: 20, weight: 15 }, { reps: 15, weight: 20 }] }
        ]
      }
    };

    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      
      const [hero, setHero] = useState(() => {
        const saved = localStorage.getItem('lq_hero_adi_v4');
        return saved ? JSON.parse(saved) : {
          name: "Adi", class: "Tech Lead", level: 1, xp: 0, nextLevelXp: 300, gold: 0, streak: 0, statPoints: 0,
          stats: { strength: 10, intelligence: 10, willpower: 10, stamina: 10 }
        };
      });

      const [quests, setQuests] = useState(() => {
        const saved = localStorage.getItem('lq_quests_adi_v4');
        return saved ? JSON.parse(saved) : [
          { id: 1, text: "Perform 8 Hours of meaningful coding", type: "day", completed: false, difficulty: "hard", attribute: "intelligence", xp: 80, gold: 40 },
          { id: 2, text: "Read book for 30 minutes (Instead of scrolling)", type: "day", completed: false, difficulty: "medium", attribute: "willpower", xp: 40, gold: 20 },
          { id: 3, text: "Hit today's custom Gym Split", type: "day", completed: false, difficulty: "medium", attribute: "strength", xp: 40, gold: 20 },
          { id: 4, text: "Secure 8 Hours of deep sleep", type: "day", completed: false, difficulty: "easy", attribute: "stamina", xp: 20, gold: 10 }
        ];
      });

      const [gymLogs, setGymLogs] = useState(() => JSON.parse(localStorage.getItem('lq_gymlogs_adi_v4')) || []);
      const [rewards, setRewards] = useState(() => JSON.parse(localStorage.getItem('lq_rewards_adi_v4')) || [
        { id: 1, text: "Watch 1 episode of anime/show guilt-free", cost: 30 },
        { id: 2, text: "Indulge in a clean cheat meal", cost: 60 },
        { id: 3, text: "Unlock personal luxury hobby item", cost: 140 }
      ]);

      const [aiInputPrompt, setAiInputPrompt] = useState("");
      const [isAiGenerating, setIsAiGenerating] = useState(false);
      const [isVisionParsing, setIsVisionParsing] = useState(false);
      const fileInputRef = useRef(null);
      const [toastMsg, setToastMsg] = useState("");
      const [levelUpModal, setLevelUpModal] = useState(false);

      const [newQuestText, setNewQuestText] = useState("");
      const [newQuestType, setNewQuestType] = useState("day");
      const [newQuestDifficulty, setNewQuestDifficulty] = useState("medium");
      const [newQuestAttr, setNewQuestAttr] = useState("intelligence");
      const [customRewardName, setCustomRewardName] = useState("");
      const [customRewardCost, setCustomRewardCost] = useState(40);

      // --- AUTOMATIC MIDNIGHT RESET ENGINE ---
      useEffect(() => {
        const currentLocalDateString = new Date().toISOString().split('T')[0]; // e.g., "2026-05-26"
        const savedLastResetDate = localStorage.getItem('lq_last_reset_date');

        // Check if the date string stored in local storage doesn't match today's date
        if (savedLastResetDate !== currentLocalDateString) {
          // Reset only tasks flagged as type "day" back to false
          setQuests(prevQuests => 
            prevQuests.map(q => q.type === 'day' ? { ...q, completed: false } : q)
          );
          
          // Update the benchmark reset tracking token to today's date string
          localStorage.setItem('lq_last_reset_date', currentLocalDateString);
          
          setTimeout(() => {
            triggerToast("⚡ A new day has broken. Your daily quest trackers have been reset!");
          }, 800);
        }
      }, []);

      useEffect(() => {
        localStorage.setItem('lq_hero_adi_v4', JSON.stringify(hero));
        localStorage.setItem('lq_quests_adi_v4', JSON.stringify(quests));
        localStorage.setItem('lq_gymlogs_adi_v4', JSON.stringify(gymLogs));
        localStorage.setItem('lq_rewards_adi_v4', JSON.stringify(rewards));
      }, [hero, quests, gymLogs, rewards]);

      const triggerToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(""), 5000); };

      const handleQuestToggle = (id) => {
        playSound('complete');
        setQuests(prev => prev.map(q => {
          if (q.id === id) {
            const completing = !q.completed;
            const xpChange = completing ? q.xp : -q.xp;
            const goldChange = completing ? q.gold : -q.gold;

            setHero(h => {
              let nXp = h.xp + xpChange;
              let nGold = Math.max(0, h.gold + goldChange);
              let nLvl = h.level;
              let tXp = h.nextLevelXp;
              let rolledLvl = false;

              if (nXp >= tXp) {
                nXp -= tXp;
                nLvl += 1;
                tXp = nLvl * 300;
                rolledLvl = true;
                playSound('levelup');
                setLevelUpModal(true);
              } else if (nXp < 0) { nXp = 0; }

              const nextStats = { ...h.stats };
              if (completing && q.attribute) {
                nextStats[q.attribute] = (nextStats[q.attribute] || 10) + (q.difficulty === 'hard' ? 1.0 : 0.4);
              }

              return { ...h, xp: Math.round(nXp), gold: nGold, level: nLvl, nextLevelXp: tXp, stats: nextStats, statPoints: rolledLvl ? h.statPoints + 3 : h.statPoints };
            });

            if (completing) triggerToast(`Completed task. Allocated rewards!`);
            return { ...q, completed: completing };
          }
          return q;
        }));
      };

      const handleManualQuestAdd = (e) => {
        e.preventDefault();
        if (!newQuestText.trim()) return;
        const calcXp = newQuestDifficulty === 'easy' ? 20 : newQuestDifficulty === 'medium' ? 40 : 80;
        const q = { id: Date.now(), text: newQuestText, type: newQuestType, completed: false, difficulty: newQuestDifficulty, attribute: newQuestAttr, xp: calcXp, gold: Math.round(calcXp * 0.4) };
        setQuests([q, ...quests]);
        setNewQuestText("");
        triggerToast("Custom quest successfully forged.");
      };

      const deleteQuest = (id) => {
        setQuests(prev => prev.filter(q => q.id !== id));
        triggerToast("Quest permanently deleted.");
      };

      const triggerPresetWorkoutLog = (dayName) => {
        const preset = PRESET_WORKOUTS[dayName];
        if (!preset) return;
        const newLog = { id: Date.now(), date: new Date().toISOString().split('T')[0], workoutName: `${preset.name} (${dayName})`, exercises: preset.exercises };
        setGymLogs([newLog, ...gymLogs]);
        setHero(h => ({ ...h, xp: h.xp + 60, gold: h.gold + 20 }));
        triggerToast(`Logged split: ${preset.name}`);
      };

      const handleStatBoost = (statName) => {
        if (hero.statPoints <= 0) return;
        setHero(h => ({ ...h, statPoints: h.statPoints - 1, stats: { ...h.stats, [statName]: h.stats[statName] + 1 } }));
      };

      const purchaseReward = (id, cost, title) => {
        if (hero.gold < cost) { triggerToast("Insufficient gold balance."); return; }
        setHero(h => ({ ...h, gold: h.gold - cost }));
        triggerToast(`Redeemed: ${title}`);
      };

      const handleAddReward = (e) => {
        e.preventDefault();
        if (!customRewardName.trim()) return;
        setRewards([{ id: Date.now(), text: customRewardName, cost: Number(customRewardCost) }, ...rewards]);
        setCustomRewardName("");
        triggerToast("Merchant stocked.");
      };

      const archiveCompletedDailies = () => {
        setQuests(quests.filter(q => !q.completed));
        triggerToast("Workspace cleared.");
      };

      const loadApiKeySecurely = () => {
        let key = localStorage.getItem("adi_gemini_key");
        if (!key || key.trim() === "") {
          key = prompt("Please provide your Gemini API key:");
          if (key) localStorage.setItem("adi_gemini_key", key.trim());
        }
        return key ? key.trim() : null;
      };

      const callAiAgentQuestGenerator = async () => {
        if (!aiInputPrompt.trim()) return;
        const apiKey = loadApiKeySecurely();
        if (!apiKey) return;

        setIsAiGenerating(true);
        try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ parts: [{ text: `Decompose this goal cleanly into 2-4 highly specific JSON daily sub-quests matching Adi's schedule timeline layout workflows: "${aiInputPrompt}". Expected schema outline syntax format required: {"quests": [{"text": "Task specific micro description", "type": "day", "difficulty": "medium", "attribute": "intelligence", "xp": 30, "gold": 12}]}. Output strict raw JSON structure contents only, skip markdown text block tags.` }] }],
              generationConfig: { responseMimeType: "application/json" }
            })
          });

          if (!res.ok) {
            const errData = await res.json();
            triggerToast(`Google API Rejection: ${errData.error?.message || res.statusText}`);
            setIsAiGenerating(false);
            return;
          }

          const result = await res.json();
          const rawText = result.candidates[0].content.parts[0].text;
          const data = JSON.parse(rawText);
          if (data.quests) {
            setQuests([...data.quests.map((q, i) => ({ ...q, id: Date.now() + i, completed: false })), ...quests]);
            setAiInputPrompt("");
            triggerToast("AI split your target into micro-quests!");
          }
        } catch (e) { 
          triggerToast(`Internal Client Crash: ${e.message}`); 
        } finally { 
          setIsAiGenerating(false); 
        }
      };

      const handleHevyScreenshotUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const apiKey = loadApiKeySecurely();
        if (!apiKey) return;

        setIsVisionParsing(true);
        triggerToast("Parsing summary metrics via Vision AI...");

        const reader = new FileReader();
        reader.onloadend = async () => {
          try {
            const base64Data = reader.result.split(',')[1];
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                contents: [{
                  role: "user",
                  parts: [
                    { text: `Read this workout snapshot metric from the Hevy application interface. Parse the exercises, sets list, weights configuration, and repetitions. Respond with ONLY a valid raw JSON matching this schema format: {"workoutName": "Focus Area title", "date": "2026-05-19", "exercises": [{"name": "Exercise Name Title", "sets": [{"reps": 10, "weight": 135}]}]}` },
                    { inlineData: { mimeType: file.type, data: base64Data } }
                  ]
                }],
                generationConfig: { responseMimeType: "application/json" }
              })
            });

            if (!res.ok) {
              const errData = await res.json();
              triggerToast(`Vision API Error: ${errData.error?.message || res.statusText}`);
              setIsVisionParsing(false);
              return;
            }

            const result = await res.json();
            const rawText = result.candidates[0].content.parts[0].text;
            const parsed = JSON.parse(rawText);

            const newLog = { id: Date.now(), date: parsed.date || new Date().toISOString().split('T')[0], workoutName: `${parsed.workoutName} (Hevy Sync)`, exercises: parsed.exercises || [] };
            setGymLogs([newLog, ...gymLogs]);
            setHero(h => ({ ...h, xp: h.xp + 85, gold: h.gold + 35 }));
            triggerToast("Hevy snapshot parsed & cataloged.");
          } catch (err) { triggerToast(`Vision module parsing failed: ${err.message}`); }
          finally { setIsVisionParsing(false); }
        };
        reader.readAsDataURL(file);
      };

      const clearSavedApiKey = () => {
        localStorage.removeItem("adi_gemini_key");
        triggerToast("Saved API key purged from browser local cache memory.");
      };

      const triggerTotalSystemReset = () => {
        if(confirm("Are you absolutely certain you want to nuke all records? This will clear metrics back to absolute base settings.")) {
          localStorage.clear();
          window.location.reload();
        }
      };

      const codingQuest = quests.find(q => q.text.includes("8 Hours")) || {};
      const readQuest = quests.find(q => q.text.includes("Read book")) || {};

      return (
        <div className="min-h-screen bg-zinc-950 text-zinc-100 flex flex-col font-sans">
          
          <header className="border-b border-zinc-900 bg-zinc-950 px-6 py-4 sticky top-0 z-40">
            <div className="max-w-5xl mx-auto flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
              <div className="flex items-center gap-2">
                <span className="w-1.5 h-1.5 rounded-full bg-indigo-500"></span>
                <span className="text-xs font-semibold tracking-widest text-zinc-100 font-mono">ADI // LIFEQUEST OS</span>
              </div>
              <div className="flex items-center gap-4 text-[11px] font-mono text-zinc-400 justify-between sm:justify-end">
                <div>LVL {hero.level}</div>
                <div className="h-3 w-[1px] bg-zinc-800"></div>
                <div>{hero.gold}g</div>
                <div className="h-3 w-[1px] bg-zinc-800"></div>
                <div>{hero.streak}d streak</div>
              </div>
            </div>

            <div className="max-w-5xl mx-auto border-t border-zinc-900/50 mt-3 pt-3 flex gap-1 overflow-x-auto text-[11px] font-mono">
              <button onClick={() => setActiveTab('dashboard')} className={`px-3.5 py-1.5 rounded-md transition ${activeTab === 'dashboard' ? 'bg-zinc-900 text-zinc-100 font-bold' : 'text-zinc-500'}`}>Overview</button>
              <button onClick={() => setActiveTab('quests')} className={`px-3.5 py-1.5 rounded-md transition ${activeTab === 'quests' ? 'bg-zinc-900 text-zinc-100 font-bold' : 'text-zinc-500'}`}>Quests</button>
              <button onClick={() => setActiveTab('gym')} className={`px-3.5 py-1.5 rounded-md transition ${activeTab === 'gym' ? 'bg-zinc-900 text-zinc-100 font-bold' : 'text-zinc-500'}`}>Iron Temple</button>
              <button onClick={() => setActiveTab('shop')} className={`px-3.5 py-1.5 rounded-md transition ${activeTab === 'shop' ? 'bg-zinc-900 text-zinc-100 font-bold' : 'text-zinc-500'}`}>Store</button>
              <button onClick={() => setActiveTab('hero')} className={`px-3.5 py-1.5 rounded-md transition ${activeTab === 'hero' ? 'bg-zinc-900 text-zinc-100 font-bold' : 'text-zinc-500'}`}>Specs {hero.statPoints > 0 && "●"}</button>
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-6 py-6 w-full flex-grow">
            {toastMsg && <div className="bg-zinc-900 border border-zinc-800 text-xs text-zinc-300 p-3.5 rounded-xl mb-6 font-mono whitespace-pre-wrap">{toastMsg}</div>}

            {/* --- TAB: OVERVIEW --- */}
            {activeTab === 'dashboard' && (
              <div className="space-y-8 animate-fade-in">
                <div className="flex justify-between items-center border-b border-zinc-900 pb-4">
                  <div>
                    <h2 className="text-base font-bold text-zinc-200">Adi</h2>
                    <p className="text-xs text-zinc-500 font-mono mt-0.5">Console Command Matrix Workspace</p>
                  </div>
                  <div className="flex items-center gap-4 text-xs font-mono text-zinc-500">
                    <div>INT <span className="text-zinc-300 font-bold">{Math.floor(hero.stats.intelligence)}</span></div>
                    <div>STR <span className="text-zinc-300 font-bold">{Math.floor(hero.stats.strength)}</span></div>
                    <div>WIL <span className="text-zinc-300 font-bold">{Math.floor(hero.stats.willpower)}</span></div>
                  </div>
                </div>

                <div className="space-y-2">
                  <label className="text-[10px] font-mono uppercase text-zinc-500 tracking-wider">AI Goal Decomposer Engine</label>
                  <div className="flex gap-2">
                    <input type="text" value={aiInputPrompt} onChange={(e) => setAiInputPrompt(e.target.value)} placeholder="Enter plan (e.g., 'DSA tree array', 'ML project weights script')" className="flex-grow bg-zinc-900/50 border border-zinc-850 rounded-lg px-3 py-2.5 text-xs font-mono text-zinc-100 focus:outline-none" />
                    <button onClick={callAiAgentQuestGenerator} disabled={isAiGenerating} className="bg-zinc-100 text-zinc-950 px-5 text-xs font-mono font-bold rounded-lg">{isAiGenerating ? 'Processing...' : 'Split'}</button>
                  </div>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div className="bg-zinc-900/30 border border-zinc-900 p-4 rounded-xl flex justify-between items-center">
                    <span className="text-xs text-zinc-400">💻 8 Hours Intent Coding</span>
                    <span className="text-xs font-mono text-zinc-500 font-bold">{codingQuest.completed ? 'Achieved' : 'Pending'}</span>
                  </div>
                  <div className="bg-zinc-900/30 border border-zinc-900 p-4 rounded-xl flex justify-between items-center">
                    <span className="text-xs text-zinc-400">📚 Books over Scrolling</span>
                    <span className="text-xs font-mono text-zinc-500 font-bold">{readQuest.completed ? 'Achieved' : 'Pending'}</span>
                  </div>
                </div>

                <div className="space-y-3 pt-2">
                  <div className="flex justify-between items-center border-b border-zinc-900 pb-1">
                    <span className="text-[10px] font-mono uppercase text-zinc-500">Active Daily Ledger</span>
                    <button onClick={archiveCompletedDailies} className="text-[10px] text-zinc-500 hover:text-zinc-300 font-mono underline">Archive Cleaned</button>
                  </div>
                  <div className="space-y-2">
                    {quests.map(q => (
                      <div key={q.id} className={`p-3.5 rounded-xl border flex justify-between items-center transition font-mono text-xs ${q.completed ? 'border-zinc-900 bg-zinc-950/40 opacity-40' : 'border-zinc-900 bg-zinc-900/30'}`}>
                        <div className="flex items-center gap-3">
                          <button onClick={() => handleQuestToggle(q.id)} className="w-4 h-4 rounded border border-zinc-800 text-[10px] flex items-center justify-center">{q.completed && "✓"}</button>
                          <span className={q.completed ? 'line-through text-zinc-600' : 'text-zinc-200'}>{q.text}</span>
                        </div>
                        <span className="text-zinc-500">+{q.xp}xp</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* --- TAB: QUESTS BOARD --- */}
            {activeTab === 'quests' && (
              <div className="space-y-6 animate-fade-in">
                <div className="bg-zinc-900/30 border border-zinc-900 p-5 rounded-xl space-y-4">
                  <p className="text-xs font-mono text-zinc-400 uppercase">Forge Custom Entry</p>
                  <form onSubmit={handleManualQuestAdd} className="space-y-3">
                    <input type="text" value={newQuestText} onChange={(e) => setNewQuestText(e.target.value)} placeholder="Quest item details text..." className="w-full bg-zinc-950 border border-zinc-900 rounded-lg px-3.5 py-2 text-xs text-zinc-200 focus:outline-none" />
                    <div className="grid grid-cols-3 gap-3">
                      <select value={newQuestType} onChange={(e) => setNewQuestType(e.target.value)} className="bg-zinc-950 border border-zinc-900 rounded-lg p-2 text-xs text-zinc-500"><option value="day">Daily</option><option value="week">Weekly</option></select>
                      <select value={newQuestDifficulty} onChange={(e) => setNewQuestDifficulty(e.target.value)} className="bg-zinc-950 border border-zinc-900 rounded-lg p-2 text-xs text-zinc-500"><option value="easy">Easy</option><option value="medium">Medium</option><option value="hard">Hard</option></select>
                      <select value={newQuestAttr} onChange={(e) => setNewQuestAttr(e.target.value)} className="bg-zinc-950 border border-zinc-900 rounded-lg p-2 text-xs text-zinc-500"><option value="intelligence">Intellect</option><option value="strength">Strength</option><option value="willpower">Willpower</option></select>
                    </div>
                    <button type="submit" className="w-full bg-zinc-100 text-zinc-950 text-xs font-mono py-2.5 rounded-lg font-bold">Add Item</button>
                  </form>
                </div>

                <div className="space-y-2">
                  <p className="text-[10px] font-mono uppercase text-zinc-500">Active Board List</p>
                  {quests.map(q => (
                    <div key={q.id} className={`p-3.5 rounded-xl border flex justify-between items-center ${q.completed ? 'border-zinc-900 bg-zinc-950/40 opacity-40' : 'border-zinc-900 bg-zinc-950'}`}>
                      <div className="flex items-center gap-3">
                        <button onClick={() => handleQuestToggle(q.id)} className="w-4 h-4 rounded border border-zinc-800 text-[10px] flex items-center justify-center">{q.completed && "✓"}</button>
                        <span className="text-xs font-mono text-zinc-300">{q.text}</span>
                      </div>
                      <div className="flex items-center gap-3 font-mono text-xs text-zinc-500">
                        <span className="text-[10px] uppercase">{q.attribute}</span>
                        <button onClick={() => deleteQuest(q.id)}><TrashIcon /></button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* --- TAB: IRON TEMPLE (GYM) --- */}
            {activeTab === 'gym' && (
              <div className="space-y-8 animate-fade-in">
                <div className="space-y-3">
                  <p className="text-[10px] font-mono uppercase text-zinc-500">Custom Split Trackers</p>
                  <div className="grid grid-cols-2 sm:grid-cols-5 gap-3">
                    {Object.keys(PRESET_WORKOUTS).map(day => (
                      <button key={day} onClick={() => triggerPresetWorkoutLog(day)} className="bg-zinc-950 hover:bg-zinc-900 border border-zinc-900 p-4 rounded-xl transition text-left space-y-1.5">
                        <span className="text-[9px] font-mono text-zinc-600 uppercase">{day}</span>
                        <p className="text-xs font-bold text-zinc-300 leading-tight">{PRESET_WORKOUTS[day].name}</p>
                      </button>
                    ))}
                  </div>
                </div>

                <div className="border border-dashed border-zinc-850 bg-zinc-950/20 rounded-xl p-6 text-center space-y-3">
                  <p className="text-xs font-mono text-zinc-300">Hevy OCR Screenshot Engine</p>
                  <button onClick={() => fileInputRef.current.click()} disabled={isVisionParsing} className="bg-zinc-900 hover:bg-zinc-850 border border-zinc-800 text-zinc-300 text-xs font-mono px-4 py-2 rounded-lg transition">
                    {isVisionParsing ? "Scanning file..." : "Upload Screenshot"}
                  </button>
                  <input type="file" accept="image/*" ref={fileInputRef} onChange={handleHevyScreenshotUpload} className="hidden" />
                </div>

                <div className="space-y-3">
                  <p className="text-[10px] font-mono uppercase text-zinc-500">Logs History Ledger</p>
                  {gymLogs.map(log => (
                    <div key={log.id} className="bg-zinc-900/30 border border-zinc-900 p-4 rounded-xl font-mono text-xs space-y-2">
                      <div className="flex justify-between text-zinc-400 border-b border-zinc-900 pb-1.5"><span>{log.workoutName}</span><span>{log.date}</span></div>
                      {log.exercises.map((ex, i) => <div key={i} className="text-[11px] text-zinc-500">{ex.name} — <span className="text-zinc-400">{ex.sets.map(s => `${s.reps}x${s.weight}lbs`).join(', ')}</span></div>)}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* --- TAB: MERCHANT LOOT SHOP --- */}
            {activeTab === 'shop' && (
              <div className="space-y-6 animate-fade-in">
                <div className="bg-zinc-900/30 border border-zinc-900 p-4 rounded-xl">
                  <p className="text-xs font-mono text-zinc-400 uppercase mb-3">Stock Reward</p>
                  <form onSubmit={handleAddReward} className="flex gap-2">
                    <input type="text" value={customRewardName} onChange={(e) => setCustomRewardName(e.target.value)} placeholder="Reward description name details..." className="flex-grow bg-zinc-950 border border-zinc-900 rounded-lg px-3 py-2 text-xs font-mono text-zinc-100" />
                    <input type="number" value={customRewardCost} onChange={(e) => setCustomRewardCost(e.target.value)} className="w-20 bg-zinc-950 border border-zinc-900 rounded-lg px-2 text-xs font-mono" />
                    <button type="submit" className="bg-zinc-100 text-zinc-950 font-mono px-4 rounded-lg text-xs font-bold">Add</button>
                  </form>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  {rewards.map(r => (
                    <div key={r.id} className="bg-zinc-950 border border-zinc-900 p-4 rounded-xl flex items-center justify-between">
                      <span className="text-xs font-mono text-zinc-300">{r.text}</span>
                      <button onClick={() => purchaseReward(r.id, r.cost, r.text)} className="bg-zinc-900 hover:bg-zinc-850 border border-zinc-800 text-zinc-400 font-mono px-3 py-1 text-xs rounded transition">Claim {r.cost}g</button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* --- TAB: SPEC MATRIX --- */}
            {activeTab === 'hero' && (
              <div className="space-y-6 animate-fade-in">
                <div className="bg-zinc-900/30 border border-zinc-900 p-4 rounded-xl font-mono text-xs space-y-2 text-zinc-400">
                  <p className="text-zinc-200 font-bold uppercase">Adi Matrix Node Setup</p>
                  <p>Level point shards allocate dynamically during milestone completion. Use points below to balance parameters manually.</p>
                  {hero.statPoints > 0 && <p className="text-indigo-400 font-bold">Unallocated Matrix Shards available: {hero.statPoints}</p>}
                </div>

                <div className="space-y-2">
                  {Object.keys(hero.stats).map(stat => (
                    <div key={stat} className="bg-zinc-950 border border-zinc-900 p-4 rounded-xl flex justify-between items-center font-mono text-xs">
                      <span className="capitalize text-zinc-300 font-bold">{stat}</span>
                      <div className="flex items-center gap-4">
                        <span className="text-zinc-500">{hero.stats[stat]}</span>
                        {hero.statPoints > 0 && <button onClick={() => handleStatBoost(stat)} className="bg-zinc-900 text-zinc-300 px-2 py-0.5 rounded border border-zinc-800">Allocate</button>}
                      </div>
                    </div>
                  ))}
                </div>

                <div className="border border-zinc-900 p-4 rounded-xl space-y-4">
                  <div>
                    <p className="text-[10px] font-mono text-zinc-500 uppercase tracking-wider">Developer API Adjustments</p>
                    <button onClick={clearSavedApiKey} className="bg-zinc-900 hover:bg-zinc-850 text-zinc-300 text-xs font-mono px-3 py-1.5 rounded border border-zinc-800 transition mt-1.5">
                      Purge Cached API Key Token
                    </button>
                  </div>
                  
                  <div className="border-t border-zinc-900 pt-3">
                    <p className="text-[10px] font-mono text-red-500/70 uppercase tracking-wider">System Factory Diagnostics</p>
                    <button onClick={triggerTotalSystemReset} className="bg-red-950/20 hover:bg-red-950/40 border border-red-900/30 text-red-400 text-xs font-mono px-3 py-1.5 rounded transition mt-1.5">
                      Hard Reset All Application Data
                    </button>
                  </div>
                </div>
              </div>
            )}
          </main>

          {/* Level Up Overlay Window */}
          {levelUpModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-zinc-950/80 backdrop-blur-sm p-4 animate-fade-in">
              <div className="bg-zinc-900 border border-zinc-800 p-6 rounded-2xl max-w-sm w-full text-center space-y-4 shadow-2xl">
                <h3 className="text-sm font-bold tracking-wider text-zinc-100 font-mono uppercase">Level Up Reached</h3>
                <p className="text-xs text-zinc-400 leading-relaxed font-mono">You are now Level {hero.level}. You have earned 3 matrix attribute points.</p>
                <button onClick={() => { setLevelUpModal(false); setActiveTab('hero'); }} className="w-full bg-zinc-100 text-zinc-950 font-mono py-2 rounded-lg text-xs font-bold transition">Open Matrix</button>
              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
